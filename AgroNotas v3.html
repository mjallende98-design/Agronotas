function csvExport(que){
  const sep = ";";
  const cel = x=>{ x = (x==null? "" : String(x)); return /[;"\n]/.test(x)? '"'+x.replace(/"/g,'""')+'"' : x; };
  let head = [], filas = [];
  if(que==="labores"){
    const gi=id=>{const e=document.getElementById(id);return e?e.value:"";};
    const ini=gi("csvLabIni"), fin=gi("csvLabFin");
    const EST={pendiente:"Pendiente",encurso:"En curso",pausada:"En pausa",hecha:"Hecha",finalizada:"Finalizada"};
    head = ["Fecha","Término","Tipo","Fundo","Cuartel","Detalle","Responsable","Estado","Meta","Realizado","Unidad","Costo $","N° avances"];
    const lista=[...D.labores].filter(l=>{ const f0=l.fecha||"", f1=l.fecha2||l.fecha||""; if(ini && f1<ini) return false; if(fin && f0>fin) return false; return true; }).sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""));
    let sumCosto=0, sumAv=0;
    filas = lista.map(l=>{ const av=l.avances||[]; const hecho=av.reduce((s,a)=>s+(+a.cantidad||0),0); const costo=av.reduce((s,a)=>s+(+a.total||0),0); sumCosto+=costo; sumAv+=av.length;
        return [fmtF(l.fecha),fmtF(l.fecha2),l.tipo,l.fundo,l.cuartel,l.desc,l.resp,(EST[l.estado]||l.estado),(l.meta||""),(hecho||""),(l.unidad||""),(costo||""),(av.length||"")]; });
    filas.push(["","","TOTALES","","","","","","","","",Math.round(sumCosto),sumAv]);
  }else if(que==="registros"){
    const extras = [...new Set(Object.values(CAMPOS_REG).flat().map(c=>c[0]))];
    head = ["Fecha","Tipo","Fundo","Cuartel",...extras,"Observaciones"];
    filas = [...D.registros].sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""))
      .map(r=>[fmtF(r.fecha),r.tipo,r.fundo,r.cuartel,...extras.map(k=>r[k]!=null?r[k]:""),r.obs]);
  }else{
    head = ["Fecha y hora","Fundo","Cuartel","Categoría","Nota","Fijada","Resuelta","GPS"];
    filas = [...D.notas].sort((a,b)=>(a.fh||"").localeCompare(b.fh||""))
      .map(n=>[fmtFH(n.fh),n.fundo,n.cuartel,n.cat,n.texto,n.fijada?"sí":"",n.resuelta?"sí":"",((n.pins&&n.pins.length)?n.pins:(n.gps?[n.gps]:[])).map(function(g){return g.lat+", "+g.lng;}).join(" | ")]);
  }
  const csv = "﻿" + [head,...filas].map(f=>f.map(cel).join(sep)).join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = `agronotas_${que}_${hoy()}.csv`; a.click();
}
function guardarLluviaLoc(){
  const lat = parseFloat(v("ll_lat").replace(",",".")), lng = parseFloat(v("ll_lng").replace(",","."));
  if(isNaN(lat) || isNaN(lng)){ alert("Ingresa latitud y longitud válidas (ej: -33.41 y -71.14)."); return; }
  const nom = (v("ll_nom")||"").trim();
  D.lluviaLoc = {lat:+lat.toFixed(5), lng:+lng.toFixed(5), nom};
  if(nom && nom.toLowerCase()!=="curacaví" && nom.toLowerCase()!=="curacavi"){ // queda guardada como zona reutilizable
    D.zonas = D.zonas || [];
    const i = D.zonas.findIndex(z=>z.nom.toLowerCase()===nom.toLowerCase());
    const z = {nom, lat:D.lluviaLoc.lat, lng:D.lluviaLoc.lng};
    if(i>=0) D.zonas[i] = z; else D.zonas.push(z);
  }
  D.climaCache = null; // zona nueva = pronóstico nuevo
  guardar(); render();
}

function lluviaGPS(){
  if(!navigator.geolocation){ alert("Este equipo no entrega ubicación."); return; }
  navigator.geolocation.getCurrentPosition(async p=>{
    const lat = p.coords.latitude, lng = p.coords.longitude;
    const latEl = document.getElementById("ll_lat"), lngEl = document.getElementById("ll_lng"), nomEl = document.getElementById("ll_nom");
    if(latEl) latEl.value = lat.toFixed(5);
    if(lngEl) lngEl.value = lng.toFixed(5);
    if(nomEl && navigator.onLine){
      const antes = nomEl.value;
      nomEl.value = "buscando lugar…";
      try{
        const j = await (await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=es`)).json();
        const nom = j.city || j.locality || j.principalSubdivision || j.principalSubdivisionCode || "";
        nomEl.value = nom || antes || "";
      }catch(e){ nomEl.value = antes || ""; }
    }
  }, e=>alert("No se pudo obtener la ubicación: "+e.message), {enableHighAccuracy:true, timeout:8000});
}

/* --- Respaldo completo --- */
async function respaldar(){
  const fotos = await fotoTodas();
  const pack = {app:"cuadernoTF", version:1, fecha:ahora(), datos:D, fotos};
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(pack)],{type:"application/json"}));
  a.download = `respaldo_agronotas_${hoy()}.json`; a.click();
  D.ultimoRespaldo = hoy(); guardar(); // para el widget 💾 recordatorio
}
function restaurar(inp){
  const file = inp.files[0]; if(!file) return;
  const fr = new FileReader();
  fr.onload = async ()=>{
    try{
      const pack = JSON.parse(fr.result);
      if(pack.app!=="cuadernoTF") throw new Error("Este archivo no es un respaldo de AgroNotas.");
      if(!confirm("Esto reemplazará TODOS los datos actuales por los del respaldo del "+fmtFH(pack.fecha)+". ¿Continuar?")) return;
      D = pack.datos; guardar();
      for(const f of (pack.fotos||[])) await fotoPut(f.id, f.data);
      cargar(); // re-aplica migraciones sobre lo restaurado
      alert("✅ Respaldo restaurado."); render();
    }catch(e){ alert("No se pudo restaurar: "+e.message); }
    inp.value = "";
  };
  fr.readAsText(file);
}
async function borrarTodo(){
  if(!confirm("⚠️ Se borrarán TODAS las notas, labores, registros y fotos de este dispositivo. ¿Continuar?")) return;
  if(!confirm("¿Seguro? No se puede deshacer. Idealmente descarga primero un respaldo.")) return;
  const fotos = await fotoTodas();
  for(const f of fotos) await fotoDel(f.id);
  D = defaults(); guardar(); render();
}

/* ================== PROYECTOS (varios campos/empresas, datos separados) ================== */
function proysLista(){
  try{ return JSON.parse(localStorage.getItem("agronotasProys")||"null"); }catch(e){ return null; }
}
function proysGuardar(l){ localStorage.setItem("agronotasProys", JSON.stringify(l)); }
function iniciarProyectos(){
  let l = proysLista();
  if(!l){ // primera vez: los datos existentes pasan a ser el proyecto 1 tal cual están
    l = [{id:1, nombre:"Total Fruit Curacaví", sub:"", clave:"", creado:hoy()}];
    proysGuardar(l);
  }
  const auto = +localStorage.getItem("agronotasAuto")||0;
  const p = l.find(x=>x.id===auto);
  if(p && !p.clave){ entrarProyecto(p.id); return; }
  pantallaProyectos();
}
function pantallaProyectos(msg){
  const l = proysLista()||[];
  document.getElementById("capaVisor").innerHTML = `
  <div class="visor" style="background:linear-gradient(160deg,#14532d,#1e7a4c)">
    <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px">
      <div style="font-size:54px">🍊</div>
      <div style="font-size:30px;font-weight:800;color:#fff;letter-spacing:.5px">AgroNotas</div>
      <div style="color:#bfe0c2;font-size:13px;margin-bottom:26px">Elige tu proyecto para comenzar</div>
      ${msg? `<div style="background:#f4ded2;color:#c62828;font-weight:700;padding:8px 16px;border-radius:10px;margin-bottom:14px">${msg}</div>`:""}
      <div style="display:flex;flex-direction:column;gap:12px;width:min(430px,92vw)">
        ${l.map(p=>`
          <div style="background:#fff;border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25)" onclick="pedirEntrar(${p.id})">
            <div style="font-size:26px">${p.clave?"🔒":"🌱"}</div>
            <div style="flex:1">
              <div style="font-weight:800;font-size:16px;color:#2b2a26">${esc(p.nombre)}</div>
              ${p.sub? `<div style="color:#7a7d79;font-size:12px">${esc(p.sub)}</div>`:""}
            </div>
            <div style="color:#1e7a4c;font-weight:800;font-size:20px">→</div>
          </div>`).join("")}
        <button class="btn" style="background:rgba(255,255,255,.14);color:#fff;border:1.5px dashed rgba(255,255,255,.55)" onclick="nuevoProyecto()">＋ Nuevo proyecto</button>
      </div>
      <label style="color:#bfe0c2;font-size:12.5px;margin-top:22px;display:flex;gap:8px;align-items:center;cursor:pointer">
        <input type="checkbox" id="proyAuto" checked style="width:19px;height:19px;min-height:0;margin:0"> Entrar directo la próxima vez
      </label>
    </div>
  </div>`;
}
function pedirEntrar(id){
  const p = (proysLista()||[]).find(x=>x.id===id); if(!p) return;
  if(p.clave){
    const c = prompt(`Clave de "${p.nombre}":`);
    if(c===null) return;
    if(c!==p.clave){ pantallaProyectos("Clave incorrecta"); return; }
  }
  entrarProyecto(id);
}
async function entrarProyecto(id){
  const l = proysLista()||[];
  PROY = l.find(x=>x.id===id); if(!PROY) return;
  CLAVE = id===1? "cuadernoTFv1" : "cuadernoTFv1_p"+id;
  DBNOM = id===1? "tfFotosDB" : "tfFotosDB_p"+id;
  const chk = document.getElementById("proyAuto");
  if(!chk || chk.checked) localStorage.setItem("agronotasAuto", String(id));
  else localStorage.removeItem("agronotasAuto");
  document.getElementById("capaVisor").innerHTML = "";
  const esNuevo = !localStorage.getItem(CLAVE);
  cargar();
  if(esNuevo && id!==1){ // proyecto nuevo: parte limpio, sin los cuarteles de Total Fruit
    D.cuarteles = []; D.fundos = []; guardar();
  }
  idb = null;
  try{ await abrirIDB(); }
  catch(e){ alert("No se pudo abrir el almacén de fotos: "+e.message); }
  nav.tab = "panel";
  render();
}
function nuevoProyecto(){
  const n = prompt("Nombre del nuevo proyecto (ej: Fundo Los Maquis):"); if(!n || !n.trim()) return;
  const s = prompt("Subtítulo — empresa o zona (opcional):")||"";
  const c = prompt("Clave para entrar (opcional; ojo: es una clave simple, no cifrado):")||"";
  const l = proysLista()||[];
  const id = Math.max(0, ...l.map(x=>x.id)) + 1;
  l.push({id, nombre:n.trim(), sub:s.trim(), clave:c.trim(), creado:hoy()});
  proysGuardar(l);
  pantallaProyectos();
}
function salirProyecto(){
  localStorage.removeItem("agronotasAuto");
  PROY = null;
  pantallaProyectos();
}

/* ================== INICIO ================== */
(async function init(){
  iniciarProyectos();
  if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
    try{ navigator.serviceWorker.register("sw.js"); }catch(e){}
  }
})();

function render(){

  document.getElementById("topbar").innerHTML =
    `<div style="flex:1;min-width:180px"><h1>${t}<span class="sub">${PROY? esc(PROY.nombre) : "AgroNotas"} · ${fmtF(hoy())}</span></h1></div>
    <div class="acciones">
      <button class="btn" onclick="formNota()">${ic("plus")} Nota</button>
      <button class="btn sec" onclick="formLabor()">${ic("plus")} Labor</button>
      <button class="btn sec" onclick="formReg()">${ic("plus")} Registro</button>
      <button class="btn sec" onclick="abrirCalc()">${ic("calc")} Calc</button>
    </div>`;
  document.getElementById("tabbar").innerHTML =
    `<div class="marca-r">${ICO.marca}</div>` +
    TABS.map(x=>`${x.id==="datos"?'<button class="esp"></button>':""}<button class="${nav.tab===x.id?"act":""}" onclick="ir('${x.id}')">${ICO[x.id]||""}${x.lab}</button>`).join("");
  const vistas = {panel:vPanel, notas:vNotas, listas:vListas, plan:vPlan, reg:vReg, tab:vTab, noti:vNoticias, calcfito:vCalcFito, aplic:vAplic, datos:vDatos};
  document.getElementById("app").innerHTML = vistas[nav.tab]();
  if(nav.tab!=="panel" && geoWatch){ navigator.geolocation.clearWatch(geoWatch); geoWatch = null; } // ahorra batería fuera del mapa
  const posrender = {notas:posNotas, panel:posPanel, reg:posNotas, noti:posNoticias}[nav.tab];
  if(posrender) posrender();
}

const CL_COLORS = ["#2e7d32","#00796b","#1565c0","#b26a00","#6d4c41","#5e35b1","#c62828","#455a64"];
function clLists(){ D.checklists = D.checklists || []; return D.checklists; }
function clActiva(){ const L=clLists(); if(!L.length) return null; let a=L.find(x=>x.id===nav.clActiva); if(!a){ a=L[0]; nav.clActiva=a.id; } return a; }
function clColorDe(l){ return (l&&l.color) || CL_COLORS[0]; }
function vListas(){ return `<div id="clView">${clViewHTML()}</div>`; }
function clViewHTML(){
  const L=clLists(), a=clActiva();
  let h=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">`;
  h+=L.map(function(l){ const p=(l.items||[]).filter(function(i){return !i.ok;}).length; const act=a&&a.id===l.id; const c=clColorDe(l); return `<button type="button" onclick="clSel(${l.id})" style="display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:22px;border:2px solid ${c};background:${act?c:'#fff'};color:${act?'#fff':'var(--txt)'};font-weight:700;font-size:15px;cursor:pointer">${esc(l.nombre)}${p?`<span style="min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;border-radius:10px;background:${act?'rgba(255,255,255,.28)':c};color:#fff;font-size:12px">${p}</span>`:""}</button>`; }).join("");
  h+=`<button type="button" onclick="clNueva()" style="padding:10px 16px;border-radius:22px;border:2px dashed var(--borde);background:#fff;color:var(--txt2);font-weight:700;font-size:15px;cursor:pointer">＋ Nueva lista</button></div>`;
  if(!L.length) return h+`<div class="vacio"><span class="ico">🗒️</span>Crea tu primera lista para anotar pendientes o ideas y tenerlas siempre a mano.</div>`;
  const c=clColorDe(a), items=a.items||[], done=items.filter(function(i){return i.ok;}).length, tot=items.length, pct=tot?Math.round(done/tot*100):0;
  h+=`<div class="card" style="border-top:5px solid ${c};padding-top:14px">`;
  h+=`<div class="fila" style="justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:800;font-size:21px">${esc(a.nombre)}</div><div style="display:flex;gap:6px"><button class="btn sec chico" onclick="clRename(${a.id})">✏️</button><button class="btn sec chico" style="color:var(--rojo)" onclick="clDelLista(${a.id})">🗑️</button></div></div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:10px">`+CL_COLORS.map(function(cc){ return `<button type="button" onclick="clColor(${a.id},'${cc}')" style="width:24px;height:24px;border-radius:50%;background:${cc};border:${a.color===cc?'3px solid #263238':'2px solid #fff'};box-shadow:0 0 0 1px #cfd8d3;cursor:pointer"></button>`; }).join("")+`</div>`;
  h+=`<div style="height:9px;background:#eef1ec;border-radius:6px;overflow:hidden;margin-bottom:4px"><div style="width:${pct}%;height:100%;background:${c};transition:width .25s"></div></div>`;
  h+=`<div class="muted" style="font-size:12.5px;margin-bottom:12px">${done}/${tot} hechas${(tot>0&&done===tot)?" · ¡lista lista! 🎉":""}</div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:12px"><input id="clNuevo" placeholder="Anota algo y aprieta Enter…" style="flex:1;padding:14px 15px;border:1.5px solid var(--borde);border-radius:13px;font-size:16px" onkeydown="if(event.key==='Enter'){event.preventDefault();clAdd();}"><button type="button" onclick="clAdd()" style="width:52px;height:52px;flex:0 0 auto;border-radius:13px;border:none;background:${c};color:#fff;font-size:26px;line-height:1;cursor:pointer">＋</button></div>`;
  const pend=items.map(function(it,i){return {it:it,i:i};}).filter(function(x){return !x.it.ok;});
  const hechas=items.map(function(it,i){return {it:it,i:i};}).filter(function(x){return x.it.ok;});
  if(!items.length) h+=`<div class="muted" style="font-size:13.5px;padding:8px 0">Lista vacía. Escribe arriba para agregar el primer pendiente.</div>`;
  h+=pend.map(function(x,idx){ return clItemHTML(a,x,idx>0); }).join("");
  if(hechas.length){
    nav.clHechas=nav.clHechas||{}; const ab=nav.clHechas[a.id]===true;
    h+=`<div class="fila" style="justify-content:space-between;align-items:center;margin-top:10px;padding-top:6px;border-top:1px solid #eef1ec"><button type="button" onclick="clHechasTgl(${a.id})" style="border:none;background:none;font-weight:700;font-size:13px;color:var(--txt2);cursor:pointer">${ab?"▾":"▸"} Hechas (${hechas.length})</button><button class="btn sec chico" onclick="clLimpiar(${a.id})">🧹 Vaciar hechas</button></div>`;
    if(ab) h+=hechas.map(function(x){ return clItemHTML(a,x,false); }).join("");
  }
  h+=`</div>`;
  return h;
}
function clItemHTML(l,x,canUp){
  const it=x.it, i=x.i, c=clColorDe(l);
  if(nav.clEdit && nav.clEdit.id===l.id && nav.clEdit.i===i){
    return `<div style="display:flex;gap:8px;align-items:center;padding:8px 0"><input id="clEditInp" value="${esc(it.t)}" style="flex:1;padding:12px;border:2px solid ${c};border-radius:11px;font-size:16px" onkeydown="if(event.key==='Enter'){event.preventDefault();clEditSave(${l.id},${i},this.value);}else if(event.key==='Escape'){clEditCancel();}"><button type="button" class="btn chico" style="background:${c}" onclick="clEditSave(${l.id},${i},document.getElementById('clEditInp').value)">OK</button></div>`;
  }
  return `<div style="display:flex;align-items:center;gap:13px;padding:13px 2px;border-bottom:1px solid #eef1ec;${it.ok?'opacity:.5':''}">
    <input type="checkbox" ${it.ok?"checked":""} onchange="clToggle(${l.id},${i})" style="width:27px;height:27px;flex:0 0 auto;accent-color:${c};cursor:pointer">
    <span onclick="clEditStart(${l.id},${i})" style="flex:1;font-size:16.5px;line-height:1.25;cursor:text;${it.ok?'text-decoration:line-through':''}">${esc(it.t)}</span>
    ${(clLists().length>1)?`<button type="button" onclick="clMover(${l.id},${i})" title="Mover a otra lista" style="border:none;background:none;font-size:17px;color:var(--txt2);cursor:pointer;padding:2px 5px">⇄</button>`:""}
    ${canUp?`<button type="button" onclick="clUp(${l.id},${i})" title="Subir" style="border:none;background:none;font-size:19px;color:var(--txt2);cursor:pointer;padding:2px 5px">↑</button>`:""}
    <button type="button" onclick="clDel(${l.id},${i})" title="Borrar" style="border:none;background:none;font-size:18px;color:#c62828;cursor:pointer;padding:2px 5px">✕</button>
  </div>`;
}
function clRefresh(foc){ const c=document.getElementById("clView"); if(c){ c.innerHTML=clViewHTML(); if(foc){ const inp=document.getElementById("clNuevo"); if(inp) inp.focus(); } } }
function clSel(id){ nav.clActiva=id; nav.clEdit=null; clRefresh(false); }
function clAdd(){ const a=clActiva(); if(!a) return; const inp=document.getElementById("clNuevo"); const t=(inp?inp.value:"").trim(); if(!t) return; a.items=a.items||[]; a.items.push({t:t, ok:false}); guardar(); clRefresh(true); }
function clToggle(id,i){ const l=clLists().find(function(x){return x.id===id;}); if(l&&l.items&&l.items[i]){ l.items[i].ok=!l.items[i].ok; guardar(); clRefresh(false); } }
function clDel(id,i){ const l=clLists().find(function(x){return x.id===id;}); if(l&&l.items){ l.items.splice(i,1); guardar(); clRefresh(false); } }
function clUp(id,i){ const l=clLists().find(function(x){return x.id===id;}); if(!l||!l.items||!l.items[i]) return; let j=i-1; while(j>=0 && l.items[j].ok) j--; if(j<0) return; const t=l.items.splice(i,1)[0]; l.items.splice(j,0,t); guardar(); clRefresh(false); }
function clEditStart(id,i){ nav.clEdit={id:id,i:i}; clRefresh(false); const inp=document.getElementById("clEditInp"); if(inp){ inp.focus(); try{ inp.setSelectionRange(inp.value.length,inp.value.length); }catch(e){} } }
function clEditCancel(){ nav.clEdit=null; clRefresh(false); }
function clEditSave(id,i,val){ const l=clLists().find(function(x){return x.id===id;}); const t=(val||"").trim(); if(l&&l.items&&l.items[i]){ if(t) l.items[i].t=t; else l.items.splice(i,1); } nav.clEdit=null; guardar(); clRefresh(false); }
function clLimpiar(id){ const l=clLists().find(function(x){return x.id===id;}); if(!l) return; if(!confirm("¿Vaciar los ítems ya hechos de esta lista?")) return; l.items=(l.items||[]).filter(function(i){return !i.ok;}); guardar(); clRefresh(false); }
function clHechasTgl(id){ nav.clHechas=nav.clHechas||{}; nav.clHechas[id]=!nav.clHechas[id]; clRefresh(false); }
function clNueva(){ abrirModal("＋ Nueva lista", campoF("cl_nom","Nombre de la lista","text","",'placeholder="Ej: Comprar, Arreglar, Ideas"'), function(){ const n=(v("cl_nom")||"").trim(); if(!n){ alert("Ponle un nombre a la lista."); return false; } const id=nid(); const color=CL_COLORS[clLists().length % CL_COLORS.length]; clLists().push({id:id, nombre:n, color:color, items:[]}); nav.clActiva=id; }, "Crear"); }
function clRename(id){ const l=clLists().find(function(x){return x.id===id;}); if(!l) return; abrirModal("✏️ Renombrar lista", campoF("cl_nom","Nombre","text",l.nombre), function(){ const n=(v("cl_nom")||"").trim(); if(!n){ alert("Ponle un nombre."); return false; } l.nombre=n; }, "Guardar"); }
function clColor(id,color){ const l=clLists().find(function(x){return x.id===id;}); if(l){ l.color=color; guardar(); clRefresh(false); } }
function clMover(id,i){ const l=clLists().find(function(x){return x.id===id;}); if(!l||!l.items||!l.items[i]) return; const otras=clLists().filter(function(x){return x.id!==id;}); if(!otras.length){ alert("No hay otra lista. Crea una primero con ＋ Nueva lista."); return; } const it=l.items[i]; abrirModal("⇄ Mover a otra lista", `<div class="muted" style="margin-bottom:10px">Mover «${esc(it.t)}» a:</div>`+otras.map(function(x){ return `<button type="button" class="btn full" style="margin-bottom:8px;background:${clColorDe(x)}" onclick="clMoverA(${id},${i},${x.id})">${esc(x.nombre)}</button>`; }).join(""), null, "Cancelar"); }
function clMoverA(fromId,i,toId){ const from=clLists().find(function(x){return x.id===fromId;}), to=clLists().find(function(x){return x.id===toId;}); if(!from||!to||!from.items||!from.items[i]) return; const it=from.items.splice(i,1)[0]; to.items=to.items||[]; to.items.push(it); nav.clEdit=null; guardar(); cerrarModal(); render(); }
function clDelLista(id){ const l=clLists().find(function(x){return x.id===id;}); if(!l) return; if(!confirm('¿Borrar la lista "'+l.nombre+'" y todos sus ítems?')) return; D.checklists=clLists().filter(function(x){return x.id!==id;}); nav.clActiva=null; nav.clEdit=null; guardar(); render(); }

function vPanel(){
  const haTot = D.cuarteles.reduce((s,q)=>s+(+q.ha||0),0);
  const haPlant = D.cuarteles.filter(q=>q.especie!=="Por plantar").reduce((s,q)=>s+(+q.ha||0),0);
  const hoyISO = hoy();
  const pend = D.labores.filter(l=>l.estado!=="hecha" && l.estado!=="finalizada");
  const atras = pend.filter(l=>l.estado==="pendiente" && (l.fecha2||l.fecha)<hoyISO);
  const deHoy = D.labores.filter(l=>l.estado==="encurso" || ((l.estado==="pendiente"||l.estado==="hecha"||l.estado==="finalizada") && (l.fecha===hoyISO || (l.fecha2 && l.fecha<=hoyISO && hoyISO<=l.fecha2))));
  const sem = semanaDe(hoyISO);
  const deSemana = D.labores.filter(l=>l.fecha>=sem[0] && l.fecha<=sem[6]);
  const notasRec = [...D.notas].sort((a,b)=>b.fh.localeCompare(a.fh));
  const fijadas = notasRec.filter(n=>n.fijada);
  const urg = D.notas.filter(n=>n.cat==="Urgente" && !n.resuelta);

  let h = "";

  /* Urgencias: franja siempre arriba */
  if(urg.length){
    const u = urg[0];
    h += `<div class="urgente-card" onclick="verNota(${u.id})">
      <span style="width:9px;height:9px;border-radius:50%;background:var(--urg);flex:0 0 auto"></span>
      <div style="flex:1;font-size:13.5px;min-width:0"><b>${urg.length===1?"1 urgente sin resolver:":urg.length+" urgentes sin resolver. La última:"}</b>
        ${esc(u.texto).slice(0,90)}${u.texto.length>90?"…":""} — ${esc(u.fundo)}${u.cuartel?" · "+esc(u.cuartel):""}</div>
      <button class="btn sec chico" onclick="event.stopPropagation();verNota(${u.id})">Ver nota</button>
    </div>`;
  }

  /* Recordatorios */
  const avisos = D.notas.filter(n=>n.aviso && n.aviso<=hoyISO && (!n.avisoFin || hoyISO<=n.avisoFin));
  if(avisos.length) h += `<div class="card" style="border:1px solid #e2c07a;background:#fdf8ec">
    <div class="w-tit">${ic("bell")} Recordatorios (${avisos.length})</div>
    ${avisos.sort((a,b)=>a.aviso.localeCompare(b.aviso)).map(n=>`<div class="fila" style="align-items:center">
      <div style="flex:1">${miniNota(n)}</div>
      <button class="btn sec chico" onclick="cerrarAviso(${n.id})">✓ Listo</button></div>`).join("")}</div>`;

  /* Estado general + clima */
  h += `<div class="g2p">
    <div class="card"><div class="w-tit">Estado general</div>
      <div style="display:flex;font-variant-numeric:tabular-nums">
        <div style="flex:1;cursor:pointer" onclick="ir('datos')"><div style="font-size:24px;font-weight:700;color:var(--p)">${num(haPlant)}</div><div class="muted" style="font-size:11.5px">ha plantadas · ${num(haTot)} tot.</div></div>
        <div style="flex:1;cursor:pointer" onclick="nav.planVista='dia';nav.diaSel=null;ir('plan')"><div style="font-size:24px;font-weight:700">${deHoy.length}</div><div class="muted" style="font-size:11.5px">labores hoy</div></div>
        <div style="flex:1;cursor:pointer" onclick="nav.planVista='sem';nav.semanaIni=null;ir('plan')"><div style="font-size:24px;font-weight:700">${pend.length}</div><div class="muted" style="font-size:11.5px">pendientes</div></div>
        <div style="flex:1;cursor:pointer" onclick="nav.planVista='sem';nav.semanaIni=null;ir('plan')"><div style="font-size:24px;font-weight:700;color:var(--urg)">${atras.length}</div><div class="muted" style="font-size:11.5px">atrasadas</div></div>
      </div></div>
    <div class="card"><div class="w-tit">Clima · ${esc(zonaClima())}</div>
      <div id="climaW" class="muted" style="font-size:13px">cargando pronóstico…</div></div>
  </div>`;

  /* Pregúntale a tus datos (IA) */
  h += `<div class="card">
    <div class="w-tit">${ic("search")} Pregúntale a tus datos <span class="badge b-azul">IA</span></div>
    <div class="muted">Pregunta en lenguaje normal sobre tus notas, registros, labores y cuarteles. Necesita señal.</div>
    <div class="fila" style="margin-top:8px">
      <input id="iaBuscaQ" placeholder="Ej: ¿cuándo apliqué por última vez en San Joaquín?" style="flex:1;padding:11px;border:1.5px solid var(--borde);border-radius:10px;font-size:16px;min-width:150px" onkeydown="if(event.key==='Enter'){event.preventDefault();iaBuscar();}">
      <button class="btn chico" onclick="iaBuscar()">Preguntar</button>
    </div>
    <div id="iaBuscaR" style="margin-top:10px;white-space:pre-wrap;font-size:14.5px"></div>
  </div>`;

  /* Mapa + hoy + fotos */
  h += `<div class="gmapa">
    <div class="card mapa-wrap" id="mapaCard"><div class="w-tit">Mapa · notas en terreno</div>
      <div id="mapaPanel"></div>
      <div class="mapa-tools" id="mapaHerr"></div>
      <div class="mapa-dibbar" id="mapaDibBar"></div>
      <div class="mapa-med" id="mapaMedPanel" style="display:none"></div>
    </div>
    <div class="card" style="display:flex;flex-direction:column;max-height:470px;overflow:hidden">
      <div class="w-tit">Hoy · ${fmtDia(hoyISO)}</div>
      <div style="overflow-y:auto;flex:1;margin-top:2px;padding-right:2px">
        ${deHoy.length? deHoy.map(l=>filaLabor(l,true)).join("") : `<div class="muted">Sin labores hoy. Toca ＋ Labor para agregar.</div>`}
      </div>
    </div>
  </div>`;

  h += panelAvances();

  /* Semana + notas recientes */
  let hSem = `<div class="card"><div class="w-tit">${ic("calendar")} Esta semana</div>`;
  if(!deSemana.length) hSem += `<div class="muted">Sin labores planificadas. Toca Plan para agregar.</div>`;
  else{
    const porDia = {};
    deSemana.forEach(l=>{ (porDia[l.fecha]=porDia[l.fecha]||[]).push(l); });
    hSem += Object.keys(porDia).sort().map(f=>`
      <div class="dia-h ${f===hoyISO?"hoy":""}" style="margin:10px 0 4px">${f===hoyISO?"Hoy":fmtDia(f)}</div>
      ${porDia[f].map(l=>filaLabor(l,true)).join("")}`).join("");
  }
  hSem += `</div>`;
  let hNot = `<div class="card"><div class="w-tit">${ic("note")} Notas recientes</div>`;
  const rec = [...fijadas, ...notasRec.filter(n=>!n.fijada)].slice(0,5);
  hNot += rec.length? rec.map(n=>miniNota(n)).join("") : `<div class="muted">Aún no hay notas. Toca ＋ Nota para crear la primera.</div>`;
  hNot += `</div>`;
  h += `<div class="g2p" style="grid-template-columns:1.4fr 1fr">${hSem}${hNot}</div>`;
  h += pintarWidgets();
  h += `<div style="text-align:center;margin:6px 0 12px"><button class="btn sec chico" onclick="agregarWidget()">＋ Agregar widget</button></div>`;
  return h;
}

/* ---------- Widgets configurables del panel ---------- */
function widgetCard(w, inner, titulo){
  const i = D.widgets.findIndex(x=>x.id===w.id), n = D.widgets.length;
  return `<div class="card"><div class="fila" style="justify-content:space-between;align-items:center;margin-bottom:6px">
    <div class="w-tit" style="margin:0">${titulo}</div>
    <div class="fila" style="gap:2px">
      ${i>0? `<button class="qx-cat" onclick="moverWidget(${w.id},-1)" title="Subir">↑</button>`:""}
      ${i<n-1? `<button class="qx-cat" onclick="moverWidget(${w.id},1)" title="Bajar">↓</button>`:""}
      <button class="qx-cat" onclick="quitarWidget(${w.id})" title="Quitar">✕</button>
    </div></div>${inner}</div>`;
}
function pintarWidgets(){
  return (D.widgets||[]).map(w=>{ try{ return widgetHTML(w); }catch(e){ return ""; } }).join("");
}
function widgetHTML(w){
  if(w.tipo==="checklist"){
    const items = [];
    for(const n of D.notas) for(const c of (n.check||[])) if(!c.ok) items.push({n, t:c.t});
    const h = items.length?
      items.slice(0,8).map(x=>`<div class="met" style="padding:3px 0;cursor:pointer" onclick="formNota(${x.n.id})">☐ ${esc(x.t)} <span class="muted">· ${esc(x.n.fundo)}</span></div>`).join("")
      + (items.length>8? `<div class="muted" style="font-size:11.5px">…y ${items.length-8} más</div>`:"")
      : `<div class="muted">Nada pendiente 🎉</div>`;
    return widgetCard(w, h, `✅ Checklists pendientes (${items.length})`);
  }
  if(w.tipo==="urgentes"){
    const u = D.notas.filter(n=>n.cat==="Urgente" && !n.resuelta);
    return widgetCard(w, u.length? u.slice(0,5).map(n=>miniNota(n)).join("") : `<div class="muted">Sin urgencias abiertas 👍</div>`, `🔥 Urgencias (${u.length})`);
  }
  if(w.tipo==="fijadas"){
    const f = D.notas.filter(n=>n.fijada);
    return widgetCard(w, f.length? f.slice(0,5).map(n=>miniNota(n)).join("") : `<div class="muted">No hay notas fijadas.</div>`, `${ic("pin2")} Fijadas (${f.length})`);
  }
  if(w.tipo==="lluvia"){
    const anio = w.anio || (new Date()).getFullYear();
    const locNom = (w.loc&&w.loc.nom) || zonaClima();
    return widgetCard(w, `<div class="fila" style="justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <div class="fila" style="gap:6px;align-items:center">
          <button class="btn sec chico" style="min-height:32px;padding:3px 11px" onclick="lluviaAnio(${w.id},-1)">◀</button>
          <b style="font-size:16px;min-width:44px;text-align:center">${anio}</b>
          <button class="btn sec chico" style="min-height:32px;padding:3px 11px" onclick="lluviaAnio(${w.id},1)">▶</button>
          <button class="btn sec chico" style="min-height:32px;padding:3px 12px" onclick="lluviaZona(${w.id})">${ic("pin")} ${esc(locNom)} ▾</button>
        </div>
        <div class="fila" style="gap:6px">
          <button class="btn sec chico" style="min-height:32px;padding:3px 11px" onclick="lluviaOficialIA(${w.id})">${ic("search")} Oficial</button>
          <button class="btn chico" style="min-height:32px;padding:3px 12px;background:var(--azul)" onclick="lluviaAnalizar(${w.id})">${ic("cloud")} Analizar</button>
        </div>
      </div>
      <div id="wLluvia_${w.id}" class="muted" style="font-size:12px">cargando lluvia…</div>
      <div id="wLluviaIA_${w.id}" style="font-size:12.5px;margin-top:8px;white-space:pre-wrap;line-height:1.45"></div>`,
      `🌧 Lluvia por mes`);
  }
  if(w.tipo==="variedades"){
    const por = {};
    for(const q of D.cuarteles){ const k = q.variedad||"Sin variedad"; por[k] = (por[k]||0) + (+q.ha||0); }
    const top = Object.entries(por).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const mx = Math.max(...top.map(x=>x[1]), 1);
    const h = top.map(([k,ha])=>`<div class="fila" style="align-items:center;gap:8px;padding:2px 0">
      <div style="flex:0 0 110px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(k)}</div>
      <div style="flex:1;background:#eef1ec;border-radius:5px"><div style="width:${Math.round(ha/mx*100)}%;background:var(--p,#1e7a4c);border-radius:5px;height:12px"></div></div>

    const g = D.gesagro, hoyI = hoy();
    const sumaD = (f,n)=>{ const d = new Date(f+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
    const carDe = (pr,esp)=>{ const ce = (pr&&pr.carenciaEsp)||{}; return (esp && ce[esp]!=null && ce[esp]!=="")? +ce[esp] : ((pr&&+pr.carencia)||0); };

  }
  if(w.tipo==="supmapa"){
    const filas = [];
    for(const p of D.mapoly){
      if(p.forma!=="area" || p.tipo!=="Cuartel") continue;
      const q = cuartelDe(p); if(!q || !+q.ha) continue;
      const dib = geoArea(p.pts)/10000;
      filas.push({n:`${q.fundo} · ${q.nombre}`, cat:+q.ha, dib, dif:(dib-q.ha)/q.ha*100});
    }
    filas.sort((a,b)=>Math.abs(b.dif)-Math.abs(a.dif));
    const h = filas.slice(0,8).map(f=>`<div class="met" style="padding:2px 0">${esc(f.n)}: catálogo <b>${num(f.cat)}</b> · mapa <b>${num(f.dib)}</b> ha <span style="color:${Math.abs(f.dif)>10?"var(--rojo,#c62828)":"#7a7d79"};font-weight:600">(${f.dif>0?"+":""}${Math.round(f.dif)}%)</span></div>`).join("");
    return widgetCard(w, h||`<div class="muted">Dibuja cuarteles en el mapa (enlazados al catálogo) para comparar superficies.</div>`, "🧮 Superficie: catálogo vs mapa");
  }
  if(w.tipo==="respaldo"){
    const u = D.ultimoRespaldo;
    const dias = u? Math.floor((new Date() - new Date(u+"T12:00:00"))/86400000) : null;
    const rojo = dias===null || dias>7;
    return widgetCard(w, `<div style="font-size:14px;${rojo?"color:var(--rojo,#c62828);font-weight:700":""}">${
      dias===null? "Nunca has descargado un respaldo desde esta app 😬" :
      dias===0? "Respaldo descargado hoy ✅" :
      `Último respaldo hace ${dias} día${dias===1?"":"s"}${rojo?" — ¡toca hacer uno!":" ✅"}`}</div>
      <button class="btn sec chico" style="margin-top:8px" onclick="ir('datos')">${ic("package")} Ir a Datos</button>`, ic("save")+" Respaldo");
  }
  if(w.tipo==="registros"){
    const d=new Date(); d.setDate(d.getDate()-90); const desde=d.toISOString().slice(0,10);
    const por={}; for(const r of D.registros) if((r.fecha||"")>=desde) por[r.tipo]=(por[r.tipo]||0)+1;
    const top=Object.entries(por).sort((a,b)=>b[1]-a[1]); const mx=Math.max(...top.map(x=>x[1]),1);
    const h = top.length? top.map(([k,c])=>`<div class="fila" style="align-items:center;gap:8px;padding:2px 0">
      <div style="flex:0 0 108px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${icoReg(k)} ${esc(k)}</div>
      <div style="flex:1;background:#eef1ec;border-radius:5px"><div style="width:${Math.round(c/mx*100)}%;background:var(--azul,#2563eb);border-radius:5px;height:12px"></div></div>
      <div style="flex:0 0 28px;text-align:right;font-size:12px;font-weight:700">${c}</div></div>`).join("") : `<div class="muted">Sin registros en los últimos 90 días.</div>`;
    return widgetCard(w, h, "📋 Registros (últimos 90 días)");
  }
  if(w.tipo==="ultimas"){
    const rec=[...D.notas].sort((a,b)=>(b.fh||"").localeCompare(a.fh||"")).slice(0,5);
    return widgetCard(w, rec.length? rec.map(n=>miniNota(n)).join("") : `<div class="muted">Aún no hay notas.</div>`, "🕒 Últimas notas");
  }
  if(w.tipo==="hafundo"){
    const por={}; for(const q of D.cuarteles) por[q.fundo]=(por[q.fundo]||0)+(+q.ha||0);
    const top=Object.entries(por).sort((a,b)=>b[1]-a[1]); const mx=Math.max(...top.map(x=>x[1]),1);
    const h = top.length? top.map(([k,ha])=>`<div class="fila" style="align-items:center;gap:8px;padding:2px 0">
      <div style="flex:0 0 110px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(k)}</div>
      <div style="flex:1;background:#eef1ec;border-radius:5px"><div style="width:${Math.round(ha/mx*100)}%;background:var(--p,#1e7a4c);border-radius:5px;height:12px"></div></div>
      <div style="flex:0 0 62px;text-align:right;font-size:12px;font-weight:700">${num(ha)} ha</div></div>`).join("") : `<div class="muted">Sin cuarteles aún.</div>`;
    return widgetCard(w, h, "🏡 Superficie por fundo");
  }
  if(w.tipo==="fotos"){ return widgetCard(w, `<div class="fotos-g" id="fotosRec"></div>`, "📷 Fotos recientes"); }
  return "";
}

async function cargarHeladas(){
  const ws = (D.widgets||[]).filter(w=>w.tipo==="helada");
  if(!ws.length) return;
  if(!navigator.onLine){
    for(const w of ws){ const el = document.getElementById("wHelada_"+w.id); if(el) el.textContent = "necesita internet para el pronóstico"; }
    return;
  }
  try{
    const loc = D.lluviaLoc || LOC_DEF;
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lng}&daily=temperature_2m_min&timezone=auto&forecast_days=7`);
    const j = await r.json();
    const fs = j.daily.time, ts = j.daily.temperature_2m_min;
    for(const w of ws){
      const el = document.getElementById("wHelada_"+w.id); if(!el) continue;

      el.innerHTML = (malos.length? `<div style="color:var(--rojo,#c62828);font-weight:700;margin-bottom:2px">⚠️ ¡Posible helada!</div>`:"")
        + (malos.length?
          malos.map(x=>`<div class="met" style="padding:2px 0"><b>${fmtDia(x.d)}</b> · mínima ${x.t}°C</div>`).join("") :
          `<div class="muted">Sin riesgo en los próximos 7 días ✅ (mínima ${Math.min(...ts)}°C)</div>`);
    }
  }catch(e){}
}

let LL_RT = {}; // datos de lluvia en memoria (por widget), para el análisis IA — no se persiste
async function cargarLluviaWidgets(){
  const ws = (D.widgets||[]).filter(w=>w.tipo==="lluvia");
  if(!ws.length) return;
  const MES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const anioAct = (new Date()).getFullYear();
  for(const w of ws){
    const cont = document.getElementById("wLluvia_"+w.id); if(!cont) continue;
    const anio = w.anio || anioAct;
    const loc = w.loc || D.lluviaLoc || LOC_DEF;
    const locNom = (w.loc&&w.loc.nom) || zonaClima();
    const man = new Array(12).fill(0);
    for(const r of D.registros) if(r.tipo==="Lluvia" && (r.fecha||"").slice(0,4)==String(anio)){ const m=+((r.fecha||"").slice(5,7))-1; if(m>=0&&m<12) man[m]+=(+r.mm||0); }
    let mm = null, fuente = "";
    LL_RT[w.id] = LL_RT[w.id] || {cache:{}};
    if(navigator.onLine){
      try{
        const fin = (anio < anioAct)? `${anio}-12-31` : hoy();
        const j = await (await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${loc.lat}&longitude=${loc.lng}&start_date=${anio}-01-01&end_date=${fin}&daily=precipitation_sum&timezone=auto`)).json();
        const t = (j.daily&&j.daily.time)||[], p = (j.daily&&j.daily.precipitation_sum)||[];
        if(t.length){ mm = new Array(12).fill(0); t.forEach((d,i)=>{ const m=+d.slice(5,7)-1; if(m>=0&&m<12) mm[m]+=(+p[i]||0); }); fuente="clima real (Open-Meteo)"; LL_RT[w.id].cache[anio]=mm; }
      }catch(e){ mm = null; }
    }
    if(!mm && LL_RT[w.id].cache[anio]){ mm = LL_RT[w.id].cache[anio]; }
    const hayMan = man.some(x=>x>0);
    const of = (w.oficial && w.oficial[anio]) || null;
    let datos, faltan = 0;
    if(hayMan){ datos = man; fuente = "🌧️ tu pluviómetro (oficial)"; }
    else if(of && Array.isArray(of.meses) && of.meses.some(x=>x!=null)){
      datos = of.meses.map(x=> x==null? 0 : +x);
      faltan = of.meses.filter(x=>x==null).length;
      fuente = "DMC · IA" + (of.estacion? " · "+of.estacion : "");
    }
    else if(mm){ datos = mm; fuente = "modelo Open-Meteo · estimación"; }
    else { datos = man; fuente = "sin datos"; }
    const tot = datos.reduce((s,x)=>s+x,0);
    const mx = Math.max(...datos, 1);
    const maxi = tot>0? datos.indexOf(Math.max(...datos)) : -1;
    const barras = datos.map((val,i)=>{
      const on = val>0, isMax = i===maxi;
      const hpx = on? Math.round(val/mx*66)+3 : 2;
      const fill = !on? "#e3e8e1" : isMax? "linear-gradient(180deg,#2563eb,#1e4fb8)" : "linear-gradient(180deg,#6fa0e0,#3a72b8)";
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
        <div style="font-size:10px;font-weight:700;height:13px;color:${isMax?"var(--azul,#2563eb)":"#7a8794"}">${on?Math.round(val):""}</div>
        <div style="width:100%;height:72px;display:flex;align-items:flex-end;justify-content:center">
          <div title="${MES[i]}: ${num(val)} mm" style="width:64%;height:${hpx}px;border-radius:5px 5px 0 0;background:${fill}"></div></div>
        <div style="font-size:10px;color:${isMax?"var(--azul,#2563eb)":"#9a9d98"};font-weight:${isMax?800:500}">${MES[i][0]}</div>
      </div>`;
    }).join("");
    cont.innerHTML = `<div style="display:flex;gap:4px;align-items:flex-end;border-bottom:1px solid var(--borde);padding-bottom:6px">${barras}</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px">
        <div><span style="font-size:20px;font-weight:800;color:var(--azul,#2563eb);font-variant-numeric:tabular-nums">${num(tot)}</span> <span class="muted" style="font-size:11px">mm en ${anio}</span></div>
        <div class="muted" style="font-size:10.5px;text-align:right;line-height:1.4">${ic("pin")} ${esc(locNom)}<br>${fuente||"sin datos"}${faltan?` · faltan ${faltan} m. sin dato`:""}</div>
      </div>`;
    LL_RT[w.id].ll = {anio, datos, tot, fuente, locNom};
  }
}

async function iaBuscarWeb(prompt){
  const c = iaCfg();
  if(!c.key) throw {msg:"Configura tu clave de IA en Datos → Inteligencia (IA)."};
  if(navigator.onLine===false) throw {msg:"Sin señal. La búsqueda web necesita internet."};
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(c.modelo)}:generateContent?key=${encodeURIComponent(c.key)}`;
  let resp;
  try{ resp = await fetch(url, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({contents:[{parts:[{text:prompt}]}], tools:[{google_search:{}}]})}); }
  catch(e){ throw {msg:"No se pudo conectar. Revisa tu señal."}; }
  if(!resp.ok){
    let det=""; try{ det=(await resp.json())?.error?.message||""; }catch(_){}
    if(resp.status===400 && /billing|grounding|search|precondition|tool/i.test(det)) throw {msg:"La búsqueda web (grounding) necesita activar facturación en tu proyecto de Google AI Studio. Con el plan gratis puedes usar Analizar, pero no la búsqueda Oficial."};
    if(resp.status===429) throw {msg:"Cuota agotada, intenta más tarde."};
    throw {msg:"Error "+resp.status+(det?": "+det:"")};
  }
  const j = await resp.json();
  const cand = (j.candidates||[])[0]||{};
  const text = ((cand.content&&cand.content.parts)||[]).map(p=>p.text||"").join("");
  const chunks = (cand.groundingMetadata&&cand.groundingMetadata.groundingChunks)||[];
  const fuentes = chunks.map(ch=>ch.web&&(ch.web.title||ch.web.uri)).filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).slice(0,4);
  return {text, fuentes};
}

const CF_ESP = [["all","Todas"],["naranjo","🍊 Naranjos"],["limon","🍋 Limones"],["cerezo","🍒 Cerezos"],["pomelo","🍈 Pomelos"]];
const CF_ESPKEY = {"Naranjo":"naranjo","Limonero":"limon","Cerezo":"cerezo","Pomelo":"pomelo","Por plantar":"plantar"};
/* Unidades de dosis según sólido/líquido. Clave interna + etiqueta visible. */
const CF_UNID_SOL = [["g/100L","g/100 L"],["kg/ha","kg/ha"],["g/ha","g/ha"],["%","%"]];
const CF_UNID_LIQ = [["cc/100L","cc/100 L"],["L/ha","L/ha"],["cc/ha","cc/ha"],["%","%"]];
const CF_UNID_LAB = {"g/100L":"g/100 L","cc/100L":"cc/100 L","kg/ha":"kg/ha","L/ha":"L/ha","g/ha":"g/ha","cc/ha":"cc/ha","%":"%"};
const CF_UNID_PAR = {"g/100L":"cc/100L","cc/100L":"g/100L","kg/ha":"L/ha","L/ha":"kg/ha","g/ha":"cc/ha","cc/ha":"g/ha","%":"%"};
function cfEspKey(e){ return CF_ESPKEY[e] || "otro"; }
function cfP(v){ if(v==null) return NaN; const s=String(v).trim().replace(",","."); const x=parseFloat(s.replace(/[^0-9.\-]/g,"")); return isNaN(x)?NaN:x; }
function cfCLP(n){ return "$" + Math.round(n||0).toLocaleString("es-CL"); }
function cfNum(x,d){ if(x==null||isNaN(x)||!isFinite(x)) return "—"; return (+x).toLocaleString("es-CL",{minimumFractionDigits:d||0,maximumFractionDigits:d||0}); }
function cfQty(v,uP,dec){ if(v==null||isNaN(v)||!isFinite(v)) return "—"; if(Math.abs(v)>0 && Math.abs(v)<1){ const c=v*1000; return cfNum(c, Math.abs(c)<10?1:0)+" "+(uP==="L"?"cc":"g"); } return cfNum(v, dec==null?2:dec)+" "+uP; }
function cfSumaDias(iso,dias){ if(!iso) return ""; const d=new Date(iso+"T00:00:00"); if(isNaN(d)) return ""; d.setDate(d.getDate()+(parseInt(dias,10)||0)); return d.toISOString().slice(0,10); }
function cfDefault(){ return {producto:"", unidad:"kg", unidadDosis:"g/100L", dosis:"", moj:"", estanque:2000, napp:1, fecha:hoy(), carencia:"", carenciaEsp:{}, precioU:"", margen:5, envase:"", filtro:"all", abiertos:{}, sel:{}, mezcla:[]}; }
function cfMigra(pf){
  if(!pf) return;
  if(pf.unidadDosis==null){ // modelo viejo (modo/gHL/kgHa) → nuevo
    if(pf.modo==="ha"){ pf.unidadDosis=(pf.unidad==="L")?"L/ha":"kg/ha"; pf.dosis=(pf.kgHa!=null?pf.kgHa:""); }
    else { pf.unidadDosis=(pf.unidad==="L")?"cc/100L":"g/100L"; pf.dosis=(pf.gHL!=null?pf.gHL:""); }

  if(pf.dosis==null) pf.dosis="";
  if(pf.estanque==null) pf.estanque=2000;
  if(!pf.carenciaEsp||typeof pf.carenciaEsp!=="object") pf.carenciaEsp={};

function cfUProd(){ return cfPF().unidad; }                         // kg | L (sólido/líquido)

/* dosis + unidad → producto por ha (kg o L). Usa mojamiento para unidades por 100 L y %. */
function cfProdHaDe(dose, ud, moj){

    case "kg/ha":  case "L/ha":    return d;
    case "g/ha":   case "cc/ha":   return d/1000;
    case "%":                      return d*m/100;         // % → kg|L por ha (equivale a %×1000 g/100 L)

}

const CF_ESPEMOJI = {naranjo:"🍊",limon:"🍋",pomelo:"🍈",cerezo:"🍒",plantar:"🌱",otro:"🌿"};
function cfCarenciaCuartel(q){ const pf=cfPF(), ce=pf.carenciaEsp||{}, k=cfEspKey(q.especie), v=cfP(ce[k]); let c=isNaN(v)?(parseInt(pf.carencia,10)||0):v; (pf.mezcla||[]).forEach(m=>{ const mc=parseInt(m.carencia,10)||0; if(mc>c) c=mc; }); return c; }

function cfDoseHint(){
  const pf=cfPF(); const d=cfP(pf.dosis); const uP=cfUProd(), uC=cfUConc();
  if(isNaN(d)) return `<span class="muted" style="font-weight:400">Ingresa la dosis y verás el equivalente en ${uP}/ha.</span>`;
  const ph=cfProdHa(), per100=cfPer100(ph), esPor100 = (pf.unidadDosis==="g/100L"||pf.unidadDosis==="cc/100L"||pf.unidadDosis==="%");
  const partes=[`<b>${cfNum(ph,3)} ${uP}/ha</b>`];
  if(!isNaN(per100)){ partes.push(`${cfNum(per100, per100<10?1:0)} ${uC}`); partes.push(`${cfNum(per100/1000,3)} %`); }
  const falta = (esPor100 && !(cfP(pf.moj)>0)) ? ` <span class="muted" style="font-weight:400">(pon mojamiento para el resto)</span>` : (!(cfP(pf.moj)>0)? ` <span class="muted" style="font-weight:400">(pon mojamiento para ver g/100 L)</span>`:"");
  return `≈ ${partes.join("  ·  ")}${falta}`;
}

const CF_PTIPOS = ["all","Insecticida","Acaricida","Fungicida","Bactericida","Nematicida","Herbicida","Regulador de crecimiento","Fertilizante foliar","Bioestimulante","Coadyuvante","Otro"];
function cfCatProd(){ if(!D.catalogos) D.catalogos={}; return D.catalogos.productosFito || (D.catalogos.productosFito=[]); }
function cfPn(v){ const x=cfP(v); return isNaN(x)?null:x; }
function cfProdMid(a,b){ if(a==null&&b==null) return ""; if(b==null) return a; if(a==null) return b; return Math.round(((a+b)/2)*100)/100; }
function cfBadgeTipo(t){ return ({Insecticida:"b-rojo",Acaricida:"b-rojo",Fungicida:"b-verde",Bactericida:"b-verde",Nematicida:"b-verde",Herbicida:"b-gris"})[t]||"b-gris"; }

function cfPickProducto(id){
  const p=cfCatProd().find(x=>x.id===id); if(!p) return;
  if(nav.cfMixTarget){ cfMixFromProd(nav.cfMixTarget,p); nav.cfMixTarget=null; guardar(); cerrarVisor(); render(); return; }
  const pf=cfPF();
  pf.producto=p.n; pf.unidad=p.u||"kg";
  if(p.du){ pf.unidadDosis=p.du; const d=cfProdMid(p.dmin,p.dmax); if(d!=="") pf.dosis=d; }
  const mj=cfProdMid(p.mmin,p.mmax); if(mj!=="") pf.moj=mj;
  if(p.c!=null) pf.carencia=p.c;
  pf.carenciaEsp = (p.ce&&typeof p.ce==="object")? Object.assign({},p.ce) : {};
  if(p.p) pf.precioU=p.p;
  pf.prodId=id;
  guardar(); cerrarVisor(); render();
}

function cfIncluidos(){ const pf=cfPF(); return D.cuarteles.filter(q=>{ const s=pf.sel[q.id]; return s&&s.on; }); }

function cfGuardarRegistro(){
  const pf=cfPF(); const incl=cfIncluidos();
  if(!(pf.producto||"").trim()){ alert("Escribe el producto antes de guardar."); return; }
  if(!incl.length){ alert("Incluye al menos un cuartel para guardar la aplicación."); return; }
  const r=cfCalc(), obj=cfPlagasSel().map(p=>p.n).join(", "), fcTxt=r.fechaCosecha?fmtF(r.fechaCosecha):"—";
  abrirModal(ic("save")+" Guardar aplicación como registro", `
    <div class="muted" style="font-size:13px;margin-bottom:8px">Se guardará <b>${esc(pf.producto)}</b> en <b>${incl.length}</b> cuartel(es) (${cfNum(r.haTot,1)} ha) como <b>planificación pendiente</b>, uno por cuartel. Luego, en <b>Registros</b>, confirmas cada cuartel el día que lo apliques (con su fecha real) y recién ahí queda oficial en el historial.</div>
    <label class="f">Fecha de aplicación<input id="cfr_fecha" type="date" value="${esc(pf.fecha||hoy())}"></label>
    <label class="f">Responsable (opcional)<input id="cfr_resp" type="text" placeholder="Ej: Manuel / jefe de cuadrilla"></label>
    <div class="muted" style="font-size:12.5px">${ic("target")} Objetivo: ${obj?esc(obj):'<i>sin especificar</i>'} · carencia ${parseInt(pf.carencia,10)||0} d · cosecha desde ${fcTxt}</div>
  `, ()=>{
    const fecha=((document.getElementById("cfr_fecha")||{}).value)||pf.fecha||hoy();
    const _cur = incl.map(q=>q.fundo+"/"+q.nombre).sort().join(";");
    const _sig = (pf.producto||"")+"|"+fecha+"|"+obj+"|"+_cur;
    const _bat = {};
    D.registros.forEach(x=>{ if(x.tipo!=="Aplicación") return; const k=x.aplId||("s|"+x.fecha+"|"+x.producto+"|"+x.objetivo); if(!_bat[k]) _bat[k]={p:x.producto,f:x.fecha,o:x.objetivo,c:[]}; _bat[k].c.push(x.fundo+"/"+x.cuartel); });
    const _dup = Object.keys(_bat).some(k=>{ const b=_bat[k]; return ((b.p||"")+"|"+b.f+"|"+(b.o||"")+"|"+b.c.slice().sort().join(";"))===_sig; });
    if(_dup && !confirm("⚠️ Ya guardaste una aplicación IDÉNTICA (mismo producto, fecha, objetivo y cuarteles).\nNo se puede aplicar dos veces lo mismo el mismo día en los mismos cuarteles.\n\n¿Guardar de todas formas?")) return false;
    const resp=(((document.getElementById("cfr_resp")||{}).value)||"").trim();
    const n=cfNapp(), moj=cfP(pf.moj)||0, precio=cfP(pf.precioU)||0, uP=cfUProd(), uLab=cfLabUnid(pf.unidadDosis);
    const aplId="ap"+nid();
    let cnt=0;
    incl.forEach(q=>{
      const ha=cfHaCuartel(q), rha=cfRowHa(q), prod=rha*ha*n, s=cfSelDe(q.id), carQ=cfCarenciaCuartel(q), fcQ=cfFechaCosechaCuartel(q);
      const doseC=!isNaN(cfP(s.dosis))?cfP(s.dosis):cfDosisGlobal();
      const dosisTxt=`${cfNum(doseC,doseC<10?2:0)} ${uLab} → ${cfQty(rha,uP)}/ha`;
      const obs=`Sup ${cfNum(ha,2)} ha · producto ${cfQty(prod,uP)}`
        +(precio>0?` · costo ${cfCLP(prod*precio)}`:"")
        +(fcQ?` · cosecha desde ${fmtF(fcQ)}`:"")
        +(n>1?` · ${n} aplic.`:"")+(resp?` · resp: ${resp}`:"");
      const mezclaReg = cfMezcla().map(function(mm){ var mph=cfProdHaDe(mm.dosis,mm.unidadDosis,moj); if(isNaN(mph)) mph=0; var md=cfP(mm.dosis); var dtxt=(isNaN(md)?"":cfNum(md,md<10?2:0)+" "+cfLabUnid(mm.unidadDosis))+(mph>0?" → "+cfQty(mph,mm.unidad)+"/ha":""); return {n:mm.producto, dosis:dtxt, uP:mm.unidad, prodHa:mph, total:mph*ha*n, costo:mph*ha*n*(cfP(mm.precioU)||0), carencia:(parseInt(mm.carencia,10)||0)}; }).filter(function(mm){ return (mm.n||"").trim(); });
      D.registros.push({ id:nid(), aplId:aplId, estado:"pendiente", fechaPlan:fecha, tipo:"Aplicación", fecha:fecha, fundo:q.fundo, cuartel:q.nombre,

      cnt++;
    });
    setTimeout(function(){ alert("✓ Guardé la planificación en "+cnt+" cuartel(es) como PENDIENTE.\nConfírmalos en Registros (botón ✓ Confirmar) a medida que los apliques."); }, 60);
  }, ic("save")+" Guardar "+incl.length+" registro(s)");
}

MOJAMIENTO: ${cfNum(cfP(pf.moj)||0,0)} L/ha · N° repeticiones: ${cfNapp()} · Estanque: ${cfNum(cfP(pf.estanque)||0,0)} L (${r.nEst} estanques por pasada)
FECHA DE APLICACION: ${pf.fecha?fmtF(pf.fecha):"—"}

INSUMOS A PREPARAR: neto ${cfNum(r.neto,2)} ${uP}, con margen ${cfNum(r.conM,2)} ${uP}, a comprar/preparar ${cfNum(r.compra,0)} ${uP}, agua ${cfNum(r.agua,0)} L${r.costoCompra>0?", costo estimado "+cfCLP(r.costoCompra):""}
MEZCLA EN ESTANQUE: ${cfMezcla().length?cfMezcla().map(m=>(m.producto||"?")+" a "+cfNum(cfP(m.dosis)||0,2)+" "+cfLabUnid(m.unidadDosis)+" (carencia "+(parseInt(m.carencia,10)||0)+" d)").join("; "):"solo el producto principal"}

function cfSanea(html){
  return String(html||"")
    .replace(/<\s*(script|style)[^>]*>[\s\S]*?<\s*\/\s*\1\s*>/gi,"")
    .replace(/ on\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi,"")
    .replace(/javascript:/gi,"");
}
async function cfPDFRedactarIA(){
  const cont=document.getElementById("cfPlanIA"); if(!cont) return;
  if(!(D.ia&&D.ia.key)){ alert("Para redactar el plan con IA, pega tu clave en Datos → Inteligencia (IA). El plan con datos igual se imprime."); return; }
  if(!cfIncluidos().length){ alert("Incluye al menos un cuartel para redactar el plan."); return; }
  cont.classList.remove("no-print");
  cont.style.background="#fff"; cont.style.border="none"; cont.style.color="#555"; cont.style.padding="0";
  cont.innerHTML="✨ Redactando el plan con IA…";
  const instr=`Eres un asesor agronomico fruticola en Chile (Total Fruit, Curacavi). Con los DATOS de esta PLANIFICACION de una aplicacion fitosanitaria, redacta un texto ordenado y profesional para el PLAN (no es una orden de compra ni de aplicacion). Estructura con subtitulos:
1) Resumen del plan (3-4 frases).
2) Programa sugerido (agrupa por fundo; si hay distintas fechas de cosecha por especie, menciona la logica).
3) Consideraciones de cosecha por frutal (respeta las carencias por especie indicadas; senala la fecha mas tardia).
4) Precauciones y buenas practicas (EPP, no aplicar en flor por abejas, incompatibilidades, respetar LMR y la lista de la exportadora).
Reglas: Espanol de Chile, claro, ordenado y conciso. NO inventes datos, dosis ni carencias; usa SOLO lo entregado. Devuelve HTML simple usando SOLO las etiquetas <h3>, <p>, <ul>, <li>, <b> (sin estilos en linea, sin scripts, sin <html> ni <body>).

DATOS:
${cfPlanDataTxt()}`;
  try{
    let txt=(await iaLlamar([{text:instr}])).trim();
    txt=txt.replace(/^```html/i,"").replace(/^```/,"").replace(/```$/,"").trim();
    cont.innerHTML=cfSanea(txt)||"No se pudo redactar el plan.";
  }catch(err){
    cont.style.color="#b00020"; cont.classList.add("no-print");
    cont.innerHTML="⚠️ "+(err.msg||err.message||"No se pudo redactar el plan");
  }
}

/* ---------- Mezcla en estanque: varios productos (Fase C) ---------- */
const CF_FORM_RE = [[/\b(wg|sg|wp|wdg|df|gr|pm)\b/i,1],[/\b(sc|cs|se|od|fs|zc|su)\b/i,2],[/\b(ew|me)\b/i,3],[/\b(ec|sl|as|ls)\b/i,4]];
function cfMezcla(){ const pf=cfPF(); if(!Array.isArray(pf.mezcla)) pf.mezcla=[]; return pf.mezcla; }
function cfMixFind(id){ return cfMezcla().find(m=>m.id===id); }
function cfMixAgregar(){ const mz=cfMezcla(); const id=(mz.reduce((x,m)=>Math.max(x,m.id||0),0))+1; mz.push({id:id,producto:"",prodId:null,unidad:"L",unidadDosis:"cc/100L",dosis:"",precioU:"",envase:"",carencia:0}); guardar(); render(); }
function cfMixDel(id){ const pf=cfPF(); pf.mezcla=cfMezcla().filter(m=>m.id!==id); guardar(); render(); }
function cfMixSet(id,k,v){ const m=cfMixFind(id); if(!m) return; m[k]=v; if(k==="producto") m.prodId=null; guardar(); cfLive(); }
function cfMixSetR(id,k,v){ const m=cfMixFind(id); if(!m) return; m[k]=v; if(k==="unidad"){ m.unidadDosis=CF_UNID_PAR[m.unidadDosis]||(v==="L"?"cc/100L":"g/100L"); } guardar(); render(); }
function cfMixBase(id){ nav.cfMixTarget=id; cfAbrirProductos(); }
function cfMixFromProd(mixId,prod){ const m=cfMixFind(mixId); if(!m||!prod) return; m.producto=prod.n; m.prodId=prod.id; m.unidad=prod.u||"L"; if(prod.du) m.unidadDosis=prod.du; const d=cfProdMid(prod.dmin,prod.dmax); if(d!=="") m.dosis=d; if(prod.p) m.precioU=prod.p; if(prod.c!=null) m.carencia=prod.c; }
function cfMixCalc(){
  const pf=cfPF(), r=cfCalc(), n=r.n, haTot=r.haTot, margen=(cfP(pf.margen)||0)/100, cap=cfP(pf.estanque)||0, moj=cfP(pf.moj)||0;
  const out=[{nombre:pf.producto,uP:cfUProd(),prodHa:r.prodHa,neto:r.neto,conM:r.conM,compra:r.compra,est:r.prodEst,costo:r.costoCompra>0?r.costoCompra:r.costoTeorico,esP:true}];
  cfMezcla().forEach(m=>{
    let ph=cfProdHaDe(m.dosis,m.unidadDosis,moj); if(isNaN(ph)) ph=0;
    const neto=ph*haTot*n, conM=neto*(1+margen), env=cfP(m.envase)||0, nEnv=(conM>0&&env>0)?Math.ceil(conM/env):0, compra=nEnv*env;
    const precio=cfP(m.precioU)||0, costo=(compra>0?compra:conM)*precio, est=(moj>0)?(ph/moj)*cap:0;
    out.push({nombre:m.producto,uP:m.unidad,prodHa:ph,neto:neto,conM:conM,compra:compra,est:est,costo:costo,esP:false});
  });
  return out;
}
function cfCostoTotalMezcla(){ return cfMixCalc().reduce((s,x)=>s+(x.costo||0),0); }
function cfFormRank(nombre){ const s=nombre||""; if(/aceite|coadyuv|adheren|surfact|mojante|nonil|siliconad/i.test(s)) return 5; for(const par of CF_FORM_RE){ if(par[0].test(s)) return par[1]; } return 3; }
function cfMezclaOrden(){ const pf=cfPF(); const all=[pf.producto].concat(cfMezcla().map(m=>m.producto)).filter(x=>(x||"").trim()); if(all.length<2) return null; return all.map(n=>({n:n,r:cfFormRank(n)})).sort((a,b)=>a.r-b.r); }
function cfMezclaOrdenHTML(){ const ord=cfMezclaOrden(); if(!ord) return ""; return `<div style="margin-top:8px;padding:8px 11px;background:var(--pclaro);border-radius:8px;font-size:12px"><b>Orden de carga sugerido</b> (agitando siempre): ${ord.map((x,i)=>`${i+1}) ${esc(x.n)}`).join(" · ")}. Aceites y adyuvantes al final; micronutrientes al cierre. Ante dudas de compatibilidad, haz una prueba de jarra.</div>`; }
function cfMixHint(m){
  const moj=cfP(cfPF().moj)||0, cap=cfP(cfPF().estanque)||0, r=cfCalc();
  let ph=cfProdHaDe(m.dosis,m.unidadDosis,moj);
  if(isNaN(ph)) return `<span class="muted" style="font-weight:400">Ingresa la dosis.</span>`;
  const tot=ph*r.haTot*cfNapp(), est=(moj>0)?(ph/moj)*cap:0;
  return `≈ <b>${cfQty(ph,m.unidad,3)}/ha</b> · ${cfQty(tot,m.unidad)} total${(cap>0&&moj>0)?` · ${cfQty(est,m.unidad,3)}/estanque`:""}`;
}

function cfParcialHTML(){
  const pf=cfPF(), cap=cfP(pf.estanque)||0, moj=cfP(pf.moj)||0;
  if(!(cap>0)||!(moj>0)) return "";
  const prods=cfMixCalc().filter(function(x){return x.est>0;});
  if(!prods.length) return "";
  const incl=cfIncluidos(); if(!incl.length) return "";
  let filas="";
  incl.forEach(function(q){
    const ha=cfHaCuartel(q); if(!(ha>0)) return;
    const aguaC=ha*moj, full=Math.floor(aguaC/cap+1e-6), rem=aguaC-full*cap, parcial=rem>1;
    let det;
    if(!parcial){ det='<span style="color:#2e7d32">'+full+' estanque(s) justo(s), sin sobra</span>'; }
    else { const f=rem/cap; const pt=prods.map(function(x){ return esc(x.nombre||"—")+" <b>"+cfQty(x.est*f,x.uP)+"</b>"; }).join(" · "); det=full+' lleno(s) + <b style="color:#e97409">1 parcial de '+cfNum(rem,0)+' L</b> → '+pt; }
    filas+='<div style="padding:6px 0;border-bottom:1px dashed rgba(0,0,0,.12);font-size:12.5px"><b>'+esc(q.fundo)+' · '+esc(q.nombre)+'</b> <span class="muted">('+cfNum(aguaC/cap,2)+' estanques)</span><br>'+det+'</div>';
  });
  if(!filas) return "";
  return '<div style="margin-top:12px"><div style="font-weight:800;margin-bottom:4px">🪣 Último estanque por cuartel (para no desperdiciar)</div>'+filas+'<div class="muted" style="font-size:11px;margin-top:5px">El último estanque de cada cuartel se llena solo con esos litros y su producto proporcional; así no preparas de más.</div></div>';
}

/* ================== CALCULADORA DE TERRENO ================== */
const CALC_TABS = [["cosecha","🍒 Cosecha"],["plant","🌿 Plantación"],["cuad","👷 Cuadrilla"]];
function abrirCalc(tab){
  nav.calcTab = tab || nav.calcTab || "cosecha";
  if(nav.calcTab==="aplic") nav.calcTab="cosecha";
  const chips = CALC_TABS.map(([id,lab])=>`<button class="chip ${nav.calcTab===id?"act":""}" onclick="abrirCalc('${id}')">${lab}</button>`).join("");
  const form = ({aplic:calcFormAplic, cosecha:calcFormCosecha, plant:calcFormPlant, cuad:calcFormCuad}[nav.calcTab]||(()=>""))();
  document.getElementById("capaVisor").innerHTML = `
  <div class="visor" style="background:#eef1ec">
    <div class="vh" style="background:linear-gradient(135deg,#123f24,#1e7a4c)">
      <button class="btn sec chico" onclick="cerrarVisor()">← Volver</button>
      <div style="flex:1;color:#fff;font-weight:800">🧮 Calculadora de terreno</div>
    </div>
    <div style="flex:1;overflow:auto;-webkit-overflow-scrolling:touch">
      <div style="max-width:640px;margin:0 auto;padding:14px 16px 40px">
        <div class="chips" style="margin-bottom:12px;flex-wrap:wrap">${chips}</div>
        <div class="card">${form}</div>
        <div class="card" id="calcRes" style="background:var(--pclaro);border:1.5px solid var(--p)"></div>
        <div class="muted" style="font-size:11.5px;margin-top:8px">Cálculos referenciales para terreno. Confirma siempre con la etiqueta del producto y tu asesor.</div>
      </div>
    </div>
  </div>`;
  calcRun();
}
function calcRun(){
  const out = document.getElementById("calcRes"); if(!out) return;
  const f = {aplic:calcAplic, cosecha:calcCosecha, plant:calcPlant, cuad:calcCuad}[nav.calcTab];
  out.innerHTML = f? f() : "";
}
function cval(id){ const el=document.getElementById(id); if(!el) return NaN; const s=(el.value||"").trim().replace(",","."); const x=parseFloat(s.replace(/[^0-9.\-]/g,"")); return isNaN(x)?NaN:x; }
function calcSet(id,val){ nav.calcVals=nav.calcVals||{}; nav.calcVals[id]=val; calcRun(); }
function calcInput(id,lab,ph){ const cv=(nav.calcVals&&nav.calcVals[id])||""; return `<label class="f">${lab}<input id="${id}" type="text" inputmode="decimal" placeholder="${esc(ph||"")}" value="${esc(cv)}" oninput="calcSet('${id}',this.value)"></label>`; }
function calcR(lab,val,unit,big){
  if(val==null||isNaN(val)||!isFinite(val)) return "";
  const n=(Math.round(val*100)/100).toLocaleString("es-CL");
  return `<div class="fila" style="justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px dashed rgba(0,0,0,.12)"><span style="font-size:13.5px">${lab}</span><b style="font-size:${big?18:15}px;color:var(--p2);white-space:nowrap">${n}${unit?` <span style="font-size:11px;font-weight:400;color:var(--txt2)">${esc(unit)}</span>`:""}</b></div>`;
}

function calcFormPlant(){ return `<h3 style="margin-top:0">${ic("sprout")} Plantación / densidad</h3>
  ${calcInput("p_a","Distancia entre hileras (m)","5")}
  ${calcInput("p_b","Distancia sobre la hilera (m)","2")}
  ${calcInput("p_ha","Superficie (ha)","1")}`; }
function calcPlant(){
  const a=cval("p_a"),b=cval("p_b"),ha=cval("p_ha");
  const dens=(a>0&&b>0)?10000/(a*b):NaN;
  const tot=(!isNaN(dens)&&ha>0)?dens*ha:NaN;
  let h=`<h3 style="margin-top:0">Resultado</h3>${calcR("Plantas por hectárea",dens,"pl/ha",true)}${calcR("Total de plantas",tot,"plantas",true)}`;
  if(a>0&&b>0) h+=`<div class="muted" style="font-size:11.5px;margin-top:6px">Marco ${a}×${b} m = ${Math.round(a*b*100)/100} m² por planta.</div>`;
  else h+=`<div class="muted">Ingresa el marco de plantación (las dos distancias).</div>`;
  return h;
}

  const p=(D.cosechaPesos&&D.cosechaPesos[esp])||{};

  ${calcInput("c_dens","· Plantas por hectárea","1000")}

  <div style="font-weight:700;margin:10px 0 2px;font-size:13px">Pago (por kilo)</div>

function cosechaEsp(esp){ nav.calcEspecie=esp; abrirCalc("cosecha"); }
function cosechaPeso(which,val){ const esp=nav.calcEspecie||"Naranja"; D.cosechaPesos=D.cosechaPesos||{}; D.cosechaPesos[esp]=D.cosechaPesos[esp]||{}; D.cosechaPesos[esp][which]=val; guardar(); calcRun(); }
function calcCosecha(){
  const balde=cval("c_balde"), bin=cval("c_bin"), totkg=cval("c_totkg");
  const kgpl=cval("c_kgpl"), dens=cval("c_dens"), ha=cval("c_ha");
  const kgha=(kgpl>0&&dens>0)?kgpl*dens:NaN;
  const estim=(!isNaN(kgha)&&ha>0)?kgha*ha:NaN;
  const total=(totkg>0)?totkg:estim;
  const baldesp=cval("c_baldesp"), pers=cval("c_pers"), valkg=cval("c_valkg");
  const kgPersDia=(baldesp>0&&balde>0)?baldesp*balde:NaN;
  const kgDia=(!isNaN(kgPersDia)&&pers>0)?kgPersDia*pers:NaN;
  const totBaldes=(!isNaN(total)&&balde>0)?total/balde:NaN;
  const totBins=(!isNaN(total)&&bin>0)?total/bin:NaN;
  const baldesPorBin=(bin>0&&balde>0)?bin/balde:NaN;
  const dias=(!isNaN(total)&&kgDia>0)?total/kgDia:NaN;
  const jornadas=(!isNaN(total)&&kgPersDia>0)?total/kgPersDia:NaN;
  const baldesDia=(!isNaN(kgDia)&&balde>0)?kgDia/balde:NaN;
  const binsDia=(!isNaN(kgDia)&&bin>0)?kgDia/bin:NaN;
  const pagoTot=(!isNaN(total)&&valkg>0)?total*valkg:NaN;
  const pagoDia=(!isNaN(kgDia)&&valkg>0)?kgDia*valkg:NaN;
  const pagoR=(lab,val)=> (val!=null&&!isNaN(val)&&isFinite(val))? `<div class="fila" style="justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px dashed rgba(0,0,0,.12)"><span style="font-size:13.5px">${lab}</span><b style="font-size:16px;color:var(--p2);white-space:nowrap">${cfCLP(val)}</b></div>` : "";
  let h=`<h3 style="margin-top:0">Resultado</h3>`;
  h+=calcR("Producción total",total,"kg",true)+calcR("· en baldes",totBaldes,"baldes")+calcR("· en bins",totBins,"bins")+calcR("Baldes por bin",baldesPorBin,"baldes/bin");
  h+=calcR("Cosecha por día",kgDia,"kg/día",true)+calcR("· baldes por día",baldesDia,"baldes/día")+calcR("· bins por día",binsDia,"bins/día");
  h+=calcR("Días de cosecha",dias,"días")+calcR("Jornadas (persona-día)",jornadas,"jornadas");
  h+=pagoR("Pago total",pagoTot)+pagoR("Pago por día",pagoDia);
  if(isNaN(total)) h+=`<div class="muted" style="font-size:12px;margin-top:6px">Ingresa la producción total en kg, o estímala con kg/planta, plantas/ha y superficie.</div>`;
  else if(isNaN(kgDia)) h+=`<div class="muted" style="font-size:12px;margin-top:6px">Para días y jornadas: pon kg por balde, baldes por persona al día y N° de personas.</div>`;
  return h;
}

function calcAplic(){
  const dosis=cval("a_dosis"),moja=cval("a_moja"),ha=cval("a_ha"),est=cval("a_est");
  const u=nav.calcDosisU||"100L";
  let d100=NaN,dha=NaN;
  if(u==="ha"){ dha=dosis; if(moja>0&&!isNaN(dosis)) d100=dosis/(moja/100); }
  else { d100=dosis; if(moja>0&&!isNaN(dosis)) dha=dosis*(moja/100); }
  const agua=(moja>0&&ha>0)?moja*ha:NaN;
  const nEst=(!isNaN(agua)&&est>0)?Math.ceil(agua/est):NaN;
  const haEst=(moja>0&&est>0)?est/moja:NaN;
  const total=(!isNaN(dha)&&ha>0)?dha*ha:NaN;
  const porEst=(!isNaN(d100)&&est>0)?(est/100)*d100:NaN;
  const th=cval("t_h"),tw=cval("t_w"),tr=cval("t_row"); let tf=cval("t_f"); if(isNaN(tf)) tf=100;
  const trvEl=document.getElementById("trvRes");
  if(trvEl){
    if(th>0&&tw>0&&tr>0){ const trv=th*tw*(10000/tr); const aguaTrv=trv/1000*tf;
      trvEl.innerHTML=`TRV = <b>${Math.round(trv).toLocaleString("es-CL")}</b> m³/ha → mojamiento sugerido <b>${Math.round(aguaTrv).toLocaleString("es-CL")}</b> L/ha &nbsp;<button class="btn sec chico" style="min-height:26px;padding:2px 8px" onclick="document.getElementById('a_moja').value='${Math.round(aguaTrv)}';calcRun()">Usar</button>`;
    } else trvEl.textContent="Ingresa altura, ancho y distancia de hilera.";
  }
  if(isNaN(dosis)&&isNaN(moja)) return `<h3 style="margin-top:0">Resultado</h3><div class="muted">Ingresa la dosis y el mojamiento.</div>`;
  return `<h3 style="margin-top:0">Resultado</h3>
    ${calcR("Producto por estanque",porEst,"(misma unidad de la dosis)",true)}
    ${calcR("Producto total"+(ha>0?" (para "+(Math.round(ha*100)/100)+" ha)":""),total,"",true)}
    ${calcR("Nº de estanques",nEst,"estanques")}
    ${calcR("Superficie por estanque",haEst,"ha")}
    ${calcR("Agua total",agua,"L")}
    ${calcR("Dosis equivalente por 100 L",d100,"por 100 L")}
    ${calcR("Dosis equivalente por ha",dha,"por ha")}
    <div class="muted" style="font-size:11px;margin-top:6px">Las unidades (g, cc, mL, kg, L) son las mismas que pusiste en la dosis.</div>`;
}

function calcFormCuad(){ return `<h3 style="margin-top:0">${ic("users")} Cuadrilla / rendimiento</h3>
  ${calcInput("q_tot","Total a realizar (plantas, ha, bins, kg…)","5000")}
  ${calcInput("q_pers","Nº de personas","10")}
  ${calcInput("q_rend","Rendimiento por persona al día","60")}
  ${calcInput("q_dias","Días disponibles (opcional)","5")}
  ${calcInput("q_val","Valor por unidad $ (trato, opcional)","")}`; }
function calcCuad(){
  const tot=cval("q_tot"),pers=cval("q_pers"),rend=cval("q_rend"),dias=cval("q_dias"),val=cval("q_val");
  const porDia=(pers>0&&rend>0)?pers*rend:NaN;
  const diasNec=(tot>0&&pers>0&&rend>0)?tot/(pers*rend):NaN;
  const persNec=(tot>0&&dias>0&&rend>0)?tot/(dias*rend):NaN;
  const rendReq=(tot>0&&pers>0&&dias>0)?tot/(pers*dias):NaN;
  const diasJ=(dias>0)?dias:diasNec;
  const jornales=(pers>0&&diasJ>0)?pers*diasJ:NaN;
  const costo=(tot>0&&val>0)?tot*val:NaN;
  return `<h3 style="margin-top:0">Resultado</h3>
    ${calcR("Producción por día (toda la cuadrilla)",porDia,"por día",true)}
    ${calcR("Días para terminar",diasNec,"días",true)}
    ${calcR("Personas necesarias (para esos días)",persNec,"personas")}
    ${calcR("Rendimiento requerido por persona/día",rendReq,"c/u")}
    ${calcR("Jornales",jornales,"jornales")}
    ${calcR("Costo a trato",costo,"$")}
    <div class="muted" style="font-size:11px;margin-top:6px">Llena solo los campos que tengas; se calcula lo que se pueda.</div>`;
}
/* ================== AVANCES: resumen + análisis ================== */
function avAll(){ const out=[]; for(const l of D.labores) for(const a of (l.avances||[])) out.push({...a, tipo:l.tipo, fundo:l.fundo, cuartel:l.cuartel, laborId:l.id, unidad:l.unidad}); return out; }
function haDe(fundo, cuartel){ // superficie (ha) desde el catálogo de cuarteles
  if(cuartel){ const q=D.cuarteles.find(x=>x.fundo===fundo && x.nombre===cuartel); return q? (+q.ha||0):0; }
  return D.cuarteles.filter(x=>x.fundo===fundo).reduce((s,x)=>s+(+x.ha||0),0);
}
function avKpis(a){
  const total=a.reduce((s,x)=>s+(+x.total||0),0);
  const cant=a.reduce((s,x)=>s+(+x.cantidad||0),0);
  const persDia=a.reduce((s,x)=>s+(+x.personas||0),0);
  return {total, cant, persDia, ganaPers: persDia>0? total/persDia:0, rend: persDia>0? cant/persDia:0, costoU: cant>0? total/cant:0, n:a.length};
}
function avFiltrar(){
  let a = avAll();
  const per = nav.avPeriodo||"semana", hoyISO=hoy();
  if(per==="hoy") a=a.filter(x=>x.fecha===hoyISO);
  else if(per==="semana"){ const s=semanaDe(hoyISO); a=a.filter(x=>x.fecha>=s[0]&&x.fecha<=s[6]); }

}

/* Gesto tipo Google Earth: doble-toque y arrastrar (un dedo o lápiz) = zoom dinámico */
function activarZoomGesto(map){
  const cont = map.getContainer();
  let lastT=0, lx=0, ly=0, active=0, ready=false, dtz=false, sy=0, sz=0, pid=null, cp=null, ctr=null, zEnd=0, zCenter=null;
  function reenable(){ try{ if(map.dragging && !map.dragging.enabled()) map.dragging.enable(); }catch(_){} }
  function settle(){
    try{ map._animatingZoom=false; }catch(_){}
    if(zCenter){ try{ map._resetView(zCenter, zEnd); }catch(_){ try{ map.setView(zCenter, zEnd, {animate:false}); }catch(e){} } }
  }
  cont.addEventListener("pointerdown", function(e){
    if(e.pointerType==="mouse") return;
    active++;
    if(active>1){ if(dtz){ settle(); } ready=false; dtz=false; pid=null; reenable(); return; }
    const now=Date.now();
    if(now-lastT<320 && Math.abs(e.clientX-lx)<40 && Math.abs(e.clientY-ly)<40){
      ready=true; pid=e.pointerId; sy=e.clientY; sz=map.getZoom(); zEnd=sz; zCenter=map.getCenter();
      const r=cont.getBoundingClientRect();
      cp=L.point(e.clientX-r.left, e.clientY-r.top);
      try{ ctr=map.containerPointToLatLng(cp); }catch(_){ ctr=map.getCenter(); }
      try{ map.dragging.disable(); }catch(_){}
    }
    lastT=now; lx=e.clientX; ly=e.clientY;
  }, {passive:false});
  cont.addEventListener("pointermove", function(e){
    if(!ready || e.pointerId!==pid || active>1) return;
    const dy=sy-e.clientY;
    if(!dtz){ if(Math.abs(dy)<8) return; dtz=true; try{ cont.setPointerCapture(pid); }catch(_){} try{ if(map._stop) map._stop(); }catch(_){} try{ map._animatingZoom=true; }catch(_){} }
    e.preventDefault();
    let z=sz + dy/110;
    z=(map._limitZoom? map._limitZoom(z) : Math.max(map.getMinZoom(), Math.min(map.getMaxZoom(), z)));
    zEnd=z;
    try{
      const half=map.getSize().divideBy(2);
      zCenter=map.unproject(map.project(ctr, z).subtract(cp).add(half), z);
      map._move(zCenter, z, {pinch:true, round:false});
    }catch(_){}
  }, {passive:false});
  function end(e){
    if(e.pointerType!=="mouse") active=Math.max(0, active-1);
    if(pid!==null && (e.pointerId===pid || e.type==="pointercancel")){
      const w=dtz; ready=false; dtz=false; pid=null;
      if(w) settle();
      setTimeout(reenable, 20);
    }
  }
  cont.addEventListener("pointerup", end);
  cont.addEventListener("pointercancel", end);
}

function initMapa(){

  try{

    let mp;
    try{
      mp = L.map(el, Object.assign({zoomControl:true, attributionControl:false, zoomSnap:0},
        rot? {rotate:true, touchRotate:true, rotateControl:false} : {}));
    }catch(err){ // si el plugin de rotación falla en este navegador, mapa sin rotación
      try{ delete el._leaflet_id; }catch(x){}

    const colCat = c => c==="Urgente"? "#e97409" : c==="Plaga / Enfermedad"? "#c9a20e" : c==="Riego"? "#3268a8" : "#3b8c25";
    const pts = [];

function mapaTap(mp, fn){
  const c = mp.getContainer();
  let t0 = 0, x0 = 0, y0 = 0, pid = null, multi = false;
  c.addEventListener("pointerdown", e=>{
    if(pid!==null){ multi = true; return; }
    pid = e.pointerId; multi = false; t0 = Date.now(); x0 = e.clientX; y0 = e.clientY;
  });
  c.addEventListener("pointerup", e=>{
    if(e.pointerId!==pid) return;
    pid = null;
    if(multi) return;
    if(Date.now()-t0 > 600) return; // toque largo = otra intención
    if(Math.hypot(e.clientX-x0, e.clientY-y0) > 12) return; // arrastre = mover el mapa
    if(e.target && e.target.closest && e.target.closest(".leaflet-marker-icon,.leaflet-popup,a,button")) return;
    fn(mp.mouseEventToLatLng(e), e);
  });
  c.addEventListener("pointercancel", ()=>{ pid = null; });
}

/* ---------- Medición geodésica real (metros y hectáreas) ---------- */
function geoDist(pts){ // largo de una línea en metros
  let d = 0;
  for(let i=1;i<pts.length;i++) d += L.latLng(pts[i-1]).distanceTo(L.latLng(pts[i]));
  return d;
}
function geoArea(pts){ // superficie de un polígono en m² (fórmula esférica)
  const R = 6378137, rad = Math.PI/180;
  let s = 0;
  for(let i=0, n=pts.length; i<n; i++){
    const [la1,lo1] = pts[i], [la2,lo2] = pts[(i+1)%n];
    s += (lo2-lo1)*rad * (2 + Math.sin(la1*rad) + Math.sin(la2*rad));
  }
  return Math.abs(s*R*R/2);
}
function fmtDist(m){ return m>=1000? (m/1000).toFixed(2).replace(".",",")+" km" : Math.round(m)+" m"; }
function geoRumbo(a,b){ // dirección en grados desde el norte
  const rad = Math.PI/180, la1 = a[0]*rad, la2 = b[0]*rad, dLo = (b[1]-a[1])*rad;
  const y = Math.sin(dLo)*Math.cos(la2);
  const x = Math.cos(la1)*Math.sin(la2) - Math.sin(la1)*Math.cos(la2)*Math.cos(dLo);
  return (Math.atan2(y,x)/rad + 360) % 360;
}
