<!DOCTYPE html>
<!-- AgroNotas v2 — Total Fruit Curacaví -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AgroNotas">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>AgroNotas — Total Fruit Curacaví</title>
<style>
:root{
  --p:#1e7a4c; --p2:#14532d; --pclaro:#e7f4ec; --acc:#f5a623; --rojo:#d64545; --azul:#2563eb;
  --fondo:#eef1ec; --card:#ffffff; --txt:#1f2933; --txt2:#64748b; --borde:#e3e8e1;
  --som:0 1px 2px rgba(16,40,24,.05), 0 2px 10px rgba(16,40,24,.07);
  --som2:0 10px 30px rgba(16,40,24,.20);
  --rad:16px; --tab-h:66px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--fondo); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:16px;
  overscroll-behavior:none;}
body{padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));}

/* ===== Topbar ===== */
.topbar{position:sticky; top:0; z-index:50; color:#fff;
  background:linear-gradient(135deg,#123f24 0%,#1e7a4c 55%,#27925d 100%);
  padding:calc(12px + env(safe-area-inset-top)) 18px 12px; display:flex; align-items:center; gap:12px;
  box-shadow:0 2px 16px rgba(16,40,24,.28);}
.topbar .marca{width:42px; height:42px; border-radius:13px; flex:0 0 auto;
  background:rgba(255,255,255,.14); box-shadow:inset 0 0 0 1px rgba(255,255,255,.22);
  display:flex; align-items:center; justify-content:center; font-size:24px;}
.topbar h1{font-size:20px; margin:0; font-weight:800; letter-spacing:-.3px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.topbar .sub{font-size:12.5px; opacity:.82; display:block; font-weight:500; letter-spacing:0; margin-top:1px;}

/* ===== Tab bar inferior ===== */
.tabbar{position:fixed; bottom:0; left:0; right:0; z-index:50; height:calc(var(--tab-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom); background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--borde);
  display:flex; box-shadow:0 -2px 14px rgba(16,40,24,.07);}
.tabbar button{flex:1; border:none; background:none; font-size:11px; font-weight:600; color:var(--txt2);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; padding:5px 0;}
.tabbar button .ico{font-size:22px; line-height:1.3; padding:2px 16px; border-radius:14px; transition:background .18s;}
.tabbar button.act{color:var(--p2); font-weight:800;}
.tabbar button.act .ico{background:var(--pclaro);}

/* ===== Contenido ===== */
.cont{padding:14px 16px 20px; max-width:1100px; margin:0 auto;}
.card{background:var(--card); border:1px solid var(--borde); border-radius:var(--rad); box-shadow:var(--som); padding:16px 18px; margin-bottom:14px;}
h2{font-size:17px; margin:4px 0 10px;}
h3{font-size:15px; margin:2px 0 8px;}
.fila{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.muted{color:var(--txt2); font-size:13px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
@media(max-width:640px){.grid3,.grid4{grid-template-columns:1fr 1fr;}}

/* ===== KPI ===== */
.kpi{background:var(--card); border:1px solid var(--borde); border-top:4px solid var(--p);
  border-radius:var(--rad); box-shadow:var(--som); padding:14px 12px 12px; text-align:center;}
.kpi .num{font-size:28px; font-weight:800; color:var(--p); letter-spacing:-.5px; font-variant-numeric:tabular-nums;}
.kpi .lab{font-size:12px; color:var(--txt2); margin-top:3px; font-weight:600;}
.kpi.rojo{border-top-color:var(--rojo);} .kpi.rojo .num{color:var(--rojo);}
.kpi.azul{border-top-color:var(--azul);} .kpi.azul .num{color:var(--azul);}
.kpi.acc{border-top-color:var(--acc);} .kpi.acc .num{color:#b45309;}

/* ===== Botones (táctiles, mín. 46px) ===== */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; min-height:46px;
  padding:10px 18px; border:none; border-radius:13px; font-size:16px; font-weight:700; letter-spacing:-.2px;
  background:linear-gradient(180deg,#23895a,#1e7a4c); color:#fff; cursor:pointer;
  box-shadow:0 1px 2px rgba(16,40,24,.2), 0 3px 10px rgba(30,122,76,.25);}
.btn:active{transform:scale(.97); opacity:.9;}
.btn.sec{background:#eceff1; color:var(--txt);}
.btn.peligro{background:var(--rojo);}
.btn.chico{min-height:38px; padding:6px 12px; font-size:14px; border-radius:10px;}
.btn.full{width:100%;}
.btn-fab{position:fixed; right:20px; bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 16px); z-index:40;
  width:60px; height:60px; border-radius:50%; background:var(--p); color:#fff; border:none; font-size:30px;
  box-shadow:var(--som2); cursor:pointer; display:flex; align-items:center; justify-content:center;}
.btn-fab:active{transform:scale(.94);}

/* ===== Chips de filtro ===== */
.chips{display:flex; gap:8px; overflow-x:auto; padding:2px 0 8px; -webkit-overflow-scrolling:touch;}
.chip{flex:0 0 auto; padding:9px 16px; border-radius:22px; background:#fff; border:1.5px solid var(--borde);
  font-size:14px; font-weight:600; color:#4b5a67; cursor:pointer; white-space:nowrap; min-height:40px;
  display:flex; align-items:center; box-shadow:0 1px 2px rgba(16,40,24,.04); transition:all .15s;}
.chip.act{background:var(--p2); border-color:var(--p2); color:#fff; box-shadow:0 2px 8px rgba(20,83,45,.3);}

/* ===== Formularios ===== */
label.f{display:block; margin-bottom:10px; font-size:13px; font-weight:600; color:var(--txt2);}
label.f input, label.f select, label.f textarea{display:block; width:100%; margin-top:4px; padding:12px;
  font-size:16px; border:1.5px solid var(--borde); border-radius:10px; background:#fff; color:var(--txt);
  font-family:inherit; -webkit-appearance:none; appearance:none; min-height:46px;}
label.f select{background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="9" viewBox="0 0 14 9"><path d="M1 1l6 6 6-6" stroke="%23607d8b" stroke-width="2" fill="none"/></svg>') no-repeat right 12px center;}
label.f textarea{min-height:90px; resize:vertical;}
label.f input:focus, label.f select:focus, label.f textarea:focus{outline:none; border-color:var(--p);}

/* ===== Listas / items ===== */
.item{background:var(--card); border:1px solid var(--borde); border-radius:var(--rad); box-shadow:var(--som); padding:13px 15px; margin-bottom:10px; cursor:pointer; transition:box-shadow .15s;}
.item:active{background:#fafcf9;}
.item .tit{font-weight:700; font-size:15px;}
.item .met{font-size:12.5px; color:var(--txt2); margin-top:2px;}
.item .txt{font-size:14.5px; margin-top:6px; white-space:pre-wrap; word-break:break-word;}
.badge{display:inline-block; padding:3px 10px; border-radius:12px; font-size:11.5px; font-weight:700;}
.b-verde{background:var(--pclaro); color:var(--p2);}
.b-ambar{background:#fff8e1; color:#b8860b;}
.b-rojo{background:#ffebee; color:var(--rojo);}
.b-azul{background:#e3f2fd; color:var(--azul);}
.b-gris{background:#eceff1; color:var(--txt2);}

/* ===== Miniaturas de fotos ===== */
.thumbs{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
.thumbs img{width:86px; height:86px; object-fit:cover; border-radius:10px; box-shadow:var(--som); cursor:pointer; border:1px solid var(--borde);}
.thumbs .del{position:absolute; top:-7px; right:-7px; width:26px; height:26px; border-radius:50%;
  background:var(--rojo); color:#fff; border:2px solid #fff; font-size:14px; line-height:1; cursor:pointer;}
.thumbwrap{position:relative;}

/* ===== Documentos adjuntos (PDF) ===== */
.docs{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
.doc-chip{display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border-radius:12px;
  background:#fdf6e8; border:1px solid #eeddb8; color:#7c5a1e; font-size:13.5px; font-weight:600; cursor:pointer; max-width:100%;}
.doc-chip span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:210px;}
.doc-chip .qx{background:none; border:none; color:var(--rojo); font-size:16px; cursor:pointer; padding:0 2px;}
.qx-cat{background:none; border:none; color:var(--rojo); font-size:15px; cursor:pointer; margin-left:6px; padding:0 2px;}

/* ===== Notas de voz ===== */
.audios{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
.aud-fila{display:flex; align-items:center; gap:8px;}
.aud-fila audio{flex:1; max-width:360px; height:40px;}
.btn.grabando{background:var(--rojo); animation:pulsa 1.2s infinite;}
@keyframes pulsa{50%{opacity:.55;}}

/* ===== Checklist ===== */
.chk-fila{display:flex; align-items:center; gap:10px; padding:8px 4px; border-bottom:1px dashed var(--borde); font-size:15px;}
.chk-fila input[type=checkbox]{width:24px; height:24px; margin:0; flex:0 0 auto;}
.chk-fila.ok span{text-decoration:line-through; color:var(--txt2);}

/* ===== Modal ===== */
.modal-fondo{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex;
  align-items:flex-end; justify-content:center;}
@media(min-width:700px){.modal-fondo{align-items:center;}}
.modal{background:#fff; border-radius:18px 18px 0 0; width:100%; max-width:680px; max-height:88vh;
  display:flex; flex-direction:column; animation:sube .22s ease;}
@media(min-width:700px){.modal{border-radius:18px;}}
@keyframes sube{from{transform:translateY(40px); opacity:.5;} to{transform:none; opacity:1;}}
.modal .mh{padding:14px 18px 8px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--borde);}
.modal .mh h3{flex:1; margin:0; font-size:17px;}
.modal .mb{padding:14px 18px; overflow-y:auto; -webkit-overflow-scrolling:touch;}
.modal .mf{padding:12px 18px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--borde); display:flex; gap:10px;}
.modal .mf .btn{flex:1;}
.x{background:none; border:none; font-size:26px; color:var(--txt2); cursor:pointer; padding:4px 8px;}

/* ===== Visor / editor de fotos ===== */
.visor{position:fixed; inset:0; background:#111; z-index:200; display:flex; flex-direction:column;}
.visor .vh{display:flex; align-items:center; gap:8px; padding:calc(8px + env(safe-area-inset-top)) 12px 8px; background:#000;}
.visor .vh .btn{min-height:42px;}
.visor .lienzo{flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; touch-action:none;}
.visor canvas, .visor img.full{max-width:100%; max-height:100%; display:block;}
#cqBase, #cqTmp{max-width:none !important; max-height:none !important;} /* el zoom del editor necesita crecer más allá de la pantalla */
.visor .herr{background:#000; padding:8px 12px calc(10px + env(safe-area-inset-bottom));
  display:flex; gap:8px; align-items:center; overflow-x:auto;}
.herr .tool{width:46px; height:46px; border-radius:12px; border:2px solid #444; background:#222; color:#fff;
  font-size:20px; cursor:pointer; flex:0 0 auto; display:flex; align-items:center; justify-content:center;}
.herr .tool.act{border-color:var(--acc); background:#3a3a2a;}
.herr .col{width:38px; height:38px; border-radius:50%; border:3px solid #444; cursor:pointer; flex:0 0 auto;}
.herr .col.act{border-color:#fff; transform:scale(1.15);}
/* Informe semanal */
.informe{max-width:820px;margin:14px auto;background:#fff;padding:22px 26px;border-radius:8px;color:#222;font-size:13.5px;line-height:1.45}
.informe h2{font-size:15.5px;color:#14532d;margin:18px 0 6px;border-bottom:1px solid #dde;padding-bottom:3px}
.informe table{width:100%;border-collapse:collapse;font-size:12.5px}
.informe th{background:#eef5ef;color:#14532d;text-align:left;padding:5px 7px;border:1px solid #d5e0d5}
.informe td{padding:5px 7px;border:1px solid #e3e3e3;vertical-align:top}
.inf-kpis{display:flex;gap:10px;margin:14px 0}
.inf-kpis>div{flex:1;background:#f2f7f2;border:1px solid #d5e0d5;border-radius:8px;padding:10px;text-align:center;color:#444;font-size:12px}
.inf-kpis b{display:block;font-size:19px;color:#14532d}
.inf-alerta{background:#fff3e0;border:1px solid #ffb74d;border-radius:8px;padding:8px 12px;margin:8px 0;color:#7a4c00;font-weight:600}
.inf-nota{border-left:3px solid #1e7a4c;background:#fafafa;padding:6px 10px;margin:6px 0;border-radius:0 6px 6px 0}
.inf-vacio{color:#888;font-style:italic;margin:4px 0 10px}
.inf-fotos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.inf-fotos img{width:100%;border-radius:6px;border:1px solid #ddd}
.inf-x{border:none;background:#fdecea;color:#b3261e;border-radius:6px;cursor:pointer;font-size:11.5px;padding:2px 8px;margin-left:6px;vertical-align:middle}
@media print{
  #topbar,#tabbar,#app,.btn-fab,.no-print,#capaModal{display:none !important}
  .inf-v{position:static !important;background:#fff !important}
  .inf-scroll{overflow:visible !important}
  .informe{margin:0;padding:0;border-radius:0;max-width:none;box-shadow:none}
  body{background:#fff !important}
}
/* Calendario mensual */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dh{text-align:center;font-size:12px;color:#888;font-weight:700;padding:2px 0}
.cal-cel{min-height:64px;border:1.5px solid var(--borde,#ddd);border-radius:8px;padding:4px;cursor:pointer;background:#fff}
.cal-cel.fuera{opacity:.35}
.cal-cel.hoy{border-color:#1e7a4c;border-width:2.5px;background:#f2f9f3}
.cal-num{font-size:13px;font-weight:700}
.cal-b{font-size:10.5px;border-radius:6px;padding:0 4px;margin-top:2px;display:inline-block}
.cal-b.pend{background:#e3f2fd;color:#1565c0}
.cal-b.ok{background:#e8f5e9;color:#2e7d32}
.cal-b.nota{background:#fff8e1;color:#8d6e00;margin-left:2px}
/* Tablero de reorganización */
.tab-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media (max-width:720px){.tab-cols{grid-template-columns:repeat(2,1fr)}}
.tab-col{background:rgba(0,0,0,.05);border-radius:12px;padding:8px}
.tab-tit{font-weight:800;font-size:14px;margin-bottom:4px}
.tab-card{background:#fff;border:1.5px solid var(--borde,#ddd);border-radius:10px;padding:8px 10px;margin-top:6px;cursor:pointer;font-size:14px}

/* ===== Tabla simple ===== */
table.t{width:100%; border-collapse:collapse; font-size:14px;}
table.t th{text-align:left; font-size:12px; color:var(--txt2); padding:8px 8px; border-bottom:2px solid var(--borde);}
table.t td{padding:10px 8px; border-bottom:1px solid var(--borde); vertical-align:top;}

/* ===== Días del plan ===== */
.dia-h{display:flex; align-items:center; gap:8px; margin:16px 0 8px; font-weight:700; font-size:15px;}
.dia-h .fecha{color:var(--txt2); font-weight:400; font-size:13px;}
.dia-h.hoy{color:var(--p);}
.vacio{text-align:center; color:var(--txt2); padding:30px 10px; font-size:14.5px;}
.vacio .ico{font-size:40px; display:block; margin-bottom:8px;}
</style>
</head>

function cargar(){
  try{

    // migraciones futuras: dar defaults a campos nuevos aquí
    D.cuarteles = D.cuarteles || []; D.notas = D.notas || [];
    D.labores = D.labores || []; D.registros = D.registros || [];
    D.seq = D.seq || 1000;

    D.fundos = D.fundos || [...new Set(D.cuarteles.map(q=>q.fundo))]; // catálogo de fundos (permite fundos sin cuarteles)

    D.ultimoRespaldo = D.ultimoRespaldo || null;

/* ================== INDEXEDDB (fotos) ================== */
let idb = null;
function abrirIDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DBNOM,1);
    r.onupgradeneeded = e=>{ e.target.result.createObjectStore("fotos",{keyPath:"id"}); };
    r.onsuccess = e=>{ idb = e.target.result; res(); };
    r.onerror = ()=>rej(r.error);
  });
}
function fotoPut(id,data){ return new Promise((res,rej)=>{
  const t = idb.transaction("fotos","readwrite");
  t.objectStore("fotos").put({id,data}); t.oncomplete=res; t.onerror=()=>rej(t.error);
});}
function fotoGet(id){ return new Promise((res)=>{
  const r = idb.transaction("fotos").objectStore("fotos").get(id);
  r.onsuccess=()=>res(r.result? r.result.data : null); r.onerror=()=>res(null);
});}
function fotoDel(id){ return new Promise((res)=>{
  const t = idb.transaction("fotos","readwrite");
  t.objectStore("fotos").delete(id);
  t.objectStore("fotos").delete("v"+id); // datos vectoriales del croquis, si existen
  t.objectStore("fotos").delete("o"+id); // imagen original de fondo, si existe
  t.oncomplete=res; t.onerror=res;
});}
function fotoTodas(){ return new Promise((res)=>{
  const r = idb.transaction("fotos").objectStore("fotos").getAll();
  r.onsuccess=()=>res(r.result||[]); r.onerror=()=>res([]);
});}

/* ================== HELPERS ================== */
function esc(s){ return String(s??"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function hoy(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function ahora(){ return new Date().toISOString(); }
function fmtF(iso){ if(!iso) return ""; const p=iso.slice(0,10).split("-"); return p[2]+"-"+p[1]+"-"+p[0]; }
function fmtFH(iso){ if(!iso) return ""; const d=new Date(iso); return fmtF(d.toISOString().slice(0,10))+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
const DIAS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function fmtDia(iso){ const d=new Date(iso+"T12:00:00"); return DIAS[d.getDay()]+" "+fmtF(iso); }
function v(id){ const el=document.getElementById(id); return el? el.value.trim() : ""; }
function vn(id){ const x=parseFloat(v(id).replace(",",".")); return isNaN(x)?0:x; }
function req(...ids){
  for(const id of ids){ if(!v(id)){ alert("Completa los campos obligatorios."); document.getElementById(id).focus(); return false; } }
  return true;
}

function cuartelesDe(f){ return D.cuarteles.filter(q=>q.fundo===f); }

  const pend = D.labores.filter(l=>l.estado!=="hecha");
  const atras = pend.filter(l=>(l.fecha2||l.fecha)<hoyISO);
  const deHoy = D.labores.filter(l=>l.fecha===hoyISO || (l.fecha2 && l.fecha<=hoyISO && hoyISO<=l.fecha2));
  const sem = semanaDe(hoyISO);
  const deSemana = D.labores.filter(l=>l.fecha>=sem[0] && l.fecha<=sem[6]);
  const notasRec = [...D.notas].sort((a,b)=>b.fh.localeCompare(a.fh));
  const fijadas = notasRec.filter(n=>n.fijada);
  const urg = D.notas.filter(n=>n.cat==="Urgente" && !n.resuelta);

  let h = `<div class="grid4">
    <div class="kpi"><div class="num">${num(haPlant)}</div><div class="lab">ha plantadas (${num(haTot)} totales)</div></div>

      <button class="btn" style="flex:1" onclick="formNota()">📝 Nueva nota</button>
      <button class="btn" style="flex:1;background:var(--azul)" onclick="formLabor()">📅 Nueva labor</button>
      <button class="btn" style="flex:1;background:#6d4c41" onclick="formReg()">📋 Nuevo registro</button>
    </div>
  </div>`;

  if(urg.length) h += `<div class="card" style="border-left:5px solid var(--rojo)">
    <h3>🚨 Urgentes sin resolver (${urg.length})</h3>
    ${urg.slice(0,5).map(n=>miniNota(n)).join("")}</div>`;

  const avisos = D.notas.filter(n=>n.aviso && n.aviso<=hoyISO);
  if(avisos.length) h += `<div class="card" style="border-left:5px solid #f9a825">
    <h3>🔔 Recordatorios (${avisos.length})</h3>
    ${avisos.sort((a,b)=>a.aviso.localeCompare(b.aviso)).map(n=>`<div class="fila" style="align-items:center">
      <div style="flex:1">${miniNota(n)}</div>

  h += `<div class="card"><h3>📅 Esta semana</h3>`;
  if(!deSemana.length) h += `<div class="muted">Sin labores planificadas. Toca 📅 Plan para agregar.</div>`;
  else{
    const porDia = {};
    deSemana.forEach(l=>{ (porDia[l.fecha]=porDia[l.fecha]||[]).push(l); });
    h += Object.keys(porDia).sort().map(f=>`
      <div class="dia-h ${f===hoyISO?"hoy":""}" style="margin:10px 0 4px">${f===hoyISO?"Hoy":fmtDia(f)}</div>

  h += `</div>`;

  h += `<div class="card"><h3>📝 Notas recientes</h3>`;
  const rec = [...fijadas, ...notasRec.filter(n=>!n.fijada)].slice(0,5);
  h += rec.length? rec.map(n=>miniNota(n)).join("") : `<div class="muted">Aún no hay notas. Toca 📝 para crear la primera.</div>`;
  h += `</div>`;

  for(const div of document.querySelectorAll(".audios[data-audios]")){
    const ids = div.dataset.audios.split(",").filter(Boolean);

async function agregarDocs(inp){
  for(const file of inp.files){
    if(file.size > 8*1024*1024){ alert(`"${file.name}" pesa más de 8 MB. Comprímelo antes de adjuntarlo.`); continue; }

    const did = "d"+nid();

/* --- Notas de voz 🎤 --- */
let audiosTmp = [];
let grab = null; // grabación en curso {rec, t0, timer}
async function toggleGrabar(){
  const btn = document.getElementById("btnGrabar");
  if(grab){ grab.rec.stop(); return; }
  if(!navigator.mediaDevices || !window.MediaRecorder){ alert("Este dispositivo no permite grabar audio desde el navegador."); return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const rec = new MediaRecorder(stream);
    const trozos = [];
    rec.ondataavailable = e=>{ if(e.data.size) trozos.push(e.data); };
    rec.onstop = async ()=>{
      clearInterval(grab?.timer);
      stream.getTracks().forEach(t=>t.stop());
      grab = null;
      const b = document.getElementById("btnGrabar");
      if(b){ b.textContent="🎤 Grabar"; b.classList.remove("grabando"); }
      const blob = new Blob(trozos, {type: rec.mimeType || "audio/mp4"});
      if(blob.size > 15*1024*1024){ alert("Audio demasiado largo. Graba mensajes más cortos."); return; }
      const data = await new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(blob); });
      const aid = "a"+nid();
      await fotoPut(aid, data);
      audiosTmp.push(aid);
      pintarAudiosTmp();
    };
    rec.start();
    grab = {rec, t0:Date.now(), timer:setInterval(()=>{
      const s = Math.floor((Date.now()-grab.t0)/1000);
      const b2 = document.getElementById("btnGrabar");
      if(b2) b2.textContent = `⏹ Detener ${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
    },1000)};
    if(btn){ btn.textContent="⏹ Detener 0:00"; btn.classList.add("grabando"); }
  }catch(e){ alert("No se pudo acceder al micrófono: "+e.message); }
}
async function pintarAudiosTmp(){
  const cont = document.getElementById("audiosNota");
  if(!cont) return;
  let h = "";
  for(const aid of audiosTmp){
    const d = await fotoGet(aid);

}

function ajustarCq(){
  if(!cq) return;
  const cont = document.getElementById("cqLienzo"); if(!cont) return;
  cq.kb = Math.min(cont.clientWidth/cq.W, cont.clientHeight/cq.H, 1.5);
  aplicarZoomCq();
}
function aplicarZoomCq(){
  if(!cq) return;
  const cont = document.getElementById("cqLienzo"); if(!cont) return;
  const k = cq.kb*cq.zoom;
  const w = Math.round(cq.W*k), h = Math.round(cq.H*k);
  // límites del paneo: que el lienzo no se escape de la vista
  const lx = Math.max(0,(w-cont.clientWidth)/2) + (cq.zoom>1.02? 60:0);
  const ly = Math.max(0,(h-cont.clientHeight)/2) + (cq.zoom>1.02? 60:0);
  cq.ox = Math.max(-lx, Math.min(lx, cq.ox));
  cq.oy = Math.max(-ly, Math.min(ly, cq.oy));
  for(const c of [cq.base, cq.tmp]){
    c.style.width=w+"px"; c.style.height=h+"px";
    c.style.left=((cont.clientWidth-w)/2+cq.ox)+"px"; c.style.top=((cont.clientHeight-h)/2+cq.oy)+"px";
  }
  const b = document.getElementById("cqZoom");
  if(b){
    if(cq.zoom>1.02){ b.style.display=""; b.textContent="🔍 "+Math.round(cq.zoom*100)+"%"; }
    else b.style.display="none";
  }
}
/* --- zoom y paneo: pellizco con 2 dedos; con Pencil activo, 1 dedo panea --- */
function cqGestoIni(){
  const ps = [...cq.ptrs.values()];
  cq.gesto = {z0:cq.zoom, ox0:cq.ox, oy0:cq.oy,
    m0:{x:ps.reduce((s,p)=>s+p.x,0)/ps.length, y:ps.reduce((s,p)=>s+p.y,0)/ps.length},
    d0: ps.length>1? Math.hypot(ps[0].x-ps[1].x, ps[0].y-ps[1].y) : 0};
}
function cqGestoMov(){
  const ps = [...cq.ptrs.values()], g = cq.gesto;
  const m = {x:ps.reduce((s,p)=>s+p.x,0)/ps.length, y:ps.reduce((s,p)=>s+p.y,0)/ps.length};
  let z = g.z0;
  if(ps.length>1 && g.d0>0){
    const d = Math.hypot(ps[0].x-ps[1].x, ps[0].y-ps[1].y);
    z = Math.max(1, Math.min(8, g.z0*d/g.d0));
  }
  const r = cq.lz.getBoundingClientRect(), cx = r.left+r.width/2, cy = r.top+r.height/2;
  cq.ox = m.x-cx-(g.m0.x-cx-g.ox0)*(z/g.z0); // el punto pellizcado queda fijo bajo los dedos
  cq.oy = m.y-cy-(g.m0.y-cy-g.oy0)*(z/g.z0);
  cq.zoom = z;
  aplicarZoomCq();
}
function cqZoomReset(){ if(!cq) return; cq.zoom=1; cq.ox=0; cq.oy=0; aplicarZoomCq(); }
function cqMover(){ // ✋ activado: arrastrar mueve la imagen en vez de dibujar
  if(!cq) return;
  cq.mover = !cq.mover;
  const b = document.getElementById("cqMov");
  if(b) b.className = cq.mover? "btn chico" : "btn sec chico";
}
function cqZoomEn(sx, sy, z){ // acerca manteniendo fijo el punto (sx,sy) de la pantalla
  if(!cq) return;
  const r = cq.lz.getBoundingClientRect(), cx = r.left+r.width/2, cy = r.top+r.height/2;
  cq.ox = sx-cx-(sx-cx-cq.ox)*(z/cq.zoom);
  cq.oy = sy-cy-(sy-cy-cq.oy)*(z/cq.zoom);
  cq.zoom = z;
  aplicarZoomCq();
}
function cqZoomBtn(f){ // botones ➕ ➖: acerca/aleja desde el centro
  if(!cq) return;
  const r = cq.lz.getBoundingClientRect();
  cqZoomEn(r.left+r.width/2, r.top+r.height/2, Math.max(1, Math.min(8, cq.zoom*f)));
}
function cqRueda(e){ // rueda del mouse: acerca donde apunta el cursor
  if(!cq) return;
  e.preventDefault();
  const k = e.deltaY<0? 1.15 : 1/1.15;
  cqZoomEn(e.clientX, e.clientY, Math.max(1, Math.min(8, cq.zoom*k)));
}
function cqXY(e){
  const r = cq.tmp.getBoundingClientRect();
  return {x:(e.clientX-r.left)*cq.W/r.width, y:(e.clientY-r.top)*cq.H/r.height};
}
function setToolCq(t,btn){
  cq.tool=t; cq.sel=-1; pintarSelCq();
  if(t!=="sello") document.getElementById("cqSellos").style.display="none";
  document.querySelectorAll("#cqHerr .tool[data-t]").forEach(b=>b.classList.remove("act"));
  btn.classList.add("act");
}
function setSelloCq(s,btn){
  cq.sello=s;
  document.querySelectorAll("#cqSellos .tool").forEach(b=>b.classList.remove("act"));
  btn.classList.add("act");
}
function setColCq(c,btn){
  cq.col=c;
  document.querySelectorAll("#cqHerr .col").forEach(b=>b.classList.remove("act"));
  btn.classList.add("act");
  if(cq.sel>=0){ snapCq(); cq.objs[cq.sel].col=c; pintarCq(); } // recolorea lo seleccionado
}
function setGrosorCq(g,btn){
  cq.g=g;
  document.querySelectorAll("#cqHerr .tool[data-g]").forEach(b=>b.classList.remove("act"));
  btn.classList.add("act");
  if(cq.sel>=0){ // cambia grosor/tamaño de lo seleccionado
    snapCq(); const o=cq.objs[cq.sel];
    if(o.t==="txt") o.s=g*8; else if(o.t==="sello") o.s=g*12; else o.g=g;
    pintarCq();
  }
}
/* --- dibujo de la escena --- */
function cqFondo(c){
  c.fillStyle="#ffffff"; c.fillRect(0,0,cq.W,cq.H);
  const f = cq.fondo;
  if(f.tipo==="foto" && cq.img){ c.drawImage(cq.img,0,0,cq.W,cq.H); }
  else if(f.tipo==="grid"){
    c.strokeStyle="#dde3ea"; c.lineWidth=2; c.beginPath();
    for(let x=0;x<=cq.W;x+=80){ c.moveTo(x,0); c.lineTo(x,cq.H); }
    for(let y=0;y<=cq.H;y+=80){ c.moveTo(0,y); c.lineTo(cq.W,y); }
    c.stroke();
  }else if(f.tipo==="hileras" && f.n>1){
    const m=100, paso=(cq.W-2*m)/(f.n-1);
    c.strokeStyle="#bfe0c2"; c.lineWidth=6; c.lineCap="round";
    c.fillStyle="#8fbc93"; c.font="bold 30px -apple-system,sans-serif"; c.textAlign="center";
    for(let i=0;i<f.n;i++){
      const x=m+i*paso;
      c.beginPath(); c.moveTo(x,150); c.lineTo(x,cq.H-90); c.stroke();
      if(i===0 || i===f.n-1 || (i+1)%5===0) c.fillText(String(i+1), x, 120);
    }
    c.textAlign="left";
  }
}
function cqObj(c,o){
  c.strokeStyle=o.col; c.fillStyle=o.col; c.lineWidth=o.g||8; c.lineCap="round"; c.lineJoin="round";
  if(o.t==="lapiz"){
    if(o.pts.some(p=>p[2])){ // trazo con presión del Pencil: grosor variable
      for(let i=1;i<o.pts.length;i++){
        c.lineWidth = o.pts[i][2]||o.g||8;
        c.beginPath(); c.moveTo(o.pts[i-1][0],o.pts[i-1][1]); c.lineTo(o.pts[i][0],o.pts[i][1]); c.stroke();
      }
      c.lineWidth = o.g||8;
    }else{
      c.beginPath(); c.moveTo(o.pts[0][0],o.pts[0][1]);
      for(const p of o.pts) c.lineTo(p[0],p[1]);
      c.stroke();
    }
  }else if(o.t==="linea" || o.t==="flecha"){
    c.beginPath(); c.moveTo(o.x1,o.y1); c.lineTo(o.x2,o.y2); c.stroke();
    if(o.t==="flecha"){
      const ang=Math.atan2(o.y2-o.y1,o.x2-o.x1), L=Math.max(18,(o.g||8)*3.2);
      c.beginPath(); c.moveTo(o.x2,o.y2);
      c.lineTo(o.x2-L*Math.cos(ang-0.45), o.y2-L*Math.sin(ang-0.45));
      c.moveTo(o.x2,o.y2);
      c.lineTo(o.x2-L*Math.cos(ang+0.45), o.y2-L*Math.sin(ang+0.45));
      c.stroke();
    }
  }else if(o.t==="cota"){ // regla: línea con topes y medida al centro
    const g = o.g||8, ang = Math.atan2(o.y2-o.y1,o.x2-o.x1), T = Math.max(16,g*2.4);
    c.lineWidth = Math.max(3,g*0.6);
    c.beginPath(); c.moveTo(o.x1,o.y1); c.lineTo(o.x2,o.y2);
    for(const [px,py] of [[o.x1,o.y1],[o.x2,o.y2]]){ // topes perpendiculares
      c.moveTo(px-T*Math.sin(ang), py+T*Math.cos(ang));
      c.lineTo(px+T*Math.sin(ang), py-T*Math.cos(ang));
    }
    c.stroke();
    if(o.txt){
      let a2 = ang; if(a2>Math.PI/2 || a2<-Math.PI/2) a2 += Math.PI; // texto nunca de cabeza
      const s = o.ts || Math.max(30,g*4);
      c.save();
      c.translate((o.x1+o.x2)/2,(o.y1+o.y2)/2); c.rotate(a2);
      c.font = `bold ${s}px -apple-system,sans-serif`; c.textAlign="center"; c.textBaseline="bottom";
      c.lineWidth = s*0.28; c.strokeStyle="#ffffff"; c.strokeText(o.txt,0,-g); // halo blanco
      c.fillStyle = o.tc || o.col;
      c.fillText(o.txt,0,-g);
      c.restore(); c.textAlign="left"; c.fillStyle=o.col;
    }
  }else if(o.t==="rect"){ c.strokeRect(o.x,o.y,o.w,o.h); }
  else if(o.t==="circ"){ c.beginPath(); c.ellipse(o.cx,o.cy,o.rx||1,o.ry||1,0,0,7); c.stroke(); }
  else if(o.t==="txt" || o.t==="sello"){
    const es = o.t==="txt";
    c.font = es? `bold ${o.s}px -apple-system,sans-serif` : `${o.s}px sans-serif`;
    c.textBaseline="top";
    const tx = es? o.txt : o.e, w = c.measureText(tx).width, h2 = o.s*1.15;
    if(o.r){
      c.save(); c.translate(o.x+w/2, o.y+h2/2); c.rotate(o.r);
      c.fillText(tx, -w/2, -h2/2); c.restore();
    }else c.fillText(tx, o.x, o.y);
  }
}
function pintarCq(){
  const c = cq.base.getContext("2d");
  cqFondo(c);
  for(const o of cq.objs) cqObj(c,o);
  pintarSelCq();
}
function cqBBox(o){
  if(o.t==="lapiz"){
    let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
    for(const p of o.pts){ x1=Math.min(x1,p[0]); y1=Math.min(y1,p[1]); x2=Math.max(x2,p[0]); y2=Math.max(y2,p[1]); }
    return {x:x1,y:y1,w:x2-x1,h:y2-y1};
  }
  if(o.t==="linea"||o.t==="flecha"||o.t==="cota") return {x:Math.min(o.x1,o.x2),y:Math.min(o.y1,o.y2),w:Math.abs(o.x2-o.x1),h:Math.abs(o.y2-o.y1)};
  if(o.t==="rect") return {x:Math.min(o.x,o.x+o.w),y:Math.min(o.y,o.y+o.h),w:Math.abs(o.w),h:Math.abs(o.h)};
  if(o.t==="circ") return {x:o.cx-o.rx,y:o.cy-o.ry,w:o.rx*2,h:o.ry*2};
  cq.mc.font = o.t==="txt"? `bold ${o.s}px -apple-system,sans-serif` : `${o.s}px sans-serif`;
  const w = cq.mc.measureText(o.t==="txt"?o.txt:o.e).width, h = o.s*1.15;
  if(!o.r) return {x:o.x,y:o.y,w,h};
  const cx=o.x+w/2, cy=o.y+h/2, co=Math.abs(Math.cos(o.r)), si=Math.abs(Math.sin(o.r));
  const W2=w*co+h*si, H2=w*si+h*co;
  return {x:cx-W2/2, y:cy-H2/2, w:W2, h:H2};
}
function pintarSelCq(){
  const c = cq.tmp.getContext("2d");
  c.clearRect(0,0,cq.W,cq.H);
  const btn = document.getElementById("cqDel");
  if(btn) btn.style.display = cq.sel>=0? "" : "none";
  const cb = document.getElementById("cqCotaBar");
  if(cb) cb.style.display = (cq.sel>=0 && cq.objs[cq.sel] && cq.objs[cq.sel].t==="cota")? "flex" : "none";
  if(cq.sel<0 || !cq.objs[cq.sel]) return;
  const b = cqBBox(cq.objs[cq.sel]);
  c.strokeStyle="#1e88e5"; c.lineWidth=3; c.setLineDash([12,9]);
  c.strokeRect(b.x-14,b.y-14,b.w+28,b.h+28);
  c.setLineDash([]);
  for(const t of cqTiradores(cq.objs[cq.sel])){ // aros sin relleno en puntas/esquinas
    c.beginPath(); c.arc(t.x,t.y,16,0,7);
    c.fillStyle = "rgba(255,255,255,0.12)"; c.fill(); // velo casi invisible para verlos sobre fondos oscuros
    c.strokeStyle = "#fff"; c.lineWidth = 5.5; c.stroke();
    c.beginPath(); c.arc(t.x,t.y,16,0,7);
    c.strokeStyle = t.k==="rot"? "#43a047" : "#1e88e5"; c.lineWidth = 3; c.stroke();
  }
}
function cqTiradores(o){ // puntos de agarre segun el tipo de objeto
  if(o.t==="linea"||o.t==="flecha"||o.t==="cota")
    return [{x:o.x1,y:o.y1,k:"p1"},{x:o.x2,y:o.y2,k:"p2"}];
  if(o.t==="rect"||o.t==="circ"){
    const b = cqBBox(o);
    return [{x:b.x,y:b.y,k:"e0"},{x:b.x+b.w,y:b.y,k:"e1"},
            {x:b.x,y:b.y+b.h,k:"e2"},{x:b.x+b.w,y:b.y+b.h,k:"e3"}];
  }
  const b = cqBBox(o);
  const ts = [{x:b.x+b.w+14,y:b.y+b.h+14,k:"esc"}];
  if(o.t==="txt"||o.t==="sello"){
    const r = o.r||0, d = b.h/2+55;
    ts.push({x:b.x+b.w/2 + d*Math.sin(r), y:b.y+b.h/2 - d*Math.cos(r), k:"rot"});
  }
  return ts;
}
function setCotaTam(s){
  if(cq.sel<0 || cq.objs[cq.sel].t!=="cota") return;
  snapCq(); cq.objs[cq.sel].ts = s; pintarCq();
}
function setCotaCol(col){
  if(cq.sel<0 || cq.objs[cq.sel].t!=="cota") return;
  snapCq(); cq.objs[cq.sel].tc = col; pintarCq();
}
function snapCq(){ cq.pila.push(JSON.stringify(cq.objs)); if(cq.pila.length>30) cq.pila.shift(); }
function deshacerCq(){
  if(!cq || !cq.pila.length) return;
  cq.objs = JSON.parse(cq.pila.pop()); cq.sel=-1; pintarCq();
}
function borrarSelCq(){
  if(cq.sel<0) return;
  snapCq(); cq.objs.splice(cq.sel,1); cq.sel=-1; pintarCq();
}
/* --- interacción --- */
function cqHit(p){
  for(let i=cq.objs.length-1;i>=0;i--){
    const b = cqBBox(cq.objs[i]), pad = Math.max(cq.objs[i].g||0, 22);
    if(p.x>=b.x-pad && p.x<=b.x+b.w+pad && p.y>=b.y-pad && p.y<=b.y+b.h+pad) return i;
  }
  return -1;
}
function cqDown(e){
  e.preventDefault();
  if(e.pointerType==="pen") cq.pen = true;
  if(e.pointerType==="touch"){
    cq.ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    cq.lz.setPointerCapture(e.pointerId);
    // dedos = zoom/paneo: con Pencil activo, con ✋ activado, o al apoyar un segundo dedo
    if(cq.pen || cq.mover || cq.ptrs.size>=2){
      if(cq.dib){ // venía dibujando con un dedo: cancelar el trazo
        cq.dib=false; cq.pts=null; cq.res=null; cq.han=null; cq.mov=false;
        cq.tmp.getContext("2d").clearRect(0,0,cq.W,cq.H);
      }
      cqGestoIni(); return;
    }
  }
  if(cq.mover){ // ✋: arrastrar con mouse o lápiz panea la imagen
    cq.pan = {x:e.clientX, y:e.clientY}; cq.panId = e.pointerId;
    cq.lz.setPointerCapture(e.pointerId);
    return;
  }
  if(cq.dib) return; // un solo puntero a la vez
  if(e.pointerType!=="touch") cq.lz.setPointerCapture(e.pointerId);
  const p = cqXY(e);
  cq.dib=true; cq.p0=p; cq.movio=false;
  if(cq.tool==="sel"){
    // ¿tomó el tirador de tamaño del objeto seleccionado?
    if(cq.sel>=0 && cq.objs[cq.sel]){
      const ts = cqTiradores(cq.objs[cq.sel]);
      const t = ts.find(t=>Math.hypot(p.x-t.x, p.y-t.y) < 45);
      if(t){
        snapCq();
        if(t.k==="esc"){
          cq.res = {o0:JSON.parse(JSON.stringify(cq.objs[cq.sel])), b0:cqBBox(cq.objs[cq.sel])};
        }else if(t.k==="rot"){
          const b = cqBBox(cq.objs[cq.sel]);
          cq.han = {k:"rot", fx:b.x+b.w/2, fy:b.y+b.h/2};
        }else{
          const op = {e0:"e3",e3:"e0",e1:"e2",e2:"e1",p1:"p2",p2:"p1"}[t.k];
          const f = ts.find(x=>x.k===op);
          cq.han = {k:t.k, fx:f?f.x:0, fy:f?f.y:0};
        }
        return;
      }
    }
    const i = cqHit(p);
    cq.mov = i>=0;
    cq.reSel = (i>=0 && i===cq.sel); // segundo toque sobre lo mismo
    if(cq.mov) snapCq();
    cq.sel = i; pintarSelCq();
  }else if(cq.tool==="goma"){
    snapCq(); cqBorrarEn(p); cqCursorGoma(p);
  }else if(cq.tool==="lapiz"){
    cq.pts=[cqPto(p,e)];
  }
}
function cqCursorGoma(p){
  const c = cq.tmp.getContext("2d");
  c.clearRect(0,0,cq.W,cq.H);
  c.beginPath(); c.arc(p.x,p.y,cq.g*3,0,7);
  c.strokeStyle="#e53935"; c.lineWidth=3; c.setLineDash([6,6]); c.stroke(); c.setLineDash([]);
}
function cqPto(p,e){ // punto con grosor según presión del Apple Pencil
  const pt = [Math.round(p.x),Math.round(p.y)];
  if(e.pointerType==="pen" && e.pressure>0) pt.push(Math.max(2,Math.round(cq.g*(0.35+1.3*e.pressure))));
  return pt;
}
function cqMove(e){
  if(!cq) return;
  if(e.pointerType==="touch" && cq.gesto && cq.ptrs.has(e.pointerId)){
    cq.ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    cqGestoMov(); return;
  }
  if(cq.pan && e.pointerId===cq.panId){ // ✋ paneo con mouse o lápiz
    e.preventDefault();
    cq.ox += e.clientX - cq.pan.x;
    cq.oy += e.clientY - cq.pan.y;
    cq.pan = {x:e.clientX, y:e.clientY};
    aplicarZoomCq();
    return;
  }
  if(!cq.dib) return;
  e.preventDefault();
  const p = cqXY(e);
  if(Math.hypot(p.x-cq.p0.x,p.y-cq.p0.y)>7) cq.movio=true;
  if(cq.tool==="sel"){
    if(cq.han && cq.sel>=0){
      const o = cq.objs[cq.sel], k = cq.han.k, fx = cq.han.fx, fy = cq.han.fy;
      if(k==="rot"){
        let r = Math.atan2(p.y-fy, p.x-fx) + Math.PI/2;
        for(const m of [0,Math.PI/2,Math.PI,-Math.PI/2,Math.PI/4,-Math.PI/4,3*Math.PI/4,-3*Math.PI/4])
          if(Math.abs(r-m)<0.08) r = m;
        o.r = r;
        pintarCq(); return;
      }
      if(k==="p1"){ o.x1=p.x; o.y1=p.y; }
      else if(k==="p2"){ o.x2=p.x; o.y2=p.y; }
      else if(o.t==="rect"){
        o.x=Math.min(p.x,fx); o.y=Math.min(p.y,fy);
        o.w=Math.max(6,Math.abs(p.x-fx)); o.h=Math.max(6,Math.abs(p.y-fy));
      }else if(o.t==="circ"){
        o.cx=(p.x+fx)/2; o.cy=(p.y+fy)/2;
        o.rx=Math.max(4,Math.abs(p.x-fx)/2); o.ry=Math.max(4,Math.abs(p.y-fy)/2);
      }
      pintarCq(); return;
    }
    if(cq.res && cq.sel>=0){ // arrastrando el tirador: cambiar tamaño
      const b0 = cq.res.b0;
      const kx = Math.max(0.08,(p.x-b0.x)/Math.max(b0.w,1));
      const ky = Math.max(0.08,(p.y-b0.y)/Math.max(b0.h,1));
      cq.objs[cq.sel] = cqEscalar(cq.res.o0, b0, kx, ky);
      pintarCq(); return;
    }
    if(!cq.mov || cq.sel<0) return;
    cqTrasladar(cq.objs[cq.sel], p.x-cq.p0.x, p.y-cq.p0.y);
    cq.p0=p; pintarCq();
  }else if(cq.tool==="goma"){
    cqBorrarEn(p); cqCursorGoma(p);
  }else if(cq.tool==="lapiz"){
    cq.pts.push(cqPto(p,e));
    const c=cq.tmp.getContext("2d");
    c.clearRect(0,0,cq.W,cq.H);
    cqObj(c,{t:"lapiz",pts:cq.pts,col:cq.col,g:cq.g});
  }else if(cq.tool==="flecha"||cq.tool==="cota"||cq.tool==="rect"||cq.tool==="circ"){
    const c=cq.tmp.getContext("2d");
    c.clearRect(0,0,cq.W,cq.H);
    cqObj(c, cqForma(cq.tool,cq.p0,p));
  }
}
function cqUp(e){
  if(!cq) return;
  if(cq.pan && e.pointerId===cq.panId){ cq.pan = null; cq.panId = null; return; }
  if(e.pointerType==="touch"){
    cq.ptrs.delete(e.pointerId);
    if(cq.gesto){
      if(cq.ptrs.size) cqGestoIni(); else cq.gesto=null;
      return;
    }
  }
  if(!cq.dib) return;
  cq.dib=false;
  const p = cqXY(e);
  if(cq.tool==="goma"){ cq.tmp.getContext("2d").clearRect(0,0,cq.W,cq.H); return; }
  if(cq.tool==="sel"){
    if(cq.res || cq.han){ cq.res=null; cq.han=null; cq.mov=false; return; } // fin del cambio de tamaño
    // toque (sin arrastre) sobre un texto o medida ya seleccionados → editarlos
    if(!cq.movio && cq.reSel && cq.sel>=0 && (cq.objs[cq.sel].t==="txt"||cq.objs[cq.sel].t==="cota")){
      const o=cq.objs[cq.sel];
      const t=prompt(o.t==="cota"?"Editar medida:":"Editar texto:",o.txt);
      if(t!==null){ snapCq(); o.txt=t.trim(); pintarCq(); }
    }
    cq.mov=false; return;
  }
  if(cq.tool==="txt"){
    const t = prompt("Texto:"); if(!t || !t.trim()) return;
    snapCq();
    cq.objs.push({t:"txt",x:p.x,y:p.y,txt:t.trim(),col:cq.col,s:cq.g*8});
    cq.sel=cq.objs.length-1; pintarCq(); return;
  }
  if(cq.tool==="sello"){
    snapCq();
    const s = cq.g*12;
    cq.objs.push({t:"sello",x:p.x-s/2,y:p.y-s/2,e:cq.sello,s});
    pintarCq(); return;
  }
  if(cq.tool!=="lapiz" && !cq.movio) return; // toque accidental: no crear forma vacía
  snapCq();
  if(cq.tool==="lapiz"){
    if(cq.pts.length<3) cq.pts.push([cq.pts[0][0]+1, cq.pts[0][1]+1]); // toque = punto
    cq.objs.push(cqReconocer(cq.pts) || {t:"lapiz",pts:cq.pts,col:cq.col,g:cq.g});
    cq.pts=null;
  }else{
    const o = cqForma(cq.tool,cq.p0,p);
    if(cq.tool==="cota"){
      const m = prompt("Medida (ej: 35 m, Ø 4 m, perím. 120 m):");
      o.txt = (m||"").trim();
      cq.sel = cq.objs.length; // queda seleccionada para ajustar
    }
    cq.objs.push(o);
  }
  cq.tmp.getContext("2d").clearRect(0,0,cq.W,cq.H);
  pintarCq();
}
function cqForma(t,a,p){
  if(t==="flecha") return {t:"flecha",x1:a.x,y1:a.y,x2:p.x,y2:p.y,col:cq.col,g:cq.g};
  if(t==="cota") return {t:"cota",x1:a.x,y1:a.y,x2:p.x,y2:p.y,txt:"",col:cq.col,g:cq.g};
  if(t==="rect") return {t:"rect",x:a.x,y:a.y,w:p.x-a.x,h:p.y-a.y,col:cq.col,g:cq.g};
  return {t:"circ",cx:(a.x+p.x)/2,cy:(a.y+p.y)/2,rx:Math.abs(p.x-a.x)/2||1,ry:Math.abs(p.y-a.y)/2||1,col:cq.col,g:cq.g};
}
function cqEscalar(o0,b,kx,ky){ // devuelve una copia de o0 escalada desde la esquina superior izquierda de su caja
  const o = JSON.parse(JSON.stringify(o0));
  const X = x=>b.x+(x-b.x)*kx, Y = y=>b.y+(y-b.y)*ky, k = Math.max(kx,ky);
  if(o.t==="lapiz"){ for(const p of o.pts){ p[0]=X(p[0]); p[1]=Y(p[1]); if(p[2]) p[2]=Math.max(2,p[2]*k); } }
  else if(o.t==="linea"||o.t==="flecha"||o.t==="cota"){
    o.x1=X(o.x1); o.y1=Y(o.y1); o.x2=X(o.x2); o.y2=Y(o.y2);
    if(o.ts) o.ts = Math.max(14,Math.round(o.ts*k));
  }
  else if(o.t==="rect"){ o.x=X(o.x); o.y=Y(o.y); o.w*=kx; o.h*=ky; }
  else if(o.t==="circ"){ o.cx=X(o.cx); o.cy=Y(o.cy); o.rx=Math.max(4,o.rx*kx); o.ry=Math.max(4,o.ry*ky); }
  else { o.x=X(o.x); o.y=Y(o.y); o.s=Math.min(500,Math.max(14,Math.round(o.s*k))); } // txt y sello: proporcional
  return o;
}
function cqTrasladar(o,dx,dy){
  if(o.t==="lapiz"){ for(const p of o.pts){ p[0]+=dx; p[1]+=dy; } }
  else if(o.t==="linea"||o.t==="flecha"||o.t==="cota"){ o.x1+=dx; o.y1+=dy; o.x2+=dx; o.y2+=dy; }
  else if(o.t==="circ"){ o.cx+=dx; o.cy+=dy; }
  else { o.x+=dx; o.y+=dy; }
}
/* --- goma: borra fino (corta trazos) o elimina el objeto tocado --- */
function cqCercaSeg(p,x1,y1,x2,y2,d){
  const L2=(x2-x1)*(x2-x1)+(y2-y1)*(y2-y1);
  let t = L2? ((p.x-x1)*(x2-x1)+(p.y-y1)*(y2-y1))/L2 : 0;
  t = Math.max(0,Math.min(1,t));
  return Math.hypot(p.x-(x1+t*(x2-x1)), p.y-(y1+t*(y2-y1))) < d;
}
function cqBorrarEn(p){
  const r = cq.g*3; // el botón de grosor define el porte de la goma
  let cambio = false;
  for(let i=cq.objs.length-1;i>=0;i--){
    const o = cq.objs[i], g = (o.g||8);
    if(o.t==="lapiz"){
      if(!o.pts.some(q=>Math.hypot(q[0]-p.x,q[1]-p.y)<r+g/2)) continue;
      cambio = true;
      const tramos=[]; let cur=[];
      for(const q of o.pts){
        if(Math.hypot(q[0]-p.x,q[1]-p.y)<r+g/2){ if(cur.length>1) tramos.push(cur); cur=[]; }
        else cur.push(q);
      }
      if(cur.length>1) tramos.push(cur);
      cq.objs.splice(i,1,...tramos.map(ts=>({t:"lapiz",pts:ts,col:o.col,g:o.g})));
      cq.sel=-1;
    }else{
      let toca=false;
      if(o.t==="linea"||o.t==="flecha"||o.t==="cota") toca = cqCercaSeg(p,o.x1,o.y1,o.x2,o.y2,r+g);
      else if(o.t==="rect"){
        const x2=o.x+o.w, y2=o.y+o.h;
        toca = cqCercaSeg(p,o.x,o.y,x2,o.y,r+g)||cqCercaSeg(p,x2,o.y,x2,y2,r+g)||
               cqCercaSeg(p,x2,y2,o.x,y2,r+g)||cqCercaSeg(p,o.x,y2,o.x,o.y,r+g);
      }else if(o.t==="circ"){
        toca = Math.abs(Math.hypot((p.x-o.cx)/o.rx,(p.y-o.cy)/o.ry)-1) < (r+g)/Math.max(10,Math.min(o.rx,o.ry));
      }else{ // texto y sello: por su caja
        const b = cqBBox(o);
        toca = p.x>=b.x-6 && p.x<=b.x+b.w+6 && p.y>=b.y-6 && p.y<=b.y+b.h+6;
      }
      if(toca){ cq.objs.splice(i,1); cambio=true; cq.sel=-1; }
    }
  }
  if(cambio) pintarCq();
}
/* --- reconocimiento de formas: endereza líneas, círculos y rectángulos --- */
function cqReconocer(pts){
  if(!pts || pts.length<8) return null;
  let len=0;
  for(let i=1;i<pts.length;i++) len+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);
  const a=pts[0], z=pts[pts.length-1];
  const cuerda=Math.hypot(z[0]-a[0],z[1]-a[1]);
  let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
  for(const p of pts){ x1=Math.min(x1,p[0]); y1=Math.min(y1,p[1]); x2=Math.max(x2,p[0]); y2=Math.max(y2,p[1]); }
  const bw=x2-x1, bh=y2-y1;
  // ¿línea recta? poca desviación respecto a la cuerda
  if(cuerda>70 && len<cuerda*1.12){
    let dmax=0;
    for(const p of pts){
      const d=Math.abs((z[1]-a[1])*p[0]-(z[0]-a[0])*p[1]+z[0]*a[1]-z[1]*a[0])/cuerda;
      dmax=Math.max(dmax,d);
    }
    if(dmax<Math.max(14,cuerda*0.045)) return {t:"linea",x1:a[0],y1:a[1],x2:z[0],y2:z[1],col:cq.col,g:cq.g};
  }
  // ¿figura cerrada? (termina cerca de donde empezó)
  if(len>200 && cuerda<len*0.22 && bw>50 && bh>50){
    const cx=(x1+x2)/2, cy=(y1+y2)/2;
    const rs=pts.map(p=>Math.hypot(p[0]-cx,p[1]-cy));
    const rm=rs.reduce((s,r)=>s+r,0)/rs.length;
    const varz=Math.sqrt(rs.reduce((s,r)=>s+(r-rm)*(r-rm),0)/rs.length)/rm;
    if(varz<0.16) return {t:"circ",cx,cy,rx:bw/2,ry:bh/2,col:cq.col,g:cq.g}; // círculo/óvalo
    // ¿rectángulo? la mayoría de los puntos pegados a los bordes de la caja
    const tol=Math.max(20,Math.min(bw,bh)*0.14);
    let borde=0;
    for(const p of pts){
      if(Math.min(Math.abs(p[0]-x1),Math.abs(p[0]-x2),Math.abs(p[1]-y1),Math.abs(p[1]-y2))<tol) borde++;
    }
    if(borde/pts.length>0.8) return {t:"rect",x:x1,y:y1,w:bw,h:bh,col:cq.col,g:cq.g};
  }
  return null; // se queda a mano alzada
}

  }, e=>{ const i2=document.getElementById("gpsInfo"); if(i2) i2.textContent = silencioso? "" : "sin señal GPS"; },

function comprimirImagen(file){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = ()=>{
      const MAX = 1600;
      let w = img.width, h = img.height;
      if(Math.max(w,h)>MAX){ const k = MAX/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
      const c = document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.72));
      URL.revokeObjectURL(img.src);
    };
    img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}

/* pellizco para acercar + doble toque (2.5x / volver) en el visor de imágenes */
function visorGestos(){
  const lz = document.querySelector("#capaVisor .visor .lienzo"); if(!lz) return;
  const im = lz.querySelector("img.full"); if(!im) return;
  let z=1, ox=0, oy=0, g=null, tap0=0;
  const ptrs = new Map();
  const ap = ()=>{
    if(z<1.02 && !ptrs.size){ z=1; ox=0; oy=0; }
    const r = lz.getBoundingClientRect();
    const lx = Math.max(0,(im.clientWidth*z-r.width)/2) + (z>1? 40:0);
    const ly = Math.max(0,(im.clientHeight*z-r.height)/2) + (z>1? 40:0);
    ox = Math.max(-lx, Math.min(lx, ox)); oy = Math.max(-ly, Math.min(ly, oy));
    im.style.transform = `translate(${ox}px,${oy}px) scale(${z})`;
  };
  const ini = ()=>{
    const ps = [...ptrs.values()];
    g = {z0:z, ox0:ox, oy0:oy,
      m0:{x:ps.reduce((s,p)=>s+p.x,0)/ps.length, y:ps.reduce((s,p)=>s+p.y,0)/ps.length},
      d0: ps.length>1? Math.hypot(ps[0].x-ps[1].x, ps[0].y-ps[1].y) : 0};
  };
  lz.addEventListener("pointerdown", e=>{
    e.preventDefault(); lz.setPointerCapture(e.pointerId);
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY}); ini();
  });
  lz.addEventListener("pointermove", e=>{
    if(!g || !ptrs.has(e.pointerId)) return;
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    const ps = [...ptrs.values()];
    const m = {x:ps.reduce((s,p)=>s+p.x,0)/ps.length, y:ps.reduce((s,p)=>s+p.y,0)/ps.length};
    if(ps.length>1 && g.d0>0){
      const d = Math.hypot(ps[0].x-ps[1].x, ps[0].y-ps[1].y);
      z = Math.max(1, Math.min(8, g.z0*d/g.d0));
    }
    const r = lz.getBoundingClientRect(), cx = r.left+r.width/2, cy = r.top+r.height/2;
    ox = m.x-cx-(g.m0.x-cx-g.ox0)*(z/g.z0);
    oy = m.y-cy-(g.m0.y-cy-g.oy0)*(z/g.z0);
    ap();
  });
  const fin = e=>{
    if(!ptrs.has(e.pointerId)) return;
    // doble toque: acercar 2.5x donde se tocó, o volver al tamaño normal
    const ahora = Date.now();
    if(ptrs.size===1 && g && g.d0===0 && Math.hypot(e.clientX-g.m0.x, e.clientY-g.m0.y)<12){
      if(ahora-tap0<320){
        if(z>1.02){ z=1; ox=0; oy=0; }
        else{
          const r = lz.getBoundingClientRect(), cx = r.left+r.width/2, cy = r.top+r.height/2;
          z = 2.5; ox = (e.clientX-cx)*(1-z); oy = (e.clientY-cy)*(1-z);
        }
        tap0 = 0;
      }else tap0 = ahora;
    }
    ptrs.delete(e.pointerId);
    if(ptrs.size) ini(); else g=null;
    ap();
  };
  lz.addEventListener("pointerup", fin);
  lz.addEventListener("pointercancel", fin);
  lz.addEventListener("wheel", e=>{ // rueda del mouse: zoom donde apunta el cursor
    e.preventDefault();
    const k = e.deltaY<0? 1.15 : 1/1.15;
    const z1 = Math.max(1, Math.min(8, z*k));
    const r = lz.getBoundingClientRect(), cx = r.left+r.width/2, cy = r.top+r.height/2;
    ox = e.clientX-cx-(e.clientX-cx-ox)*(z1/z);
    oy = e.clientY-cy-(e.clientY-cy-oy)*(z1/z);
    z = z1; ap();
  }, {passive:false});
}

/* ================== PLANIFICACIÓN DE LABORES ================== */
function semanaDe(iso){
  const d = new Date(iso+"T12:00:00");
  const lun = new Date(d); lun.setDate(d.getDate() - ((d.getDay()+6)%7)); // lunes
  const out = [];
  for(let i=0;i<7;i++){ const x=new Date(lun); x.setDate(lun.getDate()+i); out.push(x.toISOString().slice(0,10)); }
  return out;
}
function moverSemana(n){
  const base = nav.semanaIni || semanaDe(hoy())[0];
  const d = new Date(base+"T12:00:00"); d.setDate(d.getDate()+n*7);
  nav.semanaIni = d.toISOString().slice(0,10);
  render();
}

function planSemana(){

function planDia(){

function moverDia(n){

const MESES_L = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function planMes(){
  const base = nav.mesIni || hoy().slice(0,7);
  const [an,me] = base.split("-").map(Number);
  const prim = new Date(an, me-1, 1, 12);
  const diasMes = new Date(an, me, 0).getDate();
  const off = (prim.getDay()+6)%7; // lunes = 0
  const celdas = Math.ceil((off+diasMes)/7)*7;
  const ini = new Date(prim); ini.setDate(1-off);
  const hoyI = hoy();
  let h = `<div class="card"><div class="fila" style="justify-content:space-between">
    <button class="btn sec chico" onclick="moverMes(-1)">‹</button>
    <b>${MESES_L[me-1]} ${an}</b>
    <button class="btn sec chico" onclick="moverMes(1)">›</button>
  </div>
  <div class="cal-grid" style="margin-top:10px">
    ${["Lu","Ma","Mi","Ju","Vi","Sá","Do"].map(x=>`<div class="cal-dh">${x}</div>`).join("")}`;
  const d = new Date(ini);
  for(let i=0;i<celdas;i++){
    const f = d.toISOString().slice(0,10);
    const enMes = d.getMonth()===me-1;
    const labs = laboresDe(f);
    const pend = labs.filter(l=>l.estado!=="hecha").length;
    const nnots = D.notas.filter(n=>(n.fh||"").slice(0,10)===f && (!nav.filtroFundo||n.fundo===nav.filtroFundo)).length;
    h += `<div class="cal-cel ${enMes?"":"fuera"} ${f===hoyI?"hoy":""}" onclick="nav.planVista='dia';nav.diaSel='${f}';render()">
      <div class="cal-num">${d.getDate()}</div>
      ${labs.length?`<div class="cal-b ${pend?"pend":"ok"}">${labs.length} 📅</div>`:""}
      ${nnots?`<div class="cal-b nota">${nnots} 📝</div>`:""}
    </div>`;
    d.setDate(d.getDate()+1);
  }
  h += `</div><div class="muted" style="margin-top:8px">Toca un día para ver su agenda completa.</div></div>`;
  return h;
}
function moverMes(n){
  const base = nav.mesIni || hoy().slice(0,7);
  const [a,m] = base.split("-").map(Number);
  const d = new Date(a, m-1+n, 1, 12);
  nav.mesIni = d.toISOString().slice(0,7); render();
}

  };

  pintaCampos();

/* --- catálogo de fundos --- */
function agregarFundo(){
  const t = prompt("Nombre del nuevo fundo (ej: Oficina, Bodega general):");
  if(!t || !t.trim()) return;
  const n = t.trim();
  if(fundos().includes(n)){ alert("Ya existe un fundo con ese nombre."); return; }
  D.fundos.push(n);
  guardar(); render();
}
function renombrarFundo(i){
  const f = fundos()[i]; if(!f) return;
  const t = prompt("Nuevo nombre para el fundo:", f);
  if(!t || !t.trim() || t.trim()===f) return;
  const n = t.trim();
  if(fundos().includes(n)){ alert("Ya existe un fundo con ese nombre."); return; }
  D.fundos = fundos().map(x=>x===f? n : x);
  for(const q of D.cuarteles) if(q.fundo===f) q.fundo = n;
  for(const x of D.notas) if(x.fundo===f) x.fundo = n;
  for(const x of D.registros) if(x.fundo===f) x.fundo = n;
  for(const x of D.labores) if(x.fundo===f) x.fundo = n;
  for(const p of D.mapoly){
    if(p.fundoRef===f) p.fundoRef = n;
    if(p.tipo==="Fundo" && p.nombre===f) p.nombre = n;
  }
  if(nav.filtroFundo===f) nav.filtroFundo = n;
  guardar(); render();
}
function eliminarFundo(i){
  const f = fundos()[i]; if(!f) return;
  const usos = cuartelesDe(f).length + D.notas.filter(x=>x.fundo===f).length +
    D.registros.filter(x=>x.fundo===f).length + D.labores.filter(x=>x.fundo===f).length;
  if(usos){ alert(`No se puede eliminar: "${f}" tiene ${usos} elementos guardados (cuarteles, notas, registros o labores). Renómbralo, o mueve/borra esos elementos primero.`); return; }
  if(!confirm(`¿Eliminar el fundo "${f}"?`)) return;
  D.fundos = fundos().filter(x=>x!==f);
  D.mapoly = D.mapoly.filter(p=>!(p.tipo==="Fundo" && (p.fundoRef===f || p.nombre===f)));
  if(nav.filtroFundo===f) nav.filtroFundo = null;
  guardar(); render();
}

function importarGesAgro(inp){
  const f = inp.files && inp.files[0]; if(!f) return;
  const lector = new FileReader();
  lector.onload = ()=>{
    try{
      const j = JSON.parse(lector.result);
      if(!j.productos || !j.cuarteles){ alert("Ese archivo no parece un respaldo de GesAgro."); return; }
      D.gesagro = {
        importado: hoy(),
        campos: (j.campos||[]).map(c=>({id:c.id, nombre:c.nombre})),
        cuarteles: (j.cuarteles||[]).map(q=>({id:q.id, campoId:q.campoId, nombre:q.nombre, especie:q.especie||""})),
        productos: (j.productos||[]).map(p=>({id:p.id, nombre:p.nombre, carencia:+p.carencia||0, carenciaEsp:p.carenciaEsp||{}, reingreso:+p.reingreso||0})),
        regFito: (j.regFito||[]).map(r=>({campoId:r.campoId, cuartelId:r.cuartelId||null, productoId:r.productoId, fecha:r.fecha}))
      };
      guardar(); render();
      alert(`Respaldo de GesAgro importado: ${D.gesagro.regFito.length} aplicaciones, ${D.gesagro.cuarteles.length} cuarteles.`);
    }catch(e){ alert("No se pudo leer el archivo: "+e.message); }
  };
  lector.readAsText(f);
  inp.value = "";
}

function resumenSuperficie(){
  const fs = fundos().filter(f=>cuartelesDe(f).length);
  if(!D.cuarteles.length) return "";
  const por = {}; let totHa = 0;
  for(const q of D.cuarteles){
    const ha = +q.ha||0; totHa += ha;
    const k = q.variedad || "Sin variedad";
    if(!por[k]) por[k] = {esp:q.especie||"", tot:0, f:{}};
    por[k].tot += ha;
    por[k].f[q.fundo] = (por[k].f[q.fundo]||0) + ha;
    if(por[k].esp && q.especie && por[k].esp!==q.especie) por[k].esp=""; // variedad en más de una especie
  }
  const vars = Object.entries(por).sort((a,b)=>b[1].tot-a[1].tot);
  const totF = {}; for(const f of fs) totF[f] = cuartelesDe(f).reduce((s,q)=>s+(+q.ha||0),0);
  return `<div class="card"><h2>📊 Superficie por variedad</h2>
    <div class="muted" style="margin-bottom:8px">${D.cuarteles.length} cuarteles · <b>${num(totHa)} ha</b> en total. Se actualiza solo al editar cuarteles.</div>
    <div style="overflow-x:auto"><table class="t">
      <tr><th>Variedad</th>${fs.map(f=>`<th style="text-align:right">${esc(f)}</th>`).join("")}<th style="text-align:right">Total ha</th><th style="text-align:right">%</th></tr>
      ${vars.map(([vv,d])=>`<tr>
        <td><b>${esc(vv)}</b>${d.esp?` <span class="muted">${esc(d.esp)}</span>`:""}</td>
        ${fs.map(f=>`<td style="text-align:right">${d.f[f]?num(d.f[f]):"·"}</td>`).join("")}
        <td style="text-align:right"><b>${num(d.tot)}</b></td>
        <td style="text-align:right">${totHa?Math.round(d.tot/totHa*100):0}%</td></tr>`).join("")}
      <tr style="border-top:2px solid var(--borde,#ccc)">
        <td><b>Total</b></td>
        ${fs.map(f=>`<td style="text-align:right"><b>${num(totF[f])}</b></td>`).join("")}
        <td style="text-align:right"><b>${num(totHa)}</b></td><td style="text-align:right">100%</td></tr>
    </table></div></div>`;
}

/* --- Exportar CSV --- */
function csvExport(que){
  const sep = ";";
  const cel = x=>{ x = (x==null? "" : String(x)); return /[;"\n]/.test(x)? '"'+x.replace(/"/g,'""')+'"' : x; };
  let head = [], filas = [];
  if(que==="labores"){
    head = ["Fecha","Término","Tipo","Fundo","Cuartel","Detalle","Responsable","Estado"];
    filas = [...D.labores].sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""))
      .map(l=>[fmtF(l.fecha),fmtF(l.fecha2),l.tipo,l.fundo,l.cuartel,l.desc,l.resp,l.estado]);
  }else if(que==="registros"){
    const extras = [...new Set(Object.values(CAMPOS_REG).flat().map(c=>c[0]))];
    head = ["Fecha","Tipo","Fundo","Cuartel",...extras,"Observaciones"];
    filas = [...D.registros].sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""))
      .map(r=>[fmtF(r.fecha),r.tipo,r.fundo,r.cuartel,...extras.map(k=>r[k]!=null?r[k]:""),r.obs]);
  }else{
    head = ["Fecha y hora","Fundo","Cuartel","Categoría","Nota","Fijada","Resuelta","GPS"];
    filas = [...D.notas].sort((a,b)=>(a.fh||"").localeCompare(b.fh||""))
      .map(n=>[fmtFH(n.fh),n.fundo,n.cuartel,n.cat,n.texto,n.fijada?"sí":"",n.resuelta?"sí":"",n.gps?`${n.gps.lat}, ${n.gps.lng}`:""]);
  }
  const csv = "﻿" + [head,...filas].map(f=>f.map(cel).join(sep)).join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = `agronotas_${que}_${hoy()}.csv`; a.click();
}
function guardarLluviaLoc(){
  const lat = parseFloat(v("ll_lat").replace(",",".")), lng = parseFloat(v("ll_lng").replace(",","."));
  if(isNaN(lat) || isNaN(lng)){ alert("Ingresa latitud y longitud válidas (ej: -33.41 y -71.14)."); return; }
  D.lluviaLoc = {lat:+lat.toFixed(5), lng:+lng.toFixed(5)};

function lluviaGPS(){
  if(!navigator.geolocation){ alert("Este equipo no entrega ubicación."); return; }
  navigator.geolocation.getCurrentPosition(p=>{
    document.getElementById("ll_lat").value = p.coords.latitude.toFixed(5);
    document.getElementById("ll_lng").value = p.coords.longitude.toFixed(5);
  }, e=>alert("No se pudo obtener la ubicación: "+e.message), {enableHighAccuracy:true, timeout:8000});
}

        ${labs.length? `<table><tr><th>Fecha</th><th>Labor</th><th>Fundo</th><th>Cuartel</th><th>Responsable</th><th>Estado</th><th class="no-print" style="border:none;background:none"></th></tr>
          ${labs.map(l=>`<tr><td>${fmtF(l.fecha)}${l.fecha2?` → ${fmtF(l.fecha2)}`:""}</td><td>${esc(l.tipo)}${l.desc?` — <span style="color:#555">${esc(l.desc)}</span>`:""}</td><td>${esc(l.fundo)}</td><td>${esc(l.cuartel)}</td><td>${esc(l.resp)}</td><td>${est[l.estado]||esc(l.estado)}</td><td class="no-print" style="border:none"><button class="inf-x" onclick="this.closest('tr').remove()">✕</button></td></tr>`).join("")}</table>` : `<div class="inf-vacio">Sin labores registradas esta semana.</div>`}</div>
        <div class="inf-sec"><h2>📋 Registros técnicos <button class="inf-x no-print" onclick="this.closest('.inf-sec').remove()">✕ sección</button></h2>
        ${regs.length? `<table><tr><th>Fecha</th><th>Tipo</th><th>Fundo</th><th>Cuartel</th><th>Detalle</th><th class="no-print" style="border:none;background:none"></th></tr>
          ${regs.map(r=>{
            const det = (CAMPOS_REG[r.tipo]||[]).map(([k,lab])=>r[k]?`${lab.replace(" *","").split(" (")[0]}: ${esc(r[k])}`:"").filter(Boolean).join(" · ");
            return `<tr><td>${fmtF(r.fecha)}</td><td>${icoReg(r.tipo)} ${esc(r.tipo)}</td><td>${esc(r.fundo)}</td><td>${esc(r.cuartel)}</td><td>${det}${r.obs?`${det?" · ":""}${esc(r.obs)}`:""}</td><td class="no-print" style="border:none"><button class="inf-x" onclick="this.closest('tr').remove()">✕</button></td></tr>`;}).join("")}</table>` : `<div class="inf-vacio">Sin registros esta semana.</div>`}</div>

        ${nots.length? nots.map(n=>`<div class="inf-nota"><button class="inf-x no-print" style="float:right" onclick="this.closest('.inf-nota').remove()">✕</button>${n.cat==="Urgente"?"🔴 ":""}${n.fijada?"📌 ":""}<b>${fmtFH(n.fh)}</b> · ${esc(n.fundo)}${n.cuartel?" · "+esc(n.cuartel):""} · <i>${esc(n.cat)}</i><br>${esc(n.texto)}</div>`).join("") : `<div class="inf-vacio">Sin notas esta semana.</div>`}</div>
        ${fotos.length? `<div class="inf-sec"><h2>📷 Fotos de la semana <button class="inf-x no-print" onclick="this.closest('.inf-sec').remove()">✕ sección</button></h2><div class="inf-fotos">${fotos.map(f=>`<div style="position:relative"><img id="inf_${f}"><button class="inf-x no-print" style="position:absolute;top:4px;right:4px" onclick="this.parentElement.remove()">✕</button></div>`).join("")}</div></div>`:""}
        <div style="margin-top:18px;padding-top:8px;border-top:1px solid #ccc;color:#777;font-size:11.5px">Generado con AgroNotas · ${PROY? esc(PROY.nombre) : ""}</div>
      </div>
    </div>
  </div>`;
  for(const f of fotos) fotoGet(f).then(d=>{ const im=document.getElementById("inf_"+f); if(im && d) im.src=d; });
  if(D.lluviaLoc && navigator.onLine){
    const finLl = fin < hoy()? fin : hoy();
    if(infIni <= finLl)
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${D.lluviaLoc.lat}&longitude=${D.lluviaLoc.lng}&daily=precipitation_sum&timezone=auto&start_date=${infIni}&end_date=${finLl}`)
      .then(r=>r.json()).then(j=>{
        const vals = ((j.daily && j.daily.precipitation_sum) || []).map(x=>+x||0);
        if(!vals.length) return;
        const tot = vals.reduce((s,x)=>s+x,0);
        const el = document.getElementById("infLluvia"), sub = document.getElementById("infLluviaSub");
        if(el) el.textContent = `${num(tot)} mm`;
        if(sub) sub.textContent = lluvia? `Lluvia 🌐 (manual: ${num(lluvia)} mm)` : "Lluvia 🌐 en línea";
      }).catch(()=>{});
  }
}
function infMover(n){
  const d = new Date(infIni+"T12:00:00"); d.setDate(d.getDate()+n*7);
  abrirInforme(d.toISOString().slice(0,10));
}
/* --- Respaldo completo --- */
async function respaldar(){
  const fotos = await fotoTodas();
  const pack = {app:"cuadernoTF", version:1, fecha:ahora(), datos:D, fotos};
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(pack)],{type:"application/json"}));
  a.download = `respaldo_agronotas_${hoy()}.json`; a.click();
  D.ultimoRespaldo = hoy(); guardar(); // para el widget 💾 recordatorio
}
function restaurar(inp){
  const file = inp.files[0]; if(!file) return;
  const fr = new FileReader();
  fr.onload = async ()=>{
    try{
      const pack = JSON.parse(fr.result);
      if(pack.app!=="cuadernoTF") throw new Error("Este archivo no es un respaldo de AgroNotas.");
      if(!confirm("Esto reemplazará TODOS los datos actuales por los del respaldo del "+fmtFH(pack.fecha)+". ¿Continuar?")) return;
      D = pack.datos; guardar();
      for(const f of (pack.fotos||[])) await fotoPut(f.id, f.data);
      cargar(); // re-aplica migraciones sobre lo restaurado
      alert("✅ Respaldo restaurado."); render();
    }catch(e){ alert("No se pudo restaurar: "+e.message); }
    inp.value = "";
  };
  fr.readAsText(file);
}
async function borrarTodo(){
  if(!confirm("⚠️ Se borrarán TODAS las notas, labores, registros y fotos de este dispositivo. ¿Continuar?")) return;
  if(!confirm("¿Seguro? No se puede deshacer. Idealmente descarga primero un respaldo.")) return;
  const fotos = await fotoTodas();
  for(const f of fotos) await fotoDel(f.id);
  D = defaults(); guardar(); render();
}

/* ================== PROYECTOS (varios campos/empresas, datos separados) ================== */
function proysLista(){
  try{ return JSON.parse(localStorage.getItem("agronotasProys")||"null"); }catch(e){ return null; }
}
function proysGuardar(l){ localStorage.setItem("agronotasProys", JSON.stringify(l)); }
function iniciarProyectos(){
  let l = proysLista();
  if(!l){ // primera vez: los datos existentes pasan a ser el proyecto 1 tal cual están
    l = [{id:1, nombre:"Total Fruit Curacaví", sub:"", clave:"", creado:hoy()}];
    proysGuardar(l);
  }
  const auto = +localStorage.getItem("agronotasAuto")||0;
  const p = l.find(x=>x.id===auto);
  if(p && !p.clave){ entrarProyecto(p.id); return; }
  pantallaProyectos();
}
function pantallaProyectos(msg){
  const l = proysLista()||[];
  document.getElementById("capaVisor").innerHTML = `
  <div class="visor" style="background:linear-gradient(160deg,#14532d,#1e7a4c)">
    <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px">
      <div style="font-size:54px">🍊</div>
      <div style="font-size:30px;font-weight:800;color:#fff;letter-spacing:.5px">AgroNotas</div>
      <div style="color:#bfe0c2;font-size:13px;margin-bottom:26px">Elige tu proyecto para comenzar</div>
      ${msg? `<div style="background:#f4ded2;color:#c62828;font-weight:700;padding:8px 16px;border-radius:10px;margin-bottom:14px">${msg}</div>`:""}
      <div style="display:flex;flex-direction:column;gap:12px;width:min(430px,92vw)">
        ${l.map(p=>`
          <div style="background:#fff;border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25)" onclick="pedirEntrar(${p.id})">
            <div style="font-size:26px">${p.clave?"🔒":"🌱"}</div>
            <div style="flex:1">
              <div style="font-weight:800;font-size:16px;color:#2b2a26">${esc(p.nombre)}</div>
              ${p.sub? `<div style="color:#7a7d79;font-size:12px">${esc(p.sub)}</div>`:""}
            </div>
            <div style="color:#1e7a4c;font-weight:800;font-size:20px">→</div>
          </div>`).join("")}
        <button class="btn" style="background:rgba(255,255,255,.14);color:#fff;border:1.5px dashed rgba(255,255,255,.55)" onclick="nuevoProyecto()">＋ Nuevo proyecto</button>
      </div>
      <label style="color:#bfe0c2;font-size:12.5px;margin-top:22px;display:flex;gap:8px;align-items:center;cursor:pointer">
        <input type="checkbox" id="proyAuto" checked style="width:19px;height:19px;min-height:0;margin:0"> Entrar directo la próxima vez
      </label>
    </div>
  </div>`;
}
function pedirEntrar(id){
  const p = (proysLista()||[]).find(x=>x.id===id); if(!p) return;
  if(p.clave){
    const c = prompt(`Clave de "${p.nombre}":`);
    if(c===null) return;
    if(c!==p.clave){ pantallaProyectos("Clave incorrecta"); return; }
  }
  entrarProyecto(id);
}
async function entrarProyecto(id){
  const l = proysLista()||[];
  PROY = l.find(x=>x.id===id); if(!PROY) return;
  CLAVE = id===1? "cuadernoTFv1" : "cuadernoTFv1_p"+id;
  DBNOM = id===1? "tfFotosDB" : "tfFotosDB_p"+id;
  const chk = document.getElementById("proyAuto");
  if(!chk || chk.checked) localStorage.setItem("agronotasAuto", String(id));
  else localStorage.removeItem("agronotasAuto");
  document.getElementById("capaVisor").innerHTML = "";
  const esNuevo = !localStorage.getItem(CLAVE);
  cargar();
  if(esNuevo && id!==1){ // proyecto nuevo: parte limpio, sin los cuarteles de Total Fruit
    D.cuarteles = []; D.fundos = []; guardar();
  }
  idb = null;
  try{ await abrirIDB(); }
  catch(e){ alert("No se pudo abrir el almacén de fotos: "+e.message); }
  nav.tab = "panel";
  render();
}
function nuevoProyecto(){
  const n = prompt("Nombre del nuevo proyecto (ej: Fundo Los Maquis):"); if(!n || !n.trim()) return;
  const s = prompt("Subtítulo — empresa o zona (opcional):")||"";
  const c = prompt("Clave para entrar (opcional; ojo: es una clave simple, no cifrado):")||"";
  const l = proysLista()||[];
  const id = Math.max(0, ...l.map(x=>x.id)) + 1;
  l.push({id, nombre:n.trim(), sub:s.trim(), clave:c.trim(), creado:hoy()});
  proysGuardar(l);
  pantallaProyectos();
}
function salirProyecto(){
  localStorage.removeItem("agronotasAuto");
  PROY = null;
  pantallaProyectos();
}

/* ================== INICIO ================== */
(async function init(){
  iniciarProyectos();
  if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
    try{ navigator.serviceWorker.register("sw.js"); }catch(e){}
  }
})();
</script>

  const t = {panel:"Panel", notas:"Notas de terreno", plan:"Planificación", reg:"Registros técnicos", tab:"Tablero", noti:"Noticias del agro", datos:"Datos y ajustes"}[nav.tab];
  document.getElementById("topbar").innerHTML =
    `<div style="flex:1;min-width:180px"><h1>${t}<span class="sub">${PROY? esc(PROY.nombre) : "AgroNotas"} · ${fmtF(hoy())}</span></h1></div>
    <div class="acciones">
