}

/* ---------- PANEL ---------- */
function vPanel(){
  const haTot = D.cuarteles.reduce((s,q)=>s+(+q.ha||0),0);
  const haPlant = D.cuarteles.filter(q=>q.especie!=="Por plantar").reduce((s,q)=>s+(+q.ha||0),0);
  const hoyISO = hoy();
  const pend = D.labores.filter(l=>l.estado!=="hecha");
  const atras = pend.filter(l=>(l.fecha2||l.fecha)<hoyISO);
  const deHoy = D.labores.filter(l=>l.fecha===hoyISO || (l.fecha2 && l.fecha<=hoyISO && hoyISO<=l.fecha2));
  const sem = semanaDe(hoyISO);
  const deSemana = D.labores.filter(l=>l.fecha>=sem[0] && l.fecha<=sem[6]);
  const notasRec = [...D.notas].sort((a,b)=>b.fh.localeCompare(a.fh));
  const fijadas = notasRec.filter(n=>n.fijada);
  const urg = D.notas.filter(n=>n.cat==="Urgente" && !n.resuelta);

  let h = "";

  /* Urgencias: franja siempre arriba */
  if(urg.length){
    const u = urg[0];
    h += `<div class="urgente-card" onclick="verNota(${u.id})">
      <span style="width:9px;height:9px;border-radius:50%;background:var(--urg);flex:0 0 auto"></span>
      <div style="flex:1;font-size:13.5px;min-width:0"><b>${urg.length===1?"1 urgente sin resolver:":urg.length+" urgentes sin resolver. La última:"}</b>
        ${esc(u.texto).slice(0,90)}${u.texto.length>90?"…":""} — ${esc(u.fundo)}${u.cuartel?" · "+esc(u.cuartel):""}</div>
      <button class="btn sec chico" onclick="event.stopPropagation();verNota(${u.id})">Ver nota</button>
    </div>`;
  }

  /* Recordatorios */
  const avisos = D.notas.filter(n=>n.aviso && n.aviso<=hoyISO);
  if(avisos.length) h += `<div class="card" style="border-left:4px solid var(--acc)">
    <div class="w-tit">🔔 Recordatorios (${avisos.length})</div>
    ${avisos.sort((a,b)=>a.aviso.localeCompare(b.aviso)).map(n=>`<div class="fila" style="align-items:center">
      <div style="flex:1">${miniNota(n)}</div>
      <button class="btn sec chico" onclick="cerrarAviso(${n.id})">✓ Listo</button></div>`).join("")}</div>`;

  /* Estado general + clima */
  h += `<div class="g2p">
    <div class="card"><div class="w-tit">Estado general</div>
      <div style="display:flex;font-variant-numeric:tabular-nums">
        <div style="flex:1;cursor:pointer" onclick="ir('datos')"><div style="font-size:24px;font-weight:700;color:var(--p)">${num(haPlant)}</div><div class="muted" style="font-size:11.5px">ha plantadas · ${num(haTot)} tot.</div></div>
        <div style="flex:1;cursor:pointer" onclick="nav.planVista='dia';nav.diaSel=null;ir('plan')"><div style="font-size:24px;font-weight:700">${deHoy.length}</div><div class="muted" style="font-size:11.5px">labores hoy</div></div>
        <div style="flex:1;cursor:pointer" onclick="nav.planVista='sem';nav.semanaIni=null;ir('plan')"><div style="font-size:24px;font-weight:700">${pend.length}</div><div class="muted" style="font-size:11.5px">pendientes</div></div>
        <div style="flex:1;cursor:pointer" onclick="nav.planVista='sem';nav.semanaIni=null;ir('plan')"><div style="font-size:24px;font-weight:700;color:var(--urg)">${atras.length}</div><div class="muted" style="font-size:11.5px">atrasadas</div></div>
      </div></div>
    <div class="card"><div class="w-tit">Clima local</div>
      <div id="climaW" class="muted" style="font-size:13px">cargando pronóstico…</div></div>
  </div>`;

  /* Mapa + hoy + fotos */
  h += `<div class="gmapa">
    <div class="card mapa-wrap" id="mapaCard"><div class="w-tit">Mapa · notas en terreno</div>
      <div id="mapaPanel"></div>
      <div class="mapa-tools" id="mapaHerr"></div>
      <div class="mapa-dibbar" id="mapaDibBar"></div>
      <div class="mapa-med" id="mapaMedPanel" style="display:none"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card"><div class="w-tit">Hoy · ${fmtDia(hoyISO)}</div>
        ${deHoy.length? deHoy.map(l=>filaLabor(l,true)).join("") : `<div class="muted">Sin labores hoy. Toca ＋ Labor para agregar.</div>`}</div>
      <div class="card" style="flex:1"><div class="w-tit">Fotos recientes</div>
        <div class="fotos-g" id="fotosRec"></div></div>
    </div>
  </div>`;

  /* Semana + notas recientes */
  let hSem = `<div class="card"><div class="w-tit">📅 Esta semana</div>`;
  if(!deSemana.length) hSem += `<div class="muted">Sin labores planificadas. Toca Plan para agregar.</div>`;
  else{
    const porDia = {};
    deSemana.forEach(l=>{ (porDia[l.fecha]=porDia[l.fecha]||[]).push(l); });
    hSem += Object.keys(porDia).sort().map(f=>`
      <div class="dia-h ${f===hoyISO?"hoy":""}" style="margin:10px 0 4px">${f===hoyISO?"Hoy":fmtDia(f)}</div>
      ${porDia[f].map(l=>filaLabor(l,true)).join("")}`).join("");
  }
  hSem += `</div>`;
  let hNot = `<div class="card"><div class="w-tit">📝 Notas recientes</div>`;
  const rec = [...fijadas, ...notasRec.filter(n=>!n.fijada)].slice(0,5);
  hNot += rec.length? rec.map(n=>miniNota(n)).join("") : `<div class="muted">Aún no hay notas. Toca ＋ Nota para crear la primera.</div>`;
  hNot += `</div>`;
  h += `<div class="g2p" style="grid-template-columns:1.4fr 1fr">${hSem}${hNot}</div>`;
  h += pintarWidgets();
  h += `<div style="text-align:center;margin:6px 0 12px"><button class="btn sec chico" onclick="agregarWidget()">＋ Agregar widget</button></div>`;
  return h;
}

/* ---------- Widgets configurables del panel ---------- */
function widgetCard(w, inner, titulo){
  return `<div class="card"><div class="fila" style="justify-content:space-between;align-items:center;margin-bottom:6px">
    <div class="w-tit" style="margin:0">${titulo}</div>
    <div class="fila" style="gap:2px">
      <button class="qx-cat" onclick="moverWidget(${w.id},-1)" title="Subir">↑</button>
      <button class="qx-cat" onclick="moverWidget(${w.id},1)" title="Bajar">↓</button>
      <button class="qx-cat" onclick="quitarWidget(${w.id})" title="Quitar">✕</button>
    </div></div>${inner}</div>`;
}
function pintarWidgets(){
  return (D.widgets||[]).map(w=>{ try{ return widgetHTML(w); }catch(e){ return ""; } }).join("");
}
function widgetHTML(w){
  if(w.tipo==="checklist"){
    const items = [];
    for(const n of D.notas) for(const c of (n.check||[])) if(!c.ok) items.push({n, t:c.t});
    const h = items.length?
      items.slice(0,8).map(x=>`<div class="met" style="padding:3px 0;cursor:pointer" onclick="formNota(${x.n.id})">☐ ${esc(x.t)} <span class="muted">· ${esc(x.n.fundo)}</span></div>`).join("")
      + (items.length>8? `<div class="muted" style="font-size:11.5px">…y ${items.length-8} más</div>`:"")
      : `<div class="muted">Nada pendiente 🎉</div>`;
    return widgetCard(w, h, `✅ Checklists pendientes (${items.length})`);
  }
  if(w.tipo==="urgentes"){
    const u = D.notas.filter(n=>n.cat==="Urgente" && !n.resuelta);
    return widgetCard(w, u.length? u.slice(0,5).map(n=>miniNota(n)).join("") : `<div class="muted">Sin urgencias abiertas 👍</div>`, `🔥 Urgencias (${u.length})`);
  }
  if(w.tipo==="fijadas"){
    const f = D.notas.filter(n=>n.fijada);
    return widgetCard(w, f.length? f.slice(0,5).map(n=>miniNota(n)).join("") : `<div class="muted">No hay notas fijadas.</div>`, `📌 Fijadas (${f.length})`);
  }
  if(w.tipo==="lluvia"){
    const hd = new Date(), meses = [];
    for(let k=5;k>=0;k--){ const d = new Date(hd.getFullYear(), hd.getMonth()-k, 1, 12); meses.push(d.toISOString().slice(0,7)); }
    const tot = meses.map(m=> D.registros.filter(r=>r.tipo==="Lluvia" && (r.fecha||"").startsWith(m)).reduce((s,r)=>s+(+r.mm||0),0));
    const mx = Math.max(...tot, 1);
    const barras = meses.map((m,i)=>`<div style="text-align:center;flex:1">
      <div style="height:60px;display:flex;align-items:flex-end;justify-content:center"><div style="width:70%;background:var(--azul,#3268a8);border-radius:4px 4px 0 0;height:${Math.round(tot[i]/mx*58)+2}px"></div></div>
      <div style="font-size:10px;color:#9a9d98">${m.slice(5)}</div><div style="font-size:10.5px;font-weight:700">${tot[i]? num(tot[i]) : "·"}</div></div>`).join("");
    return widgetCard(w, `<div style="display:flex;gap:4px">${barras}</div><div class="muted" style="font-size:10.5px;margin-top:4px">mm por mes, según tus registros de Lluvia.</div>`, "🌧 Lluvia por mes");
  }
  if(w.tipo==="variedades"){
    const por = {};
    for(const q of D.cuarteles){ const k = q.variedad||"Sin variedad"; por[k] = (por[k]||0) + (+q.ha||0); }
    const top = Object.entries(por).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const mx = Math.max(...top.map(x=>x[1]), 1);
    const h = top.map(([k,ha])=>`<div class="fila" style="align-items:center;gap:8px;padding:2px 0">
      <div style="flex:0 0 110px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(k)}</div>
      <div style="flex:1;background:#eef1ec;border-radius:5px"><div style="width:${Math.round(ha/mx*100)}%;background:var(--p,#1e7a4c);border-radius:5px;height:12px"></div></div>
      <div style="flex:0 0 62px;text-align:right;font-size:12px;font-weight:700">${num(ha)} ha</div></div>`).join("");
    return widgetCard(w, h||`<div class="muted">Sin cuarteles aún.</div>`, "📊 Superficie por variedad");
  }
  if(w.tipo==="helada"){
    return widgetCard(w, `<div id="wHelada_${w.id}" class="muted">consultando pronóstico…</div>`, `❄️ Alerta de helada (bajo ${num(w.um??0)}°C)`);
  }
  if(w.tipo==="cuenta"){
    const dias = Math.ceil((new Date(w.fecha+"T12:00:00") - new Date())/86400000);
    const txt = dias>1? `Faltan <b style="font-size:26px;color:var(--p,#1e7a4c)">${dias}</b> días`
      : dias===1? "<b>¡Es mañana!</b>" : dias===0? "<b>¡Es hoy! 🎉</b>" : `<span class="muted">Pasó hace ${-dias} días</span>`;
    return widgetCard(w, `<div style="font-size:15px">${txt} <span class="muted">· ${fmtF(w.fecha)}</span></div>`, `⏳ ${esc(w.nom)}`);
  }
  if(w.tipo==="rapidos"){
    return widgetCard(w, `<div class="fila" style="gap:8px;flex-wrap:wrap">
      <button class="btn sec chico" onclick="formNota()">📝 Nota</button>
      <button class="btn sec chico" onclick="formReg()">📋 Registro</button>
      <button class="btn sec chico" onclick="formLabor()">📅 Labor</button>
      <button class="btn sec chico" onclick="ir('datos')">🌳 Datos</button>
      <button class="btn sec chico" onclick="ir('tab')">🗂 Tablero</button>
    </div>`, "⚡ Accesos rápidos");
  }
  if(w.tipo==="carencias"){
    if(!D.gesagro) return widgetCard(w, `<div class="muted">Importa el respaldo de GesAgro en <b>Datos → 🔗 GesAgro</b> para ver el semáforo.</div>`, "🚦 Carencias de cosecha");
    const g = D.gesagro, hoyI = hoy();
    const sumaD = (f,n)=>{ const d = new Date(f+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
    const carDe = (pr,esp)=>{ const ce = (pr&&pr.carenciaEsp)||{}; return (esp && ce[esp]!=null && ce[esp]!=="")? +ce[esp] : ((pr&&+pr.carencia)||0); };
    const chips = g.cuarteles.map(q=>{
      let max = null;
      for(const r of g.regFito){
        if(r.campoId!=q.campoId || (r.cuartelId && r.cuartelId!=q.id)) continue;
        const pr = g.productos.find(p=>p.id==r.productoId);
        const cd = carDe(pr, q.especie); if(!cd) continue;
        const hasta = sumaD(r.fecha, cd);
        if(hasta>=hoyI && (!max || hasta>max)) max = hasta;
      }
      const campo = (g.campos.find(c=>c.id==q.campoId)||{}).nombre||"";
      return `<span class="badge ${max?"b-rojo":"b-verde"}" style="margin:2px;font-size:12px;padding:5px 10px">${max?"⛔":"✅"} ${esc(campo)} · ${esc(q.nombre)}${max?" · hasta "+fmtF(max):""}</span>`;
    }).join(" ");
    return widgetCard(w, `<div style="line-height:2.3">${chips||'<span class="muted">Sin cuarteles en el respaldo.</span>'}</div>
      <div class="muted" style="font-size:10.5px;margin-top:4px">Según respaldo de GesAgro del ${fmtF(g.importado)} · re-importa tras registrar aplicaciones.</div>`, "🚦 Carencias de cosecha");
  }
  if(w.tipo==="plan"){
    const sem = semanaDe(hoy());
    const labs = D.labores.filter(l=> (l.fecha>=sem[0] && l.fecha<=sem[6]) || (l.fecha2 && l.fecha<=sem[6] && l.fecha2>=sem[0]));
    const hechas = labs.filter(l=>l.estado==="hecha").length;
    const pct = labs.length? Math.round(hechas/labs.length*100) : 0;
    return widgetCard(w, `<div class="fila" style="align-items:center;gap:10px">
      <div style="flex:1;background:#eef1ec;border-radius:8px;height:16px"><div style="width:${pct}%;background:var(--p,#1e7a4c);height:16px;border-radius:8px"></div></div>
      <b style="font-size:16px">${pct}%</b></div>
      <div class="muted" style="font-size:11.5px;margin-top:4px">${labs.length? `${hechas} de ${labs.length} labores de esta semana hechas.` : "Sin labores planificadas esta semana."}</div>`, "📈 Avance de la semana");
  }
  if(w.tipo==="supmapa"){
    const filas = [];
    for(const p of D.mapoly){
      if(p.forma!=="area" || p.tipo!=="Cuartel") continue;
      const q = cuartelDe(p); if(!q || !+q.ha) continue;
      const dib = geoArea(p.pts)/10000;
      filas.push({n:`${q.fundo} · ${q.nombre}`, cat:+q.ha, dib, dif:(dib-q.ha)/q.ha*100});
    }
    filas.sort((a,b)=>Math.abs(b.dif)-Math.abs(a.dif));
    const h = filas.slice(0,8).map(f=>`<div class="met" style="padding:2px 0">${esc(f.n)}: catálogo <b>${num(f.cat)}</b> · mapa <b>${num(f.dib)}</b> ha <span style="color:${Math.abs(f.dif)>10?"var(--rojo,#c62828)":"#7a7d79"};font-weight:600">(${f.dif>0?"+":""}${Math.round(f.dif)}%)</span></div>`).join("");
    return widgetCard(w, h||`<div class="muted">Dibuja cuarteles en el mapa (enlazados al catálogo) para comparar superficies.</div>`, "🧮 Superficie: catálogo vs mapa");
  }
  if(w.tipo==="respaldo"){
    const u = D.ultimoRespaldo;
    const dias = u? Math.floor((new Date() - new Date(u+"T12:00:00"))/86400000) : null;
    const rojo = dias===null || dias>7;
    return widgetCard(w, `<div style="font-size:14px;${rojo?"color:var(--rojo,#c62828);font-weight:700":""}">${
      dias===null? "Nunca has descargado un respaldo desde esta app 😬" :
      dias===0? "Respaldo descargado hoy ✅" :
      `Último respaldo hace ${dias} día${dias===1?"":"s"}${rojo?" — ¡toca hacer uno!":" ✅"}`}</div>
      <button class="btn sec chico" style="margin-top:8px" onclick="ir('datos')">📦 Ir a Datos</button>`, "💾 Respaldo");
  }
  return "";
}
function agregarWidget(){
  abrirModal("＋ Nuevo widget del panel", `
    <label class="f">Tipo de widget<select id="w_tipo" onchange="wCfgSync()">
      <option value="checklist">✅ Checklists pendientes</option>
      <option value="urgentes">🔥 Urgencias abiertas</option>
      <option value="fijadas">📌 Notas fijadas</option>
      <option value="lluvia">🌧 Lluvia por mes (gráfico)</option>
      <option value="variedades">📊 Superficie por variedad</option>
      <option value="helada">❄️ Alerta de helada (pronóstico)</option>
      <option value="cuenta">⏳ Cuenta regresiva a una fecha</option>
      <option value="rapidos">⚡ Accesos rápidos</option>
      <option value="carencias">🚦 Carencias de cosecha (GesAgro)</option>
      <option value="plan">📈 Avance de la semana</option>
      <option value="supmapa">🧮 Superficie: catálogo vs mapa</option>
      <option value="respaldo">💾 Recordatorio de respaldo</option></select></label>
    <div id="w_cfg"></div>
    <div class="muted">Los widgets aparecen al final del Panel. Puedes reordenarlos con ↑ ↓ y quitarlos con ✕.</div>
  `, ()=>{
    const t = v("w_tipo");
    const w = {id:(D.seq=(D.seq||1000)+1), tipo:t};
    if(t==="helada") w.um = parseFloat((v("w_um")||"0").replace(",","."))||0;
    if(t==="cuenta"){
      if(!v("w_nom") || !v("w_fecha")){ alert("Completa el nombre y la fecha."); return false; }
      w.nom = v("w_nom"); w.fecha = v("w_fecha");
    }
    D.widgets.push(w);
    return true;
  }, "＋ Agregar");
  wCfgSync();
}
function wCfgSync(){
  const el = document.getElementById("w_cfg"); if(!el) return;
  const t = v("w_tipo");
  el.innerHTML = t==="helada"? campoF("w_um","Avisar si la mínima baja de (°C)","text","0",'inputmode="decimal"') :
    t==="cuenta"? campoF("w_nom","Nombre del evento","text","",'placeholder="Ej: Inicio cosecha W. Murcott"') + campoF("w_fecha","Fecha","date","") : "";
}
function quitarWidget(id){
  if(!confirm("¿Quitar este widget del panel?")) return;
  D.widgets = D.widgets.filter(w=>w.id!==id);
  guardar(); render();
}
function moverWidget(id, d){
  const i = D.widgets.findIndex(w=>w.id===id), j = i+d;
  if(i<0 || j<0 || j>=D.widgets.length) return;
  [D.widgets[i], D.widgets[j]] = [D.widgets[j], D.widgets[i]];
  guardar(); render();
}
async function cargarHeladas(){
  const ws = (D.widgets||[]).filter(w=>w.tipo==="helada");
  if(!ws.length) return;
  if(!navigator.onLine){
    for(const w of ws){ const el = document.getElementById("wHelada_"+w.id); if(el) el.textContent = "necesita internet para el pronóstico"; }
    return;
  }
  try{
    const loc = D.lluviaLoc || LOC_DEF;
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lng}&daily=temperature_2m_min&timezone=auto&forecast_days=7`);
    const j = await r.json();
    const fs = j.daily.time, ts = j.daily.temperature_2m_min;
    for(const w of ws){
      const el = document.getElementById("wHelada_"+w.id); if(!el) continue;
      const malos = fs.map((d,i)=>({d, t:ts[i]})).filter(x=>x.t <= (w.um??0));

/* ---------- Medición geodésica real (metros y hectáreas) ---------- */
function geoDist(pts){ // largo de una línea en metros
  let d = 0;
  for(let i=1;i<pts.length;i++) d += L.latLng(pts[i-1]).distanceTo(L.latLng(pts[i]));
  return d;
}
function geoArea(pts){ // superficie de un polígono en m² (fórmula esférica)
  const R = 6378137, rad = Math.PI/180;
  let s = 0;
  for(let i=0, n=pts.length; i<n; i++){
    const [la1,lo1] = pts[i], [la2,lo2] = pts[(i+1)%n];
    s += (lo2-lo1)*rad * (2 + Math.sin(la1*rad) + Math.sin(la2*rad));
  }
  return Math.abs(s*R*R/2);
}
function fmtDist(m){ return m>=1000? (m/1000).toFixed(2).replace(".",",")+" km" : Math.round(m)+" m"; }
function geoRumbo(a,b){ // dirección en grados desde el norte
  const rad = Math.PI/180, la1 = a[0]*rad, la2 = b[0]*rad, dLo = (b[1]-a[1])*rad;
  const y = Math.sin(dLo)*Math.cos(la2);
  const x = Math.cos(la1)*Math.sin(la2) - Math.sin(la1)*Math.cos(la2)*Math.cos(dLo);
  return (Math.atan2(y,x)/rad + 360) % 360;
}

const MED_UA = {m2:[1,"Metros cuadrados"], km2:[1e-6,"Kilómetros cuadrados"], ha:[0.0001,"Hectáreas"], ac:[0.000247105,"Acres"], pie2:[10.7639,"Pies cuadrados"], yd2:[1.19599,"Yardas cuadradas"]};

}

/* ---------- Modo sin internet: croquis de áreas y notas ---------- */
function mapaOffline(el){
  if(!el) return;
  mapaP = null;
  const areas = D.mapoly, nts = D.notas.filter(n=>n.gps);
  const P = [];
  for(const p of areas) for(const q of p.pts) P.push(q);
  for(const n of nts) P.push([n.gps.lat, n.gps.lng]);
  const regs = D.registros.filter(r=>r.gps);
  for(const r of regs) P.push([r.gps.lat, r.gps.lng]);
  if(ultimaPos) P.push([ultimaPos.lat, ultimaPos.lng]);
  if(!P.length){
    el.innerHTML = `<div class="muted" style="padding:24px;text-align:center">Sin internet no hay foto satelital.<br>Tus áreas marcadas y notas con 📍 aparecerán aquí igual, sin señal.</div>`;
    return;
  }
  el.innerHTML = `<div style="position:absolute;left:12px;top:12px;z-index:2;background:#fff;padding:5px 10px;border-radius:8px;font-size:11.5px;color:#7a7d79;box-shadow:0 1px 4px rgba(0,0,0,.2)">📡 Sin señal · croquis de tus áreas y notas guardadas</div>
    <canvas id="mapaOffCv" style="position:absolute;inset:0;width:100%;height:100%"></canvas>`;
  const cv = document.getElementById("mapaOffCv");
  const W = el.clientWidth, H = el.clientHeight, dpr = window.devicePixelRatio||1;
  cv.width = W*dpr; cv.height = H*dpr;
  const c = cv.getContext("2d"); c.scale(dpr,dpr);
  const lat0 = P.reduce((s,q)=>s+q[0],0)/P.length;
  const kx = Math.cos(lat0*Math.PI/180);
  const xs = P.map(q=>q[1]*kx), ys = P.map(q=>-q[0]);
  const x1 = Math.min(...xs), x2 = Math.max(...xs), y1 = Math.min(...ys), y2 = Math.max(...ys);
  const dx = (x2-x1)||1e-4, dy = (y2-y1)||1e-4;
  const m = 44, k = Math.min((W-2*m)/dx, (H-2*m)/dy);
  const X = q=> m + (q[1]*kx - x1)*k + (W-2*m-dx*k)/2;
  const Y = q=> m + (-q[0] - y1)*k + (H-2*m-dy*k)/2;
  c.fillStyle = "#eef1ec"; c.fillRect(0,0,W,H);
  c.strokeStyle = "#dde3da"; c.lineWidth = 1; c.beginPath();
  for(let x=0;x<W;x+=60){ c.moveTo(x,0); c.lineTo(x,H); }
  for(let y=0;y<H;y+=60){ c.moveTo(0,y); c.lineTo(W,y); }
  c.stroke();
  const hit = [];
  for(const p of areas){
    const st = estiloDe(p);
    if(p.forma==="texto"){ // texto escrito sobre el mapa
      const tx = X(p.pts[0]), ty = Y(p.pts[0]);
      c.font = `bold ${st.ts||16}px -apple-system,sans-serif`; c.textAlign = "center";
      c.strokeStyle = (st.tc||st.col)==="#000000"? "rgba(255,255,255,.9)" : "rgba(40,45,42,.85)"; c.lineWidth = 3;
      c.strokeText(p.nombre, tx, ty);
      c.fillStyle = st.tc||st.col; c.fillText(p.nombre, tx, ty);
      continue;
    }
    c.strokeStyle = st.col==="#ffffff"? "#8a8f88" : st.col;
    c.lineWidth = st.g; c.setLineDash(st.seg? [8,7]:[]);
    const path = new Path2D();
    p.pts.forEach((q,i)=> i? path.lineTo(X(q),Y(q)) : path.moveTo(X(q),Y(q)));
    if(p.forma!=="linea"){
      path.closePath();
      if(st.fill){ c.globalAlpha = Math.min(st.fill*1.5,.55); c.fillStyle = st.fc||st.col; c.fill(path); c.globalAlpha = 1; }
    }
    c.stroke(path); c.setLineDash([]);
    hit.push({p, path});
    if(p.nombre && +st.ts!==0){
      const cxm = p.pts.reduce((s,q)=>s+X(q),0)/p.pts.length, cym = p.pts.reduce((s,q)=>s+Y(q),0)/p.pts.length;
      c.font = `bold ${st.ts||12.5}px -apple-system,sans-serif`; c.textAlign = "center";
      c.strokeStyle = st.tc==="#000000"? "rgba(255,255,255,.9)" : "rgba(40,45,42,.85)"; c.lineWidth = 3;
      c.strokeText(p.nombre, cxm, cym);
      c.fillStyle = st.tc||"#ffffff"; c.fillText(p.nombre, cxm, cym);
    }
  }
  const colCat = cat => cat==="Urgente"? "#e97409" : cat==="Plaga / Enfermedad"? "#c9a20e" : cat==="Riego"? "#3268a8" : "#3b8c25";
  for(const n of nts){
    const x = X([n.gps.lat, n.gps.lng]), y = Y([n.gps.lat, n.gps.lng]);
    const rp = n.pin==="alta"? 10 : n.pin==="baja"? 5 : 7;
    c.beginPath(); c.arc(x,y,rp,0,7); c.fillStyle = colCat(n.cat); c.fill();
    c.lineWidth = 2.5; c.strokeStyle = "#fff"; c.stroke();
  }
  for(const r of regs){
    const x = X([r.gps.lat, r.gps.lng]), y = Y([r.gps.lat, r.gps.lng]);
    c.beginPath(); c.arc(x,y,7,0,7); c.fillStyle = "#607d8b"; c.fill();
    c.lineWidth = 2.5; c.strokeStyle = "#fff"; c.stroke();
  }
  if(ultimaPos){
    const x = X([ultimaPos.lat, ultimaPos.lng]), y = Y([ultimaPos.lat, ultimaPos.lng]);
    c.beginPath(); c.arc(x,y,9,0,7); c.fillStyle = "#1e88e5"; c.fill();
    c.lineWidth = 3; c.strokeStyle = "#fff"; c.stroke();
    c.font = "bold 11px -apple-system,sans-serif"; c.textAlign = "center";
    c.fillStyle = "#1e88e5"; c.fillText("Tú", x, y-14);
  }
  cv.onclick = ev=>{
    const r = cv.getBoundingClientRect(), x = ev.clientX-r.left, y = ev.clientY-r.top;
    for(let i=hit.length-1;i>=0;i--){
      const {p, path} = hit[i];
      if(p.forma!=="linea" && c.isPointInPath(path, x*dpr, y*dpr)){
        if(p.tipo==="Cuartel" || p.tipo==="Fundo") mapolyInfo(p.id);
        return;
      }
    }
  };
}
function mapaTogglePoly(){ nav.polyOff = !nav.polyOff; pintarPoligonos(); mapaHerrDef(); }
function estiloDe(p){ // estilo guardado (completado con defaults) o el clásico según tipo
  const esF = p.tipo==="Fundo";
  return Object.assign({col: esF?"#e97409":"#ffd23f", g: esF?3:2, seg:!esF, fill: esF?0.02:0.07,
    ts:12.5, tc:"#ffffff", fc:""}, p.estilo||{}); // fc vacío = relleno del mismo color que la línea
}
function cuartelDe(p){ // cuartel del catálogo enlazado a un polígono
  if(p.tipo!=="Cuartel") return null;
  const f = p.fundoRef, n = p.cuartelRef || p.nombre;
  return D.cuarteles.find(q=>(!f || q.fundo===f) && q.nombre===n) || null;
}
function pintarPoligonos(sinTocar){
  if(!mapaP) return;
  if(capaPoly){ mapaP.removeLayer(capaPoly); capaPoly = null; }
  if(nav.polyOff) return;
  capaPoly = L.layerGroup();
  for(const p of D.mapoly){
    const st = estiloDe(p);
    if(p.forma==="texto"){ // texto escrito sobre el mapa: arrastrable para reubicarlo
      const mk = L.marker(p.pts[0], {draggable:!sinTocar, interactive:!sinTocar,
        icon: L.divIcon({className:"pin-div", iconSize:null,
        html:`<span style="font-size:${st.ts||16}px;font-weight:800;color:${st.tc||st.col};text-shadow:0 1px 4px ${(st.tc||st.col)==="#000000"?"rgba(255,255,255,.9)":"rgba(0,0,0,.9)"};white-space:nowrap">${esc(p.nombre)}</span>`})});
      mk.on("dragend", ev=>{ const ll = ev.target.getLatLng(); p.pts = [[+ll.lat.toFixed(6), +ll.lng.toFixed(6)]]; guardar(); });
      mk.bindPopup(`<b>${esc(p.nombre)}</b> · Texto <span class="muted">(arrástralo para moverlo)</span><br>
          <a href="#" onclick="mapolyEstilo(${p.id});return false" style="color:#7b4bd6;font-weight:700">🎨 Estilo</a> &nbsp;
          <a href="#" onclick="mapolyRen(${p.id});return false" style="color:#3b8c25;font-weight:700">✏️ Texto</a> &nbsp;
          <a href="#" onclick="mapolyDel(${p.id});return false" style="color:#c62828;font-weight:700">🗑 Eliminar</a>`);
      mk.addTo(capaPoly);
      continue;
    }
    const opts = {color:st.col, weight:st.g, dashArray: st.seg?"7 7":null,
      fillColor:st.fc||st.col, fillOpacity: p.forma==="linea"?0:st.fill, fill:p.forma!=="linea",
      interactive:!sinTocar};
    const capa = p.forma==="linea"? L.polyline(p.pts,opts) : L.polygon(p.pts,opts);
    if(p.nombre && +st.ts!==0) capa.bindTooltip(
      `<span style="font-size:${st.ts||12.5}px;color:${st.tc||"#fff"};text-shadow:0 1px 4px ${st.tc==="#000000"?"rgba(255,255,255,.95)":"rgba(0,0,0,.95)"}">${esc(p.nombre)}</span>`,
      {permanent:true, direction:"center", className:"poly-lab"});
    const q = cuartelDe(p);
    capa.bindPopup(`<b>${esc(p.nombre||p.tipo)}</b> · ${p.tipo}
      ${q? `<br>${esc(q.especie||"")} ${esc(q.variedad||"")} · ${num(q.ha)} ha`:""}
      <br>📐 ${p.forma==="linea"? "largo "+fmtDist(geoDist(p.pts)) : `<b>${fmtArea(geoArea(p.pts))}</b> · borde ${fmtDist(geoDist(p.pts.concat([p.pts[0]])))}`}
      <br>${(q || p.tipo==="Fundo")? `<a href="#" onclick="mapolyInfo(${p.id});return false" style="color:#1e6091;font-weight:700">ℹ️ Info</a> &nbsp; `:""}<a href="#" onclick="mapolyEstilo(${p.id});return false" style="color:#7b4bd6;font-weight:700">🎨 Estilo</a> &nbsp;
      <a href="#" onclick="mapolyRen(${p.id});return false" style="color:#3b8c25;font-weight:700">✏️ Nombre</a> &nbsp;
      <a href="#" onclick="mapolyDel(${p.id});return false" style="color:#c62828;font-weight:700">🗑 Eliminar</a>`);
    capa.addTo(capaPoly);
  }
  capaPoly.addTo(mapaP);
}

function mapolyInfo(id){

    const q = cuartelDe(p);
    if(!q){ alert("Este cuartel no está enlazado al catálogo de Datos. Revisa que el nombre coincida."); return; }
    abrirModal(`ℹ️ ${esc(q.fundo)} · ${esc(q.nombre)}`, `

/* ⛰ distancia en el suelo: consulta las alturas del terreno (necesita internet) */
async function mapaMedRelieve(){
  if(!dibP || (dibP.medir||[]).length<2){ alert("Marca primero la línea o ruta que quieres medir."); return; }
  if(!navigator.onLine){ alert("Medir con relieve necesita internet para consultar las alturas del terreno."); return; }
  const t = dibP.medTipo||"ruta";
  const pts = t==="linea"? dibP.medir.slice(0,2) : dibP.medir.slice();
  const muestra = [];
  for(let i=1;i<pts.length;i++){ // un punto cada ~50 m para seguir el terreno
    const a = pts[i-1], b = pts[i];
    const n = Math.max(1, Math.min(30, Math.ceil(geoDist([a,b])/50)));
    for(let k=0;k<n;k++) muestra.push([a[0]+(b[0]-a[0])*k/n, a[1]+(b[1]-a[1])*k/n]);
  }
  muestra.push(pts[pts.length-1]);
  let lim = muestra;
  if(lim.length>90){ // límite de la consulta
    const paso = Math.ceil(lim.length/90);
    lim = lim.filter((_,i)=> i%paso===0);
    if(lim[lim.length-1]!==muestra[muestra.length-1]) lim.push(muestra[muestra.length-1]);
  }
  dibP.medRel = null; dibP.medRelC = true; pintarMedPanel();
  try{
    const r = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lim.map(p=>p[0].toFixed(6)).join(",")}&longitude=${lim.map(p=>p[1].toFixed(6)).join(",")}`);
    const j = await r.json();
    const els = j.elevation||[];
    if(els.length!==lim.length) throw 0;
    let suelo=0, sube=0, baja=0;
    for(let i=1;i<lim.length;i++){
      const dh = els[i]-els[i-1];
      const dd = geoDist([lim[i-1], lim[i]]);
      suelo += Math.sqrt(dd*dd + dh*dh);
      if(dh>0) sube += dh; else baja -= dh;
    }
    dibP.medRelC = false;
    dibP.medRel = {suelo, sube, baja, min:Math.min(...els), max:Math.max(...els)};
    pintarMedPanel();
  }catch(e){
    dibP.medRelC = false; dibP.medRel = null;
    pintarMedPanel();
    alert("No se pudo consultar el relieve. Revisa la señal e intenta de nuevo.");
  }
}
function pintarMedPanel(){
  const el = document.getElementById("mapaMedPanel"); if(!el) return;
  if(!dibP || dibP.modo!=="libre" || dibP.herr!=="medir" || dibP.mover){ el.style.display="none"; return; }
  el.style.display = "block";
  const t = dibP.medTipo||"ruta", pts = dibP.medir||[];
  const ul = MED_UL[nav.medUL||"m"]? (nav.medUL||"m") : "m";
  const ua = MED_UA[nav.medUA||"ha"]? (nav.medUA||"ha") : "ha";
  const selL = `<select onchange="nav.medUL=this.value;pintarMedPanel()">${Object.entries(MED_UL).map(([k,v])=>`<option value="${k}" ${k===ul?"selected":""}>${v[1]}</option>`).join("")}</select>`;
  const selA = `<select onchange="nav.medUA=this.value;pintarMedPanel()">${Object.entries(MED_UA).map(([k,v])=>`<option value="${k}" ${k===ua?"selected":""}>${v[1]}</option>`).join("")}</select>`;
  const L1 = m=>medFmt(m*MED_UL[ul][0]), A1 = m2=>medFmt(m2*MED_UA[ua][0]);
  const rel = dibP.medRel;
  const filasRel = rel? `
      <tr><td>⛰ En el suelo:</td><td style="text-align:right"><b>${L1(rel.suelo)}</b></td><td>${MED_UL[ul][1]}</td></tr>
      <tr><td>Desnivel:</td><td style="text-align:right"><b>↑${medFmt(rel.sube)} ↓${medFmt(rel.baja)}</b></td><td>m</td></tr>
      <tr><td>Altitud:</td><td style="text-align:right">${medFmt(rel.min)} a ${medFmt(rel.max)}</td><td>m s.n.m.</td></tr>` :
    dibP.medRelC? `<tr><td colspan="3" class="muted">⛰ consultando alturas del terreno…</td></tr>` : "";
  let filas = "";
  if(t==="linea"){
    const d = pts.length>=2? geoDist(pts.slice(0,2)) : 0;
    filas = `<tr><td>Distancia:</td><td style="text-align:right"><b>${L1(d)}</b></td><td>${selL}</td></tr>
      <tr><td>Dirección:</td><td style="text-align:right"><b>${pts.length>=2? medFmt(geoRumbo(pts[0],pts[1])):"0"}°</b></td><td></td></tr>${filasRel}`;
  }else if(t==="ruta"){
    filas = `<tr><td>Longitud:</td><td style="text-align:right"><b>${L1(pts.length>=2? geoDist(pts):0)}</b></td><td>${selL}</td></tr>${filasRel}`;
  }else if(t==="poli"){
    const per = pts.length>=2? geoDist(pts.concat([pts[0]])) : 0;
    const ar = pts.length>=3? geoArea(pts) : 0;
    filas = `<tr><td>Perímetro:</td><td style="text-align:right"><b>${L1(per)}</b></td><td>${selL}</td></tr>
      <tr><td>Área:</td><td style="text-align:right"><b>${A1(ar)}</b></td><td>${selA}</td></tr>`;
  }else{ // círculo: centro + borde
    const r = pts.length>=2? geoDist(pts.slice(0,2)) : 0;
    filas = `<tr><td>Radio:</td><td style="text-align:right"><b>${L1(r)}</b></td><td>${selL}</td></tr>
      <tr><td>Área:</td><td style="text-align:right"><b>${A1(Math.PI*r*r)}</b></td><td>${selA}</td></tr>
      <tr><td>Circunferencia:</td><td style="text-align:right"><b>${L1(2*Math.PI*r)}</b></td><td></td></tr>`;
  }
  const ayuda = {linea:"Toca 2 puntos (el 3° empieza de nuevo). Arrastra los puntos para afinar.",
    ruta:"Toca punto a punto el recorrido.", poli:"Toca las esquinas del área.",
    circ:"Toca el centro y luego el borde."}[t];
  el.innerHTML = `
    <div id="medDrag" style="font-weight:800;margin-bottom:6px;cursor:move;touch-action:none">📐 Regla <span style="font-weight:400;font-size:10px;color:#9a9d98">· arrastra aquí</span></div>
    <div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap">
      ${[["linea","Línea"],["ruta","Ruta"],["poli","Polígono"],["circ","Círculo"]].map(([k,lab])=>
        `<button class="mtab ${t===k?"act":""}" onclick="mapaMedTipo('${k}')">${lab}</button>`).join("")}
    </div>
    <table>${filas}</table>
    <div class="muted" style="font-size:11px;margin:6px 0">${ayuda}</div>
    <div class="fila" style="gap:6px">
      ${(t==="linea"||t==="ruta") && pts.length>=2 && !rel && !dibP.medRelC?
        `<button class="btn sec chico" style="min-height:30px;padding:3px 12px;font-size:12px" onclick="mapaMedRelieve()">⛰ Con relieve</button>`:""}
      <button class="btn sec chico" style="min-height:30px;padding:3px 12px;font-size:12px" onclick="mapaMedBorrar()">Borrar</button>
    </div>`;
  // posición recordada + arrastre desde el título
  if(nav.medPanelPos){ el.style.left = nav.medPanelPos.x+"px"; el.style.top = nav.medPanelPos.y+"px"; el.style.right = "auto"; }
  const h = document.getElementById("medDrag");
  if(h) h.onpointerdown = ev=>{
    ev.preventDefault(); ev.stopPropagation();
    const card = el.parentElement.getBoundingClientRect();
    const r = el.getBoundingClientRect();
    const dx = ev.clientX - r.left, dy = ev.clientY - r.top;
    const mueve = m=>{
      let x = m.clientX - card.left - dx, y = m.clientY - card.top - dy;
      x = Math.max(4, Math.min(card.width - r.width - 4, x));
      y = Math.max(4, Math.min(card.height - r.height - 4, y));
      el.style.left = x+"px"; el.style.top = y+"px"; el.style.right = "auto";
      nav.medPanelPos = {x, y};
    };
    const fin = ()=>{ document.removeEventListener("pointermove", mueve); document.removeEventListener("pointerup", fin); document.removeEventListener("pointercancel", fin); };
    document.addEventListener("pointermove", mueve);
    document.addEventListener("pointerup", fin);
    document.addEventListener("pointercancel", fin);
  };
}
function mapaMedGrafico(){ // repinta solo la figura de medición (los puntos se arrastran aparte)
  if(!dibP) return;
  if(dibP.medLin){ dibP.capa.removeLayer(dibP.medLin); dibP.medLin = null; }
  const t = dibP.medTipo||"ruta", pts = dibP.medir||[];
  const est = {color:"#ffd23f", weight:3, dashArray:"6 6", fillColor:"#ffd23f", fillOpacity:0.08, interactive:false};
  if(t==="circ" && pts.length>=2) dibP.medLin = L.circle(pts[0], Object.assign({radius:geoDist(pts.slice(0,2))}, est));
  else if(t==="poli" && pts.length>=3) dibP.medLin = L.polygon(pts, est);
  else if(pts.length>=2) dibP.medLin = L.polyline(t==="linea"? pts.slice(0,2) : pts, est);
  if(dibP.medLin) dibP.medLin.addTo(dibP.capa);
}
function mapaDibCol(c){ if(dibP){ dibP.col = c; pintarDibBar(); } }
function mapaDibG(g){ if(dibP){ dibP.g = g; pintarDibBar(); } }
function mapaDibTs(s){ if(dibP){ dibP.ts = s; pintarDibBar(); } }
function mapaDibSello(s){ if(dibP){ dibP.sello = s; pintarDibBar(); } }
/* formas perfectas arrastrando: recta, flecha, rectángulo, elipse (en píxeles de pantalla → coordenadas) */
function formaPts(tipo, A, B){
  const P = q=>{ const ll = mapaP.containerPointToLatLng(L.point(q.x, q.y)); return [+ll.lat.toFixed(6), +ll.lng.toFixed(6)]; };
  if(tipo==="linea") return [P(A), P(B)];
  if(tipo==="flecha"){
    const dx=B.x-A.x, dy=B.y-A.y, len=Math.hypot(dx,dy)||1;
    const hl=Math.min(28, len*0.35), ang=Math.atan2(dy,dx);
    const h1={x:B.x-hl*Math.cos(ang-0.45), y:B.y-hl*Math.sin(ang-0.45)};
    const h2={x:B.x-hl*Math.cos(ang+0.45), y:B.y-hl*Math.sin(ang+0.45)};
    return [P(A), P(B), P(h1), P(B), P(h2)];
  }
  if(tipo==="rect") return [P(A), P({x:B.x,y:A.y}), P(B), P({x:A.x,y:B.y}), P(A)];
  const cx=(A.x+B.x)/2, cy=(A.y+B.y)/2, rx=Math.abs(B.x-A.x)/2||1, ry=Math.abs(B.y-A.y)/2||1;
  const out=[];
  for(let i=0;i<=36;i++){ const t=i/36*2*Math.PI; out.push(P({x:cx+rx*Math.cos(t), y:cy+ry*Math.sin(t)})); }
  return out;
}
function mapaModo(m){
  if(!dibP) return;
  dibP.modo = m; dibP.mover = false;
  if(m==="libre") mapaLibreOn(); else mapaLibreOff();
  mapaHerrDib();
}
function mapaMover(){
  if(!dibP) return;
  dibP.mover = !dibP.mover;
  if(dibP.mover) mapaLibreOff(); else mapaLibreOn();
  mapaHerrDib();
}
/* captura del trazo a mano alzada sobre el mapa */
function mapaLibreOn(){
  if(!mapaP) return;
  const c = mapaP.getContainer();
  mapaP.dragging.disable();
  c.addEventListener("pointerdown", mapaLibreDown);
  c.addEventListener("pointermove", mapaLibreMove);
  c.addEventListener("pointerup", mapaLibreUp);
  c.addEventListener("pointercancel", mapaLibreUp);
}
function mapaLibreOff(){
  if(!mapaP) return;
  const c = mapaP.getContainer();
  mapaP.dragging.enable();
  c.removeEventListener("pointerdown", mapaLibreDown);
  c.removeEventListener("pointermove", mapaLibreMove);
  c.removeEventListener("pointerup", mapaLibreUp);
  c.removeEventListener("pointercancel", mapaLibreUp);
}
function mapaLibreDown(e){
  if(!dibP || dibP.mover) return;
  // tocar un texto o sello = moverlo arrastrando (salvo con la goma, que lo borra)
  if(e.target && e.target.closest && e.target.closest(".leaflet-marker-icon") && dibP.herr!=="goma") return;
  if(e.pointerType==="pen") dibP.pen = true;
  if(e.pointerType==="touch"){
    dibP.ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
    // dedos = mover/acercar el mapa: siempre con Pencil activo, o al apoyar un segundo dedo
    if(dibP.pen || dibP.ptrs.size>=2){
      if(dibP.dib && dibP.pidTipo==="touch"){ // el dedo venía dibujando: cancelar ese trazo
        dibP.dib = false; dibP.pid = null;
        dibP.trazos.pop(); dibP.orden.pop();
        mapaDibPintar();
      }
      e.preventDefault(); e.stopPropagation();
      try{ mapaP.getContainer().setPointerCapture(e.pointerId); }catch(x){}
      mapaGestoIni();
      return;
    }
  }
  if(dibP.herr==="txt"){ // escribir texto donde se toca
    e.preventDefault(); e.stopPropagation();
    const ll = mapaP.mouseEventToLatLng(e);
    const t = prompt("Texto para el mapa:");
    if(t && t.trim()){
      dibP.textos.push({ll:[+ll.lat.toFixed(6), +ll.lng.toFixed(6)], txt:t.trim(), col:dibP.col, ts:dibP.ts});
      dibP.orden.push("x");
      mapaDibPintar();
    }
    return;
  }
  if(dibP.herr==="sello"){ // estampar el sello elegido
    e.preventDefault(); e.stopPropagation();
    const ll = mapaP.mouseEventToLatLng(e);
    dibP.textos.push({ll:[+ll.lat.toFixed(6), +ll.lng.toFixed(6)], txt:dibP.sello, col:dibP.col, ts:Math.round(dibP.ts*1.4)});
    dibP.orden.push("x");
    mapaDibPintar();
    return;
  }
  if(dibP.herr==="medir"){ // medición: cada toque agrega un punto, no se guarda nada
    e.preventDefault(); e.stopPropagation();
    const ll = mapaP.mouseEventToLatLng(e);
    dibP.medir = dibP.medir || [];
    const t = dibP.medTipo||"ruta";
    if((t==="linea" || t==="circ") && dibP.medir.length>=2) dibP.medir = []; // 3er toque = medir de nuevo
    dibP.medir.push([+ll.lat.toFixed(6), +ll.lng.toFixed(6)]);
    dibP.medRel = null; // la medición con relieve deja de valer al cambiar los puntos
    mapaDibPintar();
    pintarMedPanel();
    return;
  }
  if(dibP.herr==="goma"){ // borrar el trazo o texto tocado
    e.preventDefault(); e.stopPropagation();
    mapaGomaEn(e);
    return;
  }
  if(dibP.dib) return;
  if(["linea","flecha","rect","circ"].includes(dibP.herr)){ // formas: arrastrar del punto A al B
    e.preventDefault(); e.stopPropagation();
    dibP.dib = true; dibP.pid = e.pointerId; dibP.pidTipo = e.pointerType;
    try{ mapaP.getContainer().setPointerCapture(e.pointerId); }catch(x){}
    dibP.formaA = mapaP.mouseEventToContainerPoint(e);
    dibP.tmpShape = null;
    return;
  }
  e.preventDefault(); e.stopPropagation();
  dibP.dib = true; dibP.pid = e.pointerId;
  dibP.pidTipo = e.pointerType;
  try{ mapaP.getContainer().setPointerCapture(e.pointerId); }catch(x){} // el trazo no se corta al pasar sobre los botones
  const ll = mapaP.mouseEventToLatLng(e);
  dibP.trazos.push({pts:[[+ll.lat.toFixed(6), +ll.lng.toFixed(6)]], col:dibP.col, g:dibP.g});
  dibP.orden.push("t");
}
/* gestos con dedos mientras se dibuja: 1 dedo (con Pencil) o 2 dedos mueven y acercan */
function mapaGestoIni(){
  const ps = [...dibP.ptrs.values()];
  dibP.gesto = {
    m:{x:ps.reduce((s,p)=>s+p.x,0)/ps.length, y:ps.reduce((s,p)=>s+p.y,0)/ps.length},
    d: ps.length>1? Math.hypot(ps[0].x-ps[1].x, ps[0].y-ps[1].y) : 0};
}
function mapaGestoMov(){
  const ps = [...dibP.ptrs.values()], g = dibP.gesto;
  const m = {x:ps.reduce((s,p)=>s+p.x,0)/ps.length, y:ps.reduce((s,p)=>s+p.y,0)/ps.length};
  mapaP.panBy([Math.round(g.m.x-m.x), Math.round(g.m.y-m.y)], {animate:false});
  g.m = m;
  if(ps.length>1 && g.d>0){ // pellizco: acercar / alejar
    const d = Math.hypot(ps[0].x-ps[1].x, ps[0].y-ps[1].y);
    if(d/g.d > 1.3){ mapaP.zoomIn(1,{animate:false}); g.d = d; }
    else if(d/g.d < 0.77){ mapaP.zoomOut(1,{animate:false}); g.d = d; }
  }
}
function mapaLibreMove(e){
  if(!dibP) return;
  if(e.pointerType==="touch" && dibP.gesto && dibP.ptrs.has(e.pointerId)){
    e.preventDefault();
    dibP.ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
    mapaGestoMov();
    return;
  }
  if(!dibP.dib || e.pointerId!==dibP.pid) return;
  e.preventDefault();
  if(dibP.formaA){ // vista previa de la forma mientras se arrastra
    dibP.tmpShape = formaPts(dibP.herr, dibP.formaA, mapaP.mouseEventToContainerPoint(e));
    mapaDibPintar();
    return;
  }
  const tr = dibP.trazos[dibP.trazos.length-1]; if(!tr) return;
  const ll = mapaP.mouseEventToLatLng(e);
  const a = mapaP.latLngToContainerPoint(tr.pts[tr.pts.length-1]);
  const b = mapaP.latLngToContainerPoint(ll);
  if(Math.hypot(a.x-b.x, a.y-b.y) < 5) return; // suaviza el trazo
  tr.pts.push([+ll.lat.toFixed(6), +ll.lng.toFixed(6)]);
  mapaDibPintar();
}
function mapaLibreUp(e){
  if(!dibP) return;
  if(e.pointerType==="touch"){
    dibP.ptrs.delete(e.pointerId);
    if(dibP.gesto){
      if(dibP.ptrs.size) mapaGestoIni(); else dibP.gesto = null;
      return;
    }
  }
  if(e.pointerId!==dibP.pid) return;
  if(dibP.formaA){ // confirmar la forma dibujada
    if(dibP.tmpShape && dibP.tmpShape.length>1){
      dibP.trazos.push({pts:dibP.tmpShape, col:dibP.col, g:dibP.g});
      dibP.orden.push("t");
    }
    dibP.formaA = null; dibP.tmpShape = null;
  }
  dibP.dib = false; dibP.pid = null;
  mapaDibPintar();
}
function mapaGomaEn(e){
  const pt = mapaP.mouseEventToContainerPoint(e);
  for(let i=dibP.trazos.length-1;i>=0;i--){
    for(const q of dibP.trazos[i].pts){
      const c = mapaP.latLngToContainerPoint(q);
      if(Math.hypot(c.x-pt.x, c.y-pt.y) < 18){ dibP.trazos.splice(i,1); mapaDibPintar(); return; }
    }
  }
  for(let i=dibP.textos.length-1;i>=0;i--){
    const c = mapaP.latLngToContainerPoint(dibP.textos[i].ll);
    if(Math.hypot(c.x-pt.x, c.y-pt.y) < 34){ dibP.textos.splice(i,1); mapaDibPintar(); return; }
  }
}
function mapaClickDib(e){
  if(!dibP || dibP.modo!=="rect") return;
  dibP.pts.push([+e.latlng.lat.toFixed(6), +e.latlng.lng.toFixed(6)]);
  dibP.marcas.push(dibP.pts.length-1);
  mapaDibPintar();
}
function mapaDibAtras(){
  if(!dibP) return;
  if(dibP.modo==="rect"){ dibP.pts.pop(); dibP.marcas.pop(); }
  else if(dibP.herr==="medir" && dibP.medir && dibP.medir.length){ dibP.medir.pop(); }
  else{
    const o = dibP.orden.pop();
    if(o==="x") dibP.textos.pop(); else dibP.trazos.pop();
  }
  mapaDibPintar();
  pintarMedPanel();
}
function mapaDibPintar(){
  dibP.capa.clearLayers(); dibP.linea = null;
  if(dibP.modo==="rect"){
    dibP.pts.forEach((q,i)=>{ // puntos arrastrables para ajustar la esquina
      const mk = L.marker(q, {draggable:true, icon:L.divIcon({className:"pin-div", iconSize:[24,24], iconAnchor:[12,12],
        html:'<div style="width:24px;height:24px;border-radius:50%;background:#e97409;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>'})});
      mk.on("drag dragend", ev=>{
        const ll = ev.target.getLatLng();
        dibP.pts[i] = [+ll.lat.toFixed(6), +ll.lng.toFixed(6)];
        mapaRectLinea();
      });
      mk.addTo(dibP.capa);
    });
    mapaRectLinea();
    return;
  }
  for(const t of dibP.trazos){
    if(t.pts.length>1) L.polyline(t.pts,{color:t.col, weight:t.g, interactive:false}).addTo(dibP.capa);
    else L.circleMarker(t.pts[0],{radius:Math.max(3,t.g/2+2), color:t.col, fillColor:t.col, fillOpacity:1, interactive:false}).addTo(dibP.capa);
  }
  if(dibP.tmpShape){
    L.polyline(dibP.tmpShape,{color:dibP.col, weight:dibP.g, dashArray:"5 6", interactive:false}).addTo(dibP.capa);
    const h = document.querySelector("#mapaHerr .mapa-hint"); // medida en vivo de la forma
    if(h){
      if(dibP.herr==="rect" || dibP.herr==="circ") h.innerHTML = `Superficie: <b>${fmtArea(geoArea(dibP.tmpShape))}</b>`;
      else h.innerHTML = `Distancia: <b>${fmtDist(geoDist(dibP.tmpShape.slice(0,2)))}</b>`;
    }
  }
  dibP.medLin = null;
  if(dibP.herr==="medir" && dibP.medir && dibP.medir.length){ // regla 📐: puntos arrastrables + figura
    dibP.medir.forEach((q,i)=>{
      const mk = L.marker(q, {draggable:true, icon:L.divIcon({className:"pin-div", iconSize:[26,26], iconAnchor:[13,13],
        html:'<div style="width:12px;height:12px;margin:7px;border-radius:50%;background:rgba(255,210,63,.55);border:1.5px solid rgba(255,255,255,.85);box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>'})});
      mk.on("drag dragend", ev=>{
        const ll = ev.target.getLatLng();
        dibP.medir[i] = [+ll.lat.toFixed(6), +ll.lng.toFixed(6)];
        dibP.medRel = null;
        mapaMedGrafico(); pintarMedPanel();
      });
      mk.addTo(dibP.capa);
    });
    mapaMedGrafico();
  }
  for(const x of dibP.textos){
    const mk = L.marker(x.ll,{draggable:true, icon:L.divIcon({className:"pin-div", iconSize:null,
      html:`<span style="font-size:${x.ts}px;font-weight:800;color:${x.col};text-shadow:0 1px 4px ${x.col==="#000000"?"rgba(255,255,255,.9)":"rgba(0,0,0,.9)"};white-space:nowrap">${esc(x.txt)}</span>`})});
    mk.on("dragend", ev=>{ const ll = ev.target.getLatLng(); x.ll = [+ll.lat.toFixed(6), +ll.lng.toFixed(6)]; });
    mk.addTo(dibP.capa);
  }
}
function mapaRectLinea(){ // repinta solo el contorno (sin tocar los puntos que se arrastran)
  if(!dibP) return;
  if(dibP.linea){ dibP.capa.removeLayer(dibP.linea); dibP.linea = null; }
  if(dibP.pts.length>=3) dibP.linea = L.polygon(dibP.pts,{color:"#e97409", weight:2, dashArray:"4 6", fillOpacity:0.06, interactive:false});
  else if(dibP.pts.length===2) dibP.linea = L.polyline(dibP.pts,{color:"#e97409", weight:2, dashArray:"4 6", interactive:false});
  if(dibP.linea) dibP.linea.addTo(dibP.capa);
  const h = document.querySelector("#mapaHerr .mapa-hint"); // medida real en vivo
  if(h){
    if(dibP.pts.length>=3) h.innerHTML = `Superficie: <b>${fmtArea(geoArea(dibP.pts))}</b> · contorno ${fmtDist(geoDist(dibP.pts.concat([dibP.pts[0]])))}`;
    else if(dibP.pts.length===2) h.innerHTML = `Distancia: <b>${fmtDist(geoDist(dibP.pts))}</b>`;
  }
}
function mapaDibCancel(){
  mapaLibreOff();
  if(dibP && mapaP) mapaP.removeLayer(dibP.capa);
  dibP = null;
  const mb = document.querySelector("#mapaCard .mapa-btns"); if(mb) mb.style.display="";
  pintarDibBar();
  pintarMedPanel();
  pintarPoligonos(); mapaHerrDef();
}
function mapaDibFin(){
  if(!dibP) return;
  const esLibre = dibP.modo==="libre";
  const pts = esLibre? dibP.trazos.flatMap(t=>t.pts) : dibP.pts.slice();
  if(pts.length<2 && !(esLibre && dibP.textos.length)){ alert("Dibuja o marca algo en el mapa primero."); return; }
  const trazos = dibP.trazos.map(t=>({pts:t.pts.slice(), col:t.col, g:t.g}));
  const textos = dibP.textos.map(x=>({ll:x.ll.slice(), txt:x.txt, col:x.col, ts:x.ts}));
  const defLibre = esLibre && (trazos.length>1 || textos.length>0);
  abrirModal("📐 Nueva marca en el mapa", `
    <label class="f">¿Qué es?<select id="mp_tipo" onchange="mpSyncLink()">
      <option ${defLibre?"":"selected"}>Cuartel</option><option>Fundo</option><option ${defLibre?"selected":""}>Dibujo libre</option></select></label>
    <div id="mp_link"></div>
    ${campoF("mp_nombre","Etiqueta en el mapa *","text","",'placeholder="Se completa sola al elegir arriba"')}
    ${estiloHTML({col:"#ffd23f", g:2, seg:true, fill:0.08})}
    <div class="muted" style="margin-top:6px">Si eliges <b>Dibujo libre</b>, los trazos y textos se guardan tal cual los dibujaste, con sus propios colores (el estilo de arriba no aplica).</div>
  `, ()=>{
    const tipo = v("mp_tipo");
    if(tipo==="Dibujo libre"){
      for(const t of trazos) if(t.pts.length>1)
        D.mapoly.push({id:(D.seq=(D.seq||1000)+1), tipo:"Dibujo", forma:"linea", nombre:"",
          pts:t.pts, estilo:{col:t.col, g:t.g, seg:false, fill:0, ts:0, tc:"#ffffff", fc:""}});
      for(const x of textos)
        D.mapoly.push({id:(D.seq=(D.seq||1000)+1), tipo:"Texto", forma:"texto", nombre:x.txt,
          pts:[x.ll], estilo:{col:x.col, g:2, seg:false, fill:0, ts:x.ts||16, tc:x.col, fc:""}});
      mapaDibCancel();
      return true;
    }
    if(pts.length<3){ alert("Un área necesita al menos 3 puntos."); return false; }
    const n = v("mp_nombre");
    if(!n){ alert("Ponle un nombre al área."); return false; }
    const o = {id:(D.seq=(D.seq||1000)+1), tipo, forma:"area", nombre:n, pts, estilo:leerEstilo()};
    if(tipo==="Cuartel"){ o.fundoRef = v("mp_fundo"); o.cuartelRef = v("mp_cuartel"); }

/* ---------- Clima: actual + T° min/max + 3 días + lluvia del mes ---------- */
async function cargarClima(){
  const el = document.getElementById("climaW");
  if(!el) return;
  const loc = D.lluviaLoc || LOC_DEF;
  const mes1 = hoy().slice(0,8)+"01";
  try{
    const [f,m] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lng}&current=temperature_2m&daily=temperature_2m_min,temperature_2m_max,precipitation_sum&timezone=auto&forecast_days=4`).then(r=>r.json()),
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lng}&daily=precipitation_sum&timezone=auto&start_date=${mes1}&end_date=${hoy()}`).then(r=>r.json())
    ]);
    const d = f.daily;
    const tAct = Math.round(f.current.temperature_2m);
    const ppHoy = +d.precipitation_sum[0]||0;
    const acum = ((m.daily && m.daily.precipitation_sum)||[]).reduce((s,x)=>s+(+x||0),0);
    const DS = ["DO","LU","MA","MI","JU","VI","SÁ"];
    let cols = "";
    for(let i=1;i<4 && i<d.time.length;i++){
      const dt = new Date(d.time[i]+"T12:00:00");
      const pp = +d.precipitation_sum[i]||0;
      cols += `<div style="text-align:center"><div style="font-size:10.5px;font-weight:700;color:#a8aaa6">${DS[dt.getDay()]}</div>
        <div style="font-size:12px;font-weight:700;color:var(--txt)">${Math.round(d.temperature_2m_min[i])}°/${Math.round(d.temperature_2m_max[i])}°</div>
        <div style="font-size:10.5px;${pp?"color:var(--azul);font-weight:600":"color:#c5c7c3"}">${pp? num(pp)+" mm":"—"}</div></div>`;
    }
    el.innerHTML = `<div style="display:flex;align-items:center;gap:12px;font-variant-numeric:tabular-nums">
      <div style="flex:0 0 auto"><span style="font-size:24px;font-weight:700;color:var(--txt)">${tAct}°</span>
        <div style="font-size:11px;color:var(--txt2)"><span style="color:var(--azul);font-weight:600">↓${Math.round(d.temperature_2m_min[0])}°</span> <span style="color:var(--urg);font-weight:600">↑${Math.round(d.temperature_2m_max[0])}°</span>${ppHoy?` · ${num(ppHoy)} mm hoy`:""}</div></div>
      <div style="flex:1;display:grid;grid-template-columns:repeat(3,1fr)">${cols}</div>
      <div style="flex:0 0 auto;border-left:1px solid #eef0ec;padding-left:12px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:var(--azul)">${num(acum)} mm</div>
        <div style="font-size:10px;color:var(--txt2)">${MESES[new Date().getMonth()]} acum.</div></div>
    </div>`;
  }catch(e){
    const lluviaReg = D.registros.filter(r=>r.tipo==="Lluvia" && r.fecha>=mes1).reduce((s,r)=>s+(+r.mm||0),0);
    el.innerHTML = `<div class="muted" style="font-size:12.5px">Sin conexión. Lluvia del mes según tus registros: <b>${num(lluviaReg)} mm</b></div>`;
  }
}

function fetchT(url, ms){ // fetch con tiempo máximo de espera
  const c = new AbortController();
  const t = setTimeout(()=>c.abort(), ms||9000);
  return fetch(url, {signal:c.signal}).finally(()=>clearTimeout(t));
}
function limpiaTxt(s){ return (s||"").replace(/<[^>]*>/g," ").replace(/&[a-z#0-9]+;/gi," ").replace(/\s+/g," ").trim(); }
function resumen3(s){ // resumen legible: hasta ~3 frases completas
  s = limpiaTxt(s);
  const frases = s.match(/[^.!?]+[.!?]+/g) || [s];
  let out = "";
  for(const f of frases){
    if((out+f).length > 430) break;
    out += f;
    if(out.length > 250) break;
  }
  return (out.trim() || s.slice(0,300)).trim();
}

function notiClasifica(x){ // asigna tema y puntaje de relevancia
  const txt = ((x.t||"")+" "+(x.re||"")).toLowerCase();
  const tit = (x.t||"").toLowerCase();
  let tema = "general", pts = 0;
  for(const [id,,,kws] of NOTI_TEMAS){
    const peso = (id==="citricos"||id==="paltos"||id==="cerezos")? 6 : id==="frutales"? 3 : 2;
    let hay = false;
    for(const k of kws){
      if(tit.includes(k)){ pts += peso*2; hay = true; }
      else if(txt.includes(k)){ pts += peso; hay = true; }
    }
    if(hay && tema==="general") tema = id;
  }
  if(x.fe){ const dias = (Date.now()-new Date(x.fe+"T12:00:00"))/86400000; pts += Math.max(0, 6-dias); }
  return {tema, pts};
}
function sparkDolar(serie){ // mini gráfico de tendencia del dólar (30 días)
  if(!serie || serie.length<2) return "";
  const vs = serie.map(p=>p[1]);
  const min = Math.min(...vs), max = Math.max(...vs), rango = (max-min)||1;
  const W = 220, H = 46;
  const pts = vs.map((v,i)=>`${(i/(vs.length-1)*W).toFixed(1)},${(H-5-(v-min)/rango*(H-10)).toFixed(1)}`).join(" ");
  const varp = (vs[vs.length-1]-vs[0])/vs[0]*100;
  const col = varp>=0? "#2e7d32" : "#c62828";
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round"/></svg>
    <div style="font-size:11px;color:${col};font-weight:700">Dólar: ${varp>=0?"▲":"▼"} ${Math.abs(varp).toFixed(1)}% en 30 días</div>`;
}

async function rssIntentos(url){ // intenta 3 caminos distintos para leer cada fuente
  try{ // 1) rss2json (entrega JSON directo)
    const r = await fetchT("https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(url));
    const j = await r.json();
    if(j.status==="ok" && j.items && j.items.length)
      return j.items.map(i=>({t:limpiaTxt(i.title), u:i.link||"", fe:(i.pubDate||"").slice(0,10), re:resumen3(i.content || i.description), rl:limpiaTxt(i.content || i.description).slice(0,1500)}));
  }catch(e){}
  for(const px of ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?url="]){
    try{ // 2 y 3) proxies + lectura del XML
      const r = await fetchT(px+encodeURIComponent(url));
      const xml = new DOMParser().parseFromString(await r.text(), "text/xml");
      const its = [...xml.querySelectorAll("item")];
      if(its.length) return its.map(it=>{
        const g = s=>{ const e = it.querySelector(s); return e? e.textContent.trim() : ""; };
        const fe = new Date(g("pubDate"));
        return {t:limpiaTxt(g("title")), u:g("link"), fe:isNaN(fe)? "" : fe.toISOString().slice(0,10), re:resumen3(g("description")), rl:limpiaTxt(g("description")).slice(0,1500)};
      });
    }catch(e){}
  }
  return null;
}
async function actualizarNoticias(silencioso){
  if(!navigator.onLine){
    if(silencioso!==true) alert("Necesitas internet para actualizar. Lo guardado sigue disponible sin señal.");
    return;
  }
  const est = document.getElementById("notiEstado");
  if(est) est.textContent = "actualizando las " + NOTI_FUENTES.length + " fuentes… (puede tardar medio minuto)";
  const nuevo = {act: ahora(), ind:null, items:[], fuOk:0, fuTot:NOTI_FUENTES.length};
  try{ // indicadores oficiales de Chile
    const r = await fetchT("https://mindicador.cl/api");
    const j = await r.json();
    nuevo.ind = {dolar: j.dolar && j.dolar.valor, uf: j.uf && j.uf.valor, euro: j.euro && j.euro.valor};
  }catch(e){}
  try{ // serie del dólar (30 días) para el gráfico de tendencia
    const r2 = await fetchT("https://mindicador.cl/api/dolar");
    const j2 = await r2.json();
    const s = (j2.serie||[]).slice(0,30).map(p=>[(p.fecha||"").slice(0,10), p.valor]).reverse();
    if(s.length>1) nuevo.dolarSerie = s;
  }catch(e){}
  const res = await Promise.all(NOTI_FUENTES.map(async ([nom, cat, url])=>({nom, cat, its: await rssIntentos(url)})));
  for(const {nom, cat, its} of res){
    if(!its || !its.length) continue;
    nuevo.fuOk++;
    for(const x of its.slice(0,4)) nuevo.items.push(Object.assign({}, x, {fu:nom, cat}));
  }
  nuevo.items.sort((a,b)=>(b.fe||"").localeCompare(a.fe||""));
  if(!nuevo.ind && !nuevo.items.length){
    if(est) est.textContent = "ninguna fuente respondió — revisa la señal e intenta de nuevo";
    return;
  }
  D.noticias = nuevo;
  guardar();
  if(nav.tab==="noti") render();
}
